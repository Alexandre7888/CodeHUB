<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor de Projetos</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    .loader {
      width: 150px;
      animation: spin 2s linear infinite;
      border-radius: 50%;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    #loading-screen h1 {
      margin-top: 20px;
      color: #ff9500;
    }
    
    /* Top Bar */
    #top-bar {
      display: flex;
      padding: 8px 12px;
      background: #1e1e1e;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .back-btn {
      background: #6c757d;
      text-decoration: none;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
    
    #project-name {
      background: #252526;
      color: white;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      width: 200px;
      font-size: 13px;
    }
    
    #newFileForm {
      display: flex;
      gap: 5px;
    }
    
    #newFileName {
      background: #252526;
      color: white;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      width: 130px;
    }
    
    button {
      background: #4361ee;
      border: none;
      color: white;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    
    #saveFileBtn { background: #4cc9f0; }
    #previewBtn { background: #4895ef; }
    #plansBtn { background: #ff9800; }
    #copyUrlBtn { background: #00bcd4; }
    .logout-btn { background: #f44336; }
    
    #storage-info {
      background: #333;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 11px;
      margin-left: 10px;
    }
    
    #user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    #user-name { font-size: 13px; color: #ccc; }
    
    /* Tabs */
    #tabs {
      display: flex;
      background: #252526;
      align-items: center;
      gap: 1px;
      overflow-x: auto;
      min-height: 36px;
    }
    
    .tab-btn {
      background: #2d2d2d;
      padding: 6px 12px;
      position: relative;
      padding-right: 25px;
      border-radius: 0;
      font-size: 12px;
    }
    
    .tab-btn.active {
      background: #1e1e1e;
      color: white;
    }
    
    .close-tab-btn {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      width: 18px;
      height: 18px;
    }
    
    .close-tab-btn:hover { color: white; background: transparent; }
    
    /* Container */
    #container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    
    /* URL Panel */
    .url-panel {
      background: #252526;
      padding: 6px 12px;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    
    .url-panel input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }
    
    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      border-radius: 5px;
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      font-size: 13px;
    }
    
    .notification.success { background: #4caf50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196f3; }
    .notification.warning { background: #ff9800; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Monaco Editor */
    .monaco-editor {
      width: 100%;
      height: 100%;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background: #252526;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .modal-content h3 { margin-bottom: 15px; color: #4cc9f0; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-buttons button { flex: 1; }
    
    @media (max-width: 768px) {
      #top-bar { flex-wrap: wrap; }
      .back-btn, #plansBtn { order: -1; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="Loading">
    <h1>Carregando editor...</h1>
  </div>

  <div id="app-content" style="display: none; height: 100vh; display: flex; flex-direction: column;">
    <div id="top-bar">
      <a href="index.html" class="back-btn">← Voltar</a>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <form id="newFileForm">
        <input type="text" id="newFileName" placeholder="ex: script.js" required>
        <button type="submit">+ Criar</button>
      </form>
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="copyUrlBtn">🔗 Copiar URL</button>
      <button id="plansBtn">💰 Planos</button>
      <div id="storage-info">
        <span id="storage-used">0</span> / <span id="storage-limit">5</span> MB
      </div>
      <div id="user-info">
        <span id="user-name">Carregando...</span>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div id="tabs"></div>
    <div id="container"></div>
    
    <div class="url-panel" id="urlPanel" style="display: none;">
      <span>🔗 URL pública:</span>
      <input type="text" id="fileUrl" readonly onclick="this.select()">
      <button id="openUrlBtn" style="background:#00bcd4;">Abrir</button>
    </div>
  </div>

  <!-- Modal de Aviso -->
  <div id="warningModal" class="modal">
    <div class="modal-content">
      <h3>⚠️ Atenção!</h3>
      <p id="warningMessage">Carregando via fallback local...</p>
      <div class="modal-buttons">
        <button onclick="closeWarningModal()" class="confirm-btn" style="background:#4caf50;">OK</button>
      </div>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ImageKit
    const IMAGEKIT_SCRIPT = "https://script.google.com/macros/s/AKfycbz6hOhlFCw4gSFfXId1h_XydpsA3tYTGHG8_DgoHMHf8ayDadWWE1Cywbm_kikmMhY_Lg/exec";
    let imagekitKeys = null;
    
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let models = {};
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 };
    let currentFileUrl = null;

    const elements = {
      loadingScreen: document.getElementById('loading-screen'),
      appContent: document.getElementById('app-content'),
      projectName: document.getElementById('project-name'),
      newFileForm: document.getElementById('newFileForm'),
      newFileName: document.getElementById('newFileName'),
      saveFileBtn: document.getElementById('saveFileBtn'),
      previewBtn: document.getElementById('previewBtn'),
      copyUrlBtn: document.getElementById('copyUrlBtn'),
      plansBtn: document.getElementById('plansBtn'),
      storageUsed: document.getElementById('storage-used'),
      storageLimit: document.getElementById('storage-limit'),
      userName: document.getElementById('user-name'),
      logoutBtn: document.getElementById('logoutBtn'),
      tabsContainer: document.getElementById('tabs'),
      container: document.getElementById('container'),
      urlPanel: document.getElementById('urlPanel'),
      fileUrl: document.getElementById('fileUrl'),
      openUrlBtn: document.getElementById('openUrlBtn')
    };

    function showNotification(message, type = 'info') {
      const notif = document.createElement('div');
      notif.className = `notification ${type}`;
      notif.textContent = message;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 4000);
    }

    function showWarningModal(message) {
      document.getElementById('warningMessage').textContent = message;
      document.getElementById('warningModal').style.display = 'flex';
    }

    function closeWarningModal() {
      document.getElementById('warningModal').style.display = 'none';
    }

    async function getImageKitKeys() {
      if (imagekitKeys) return imagekitKeys;
      try {
        const response = await fetch(IMAGEKIT_SCRIPT + "?ua=api-client");
        imagekitKeys = await response.json();
        return imagekitKeys;
      } catch (error) {
        console.error('Erro ao obter chaves:', error);
        return null;
      }
    }

    async function uploadToImageKit(content, fileName, folder) {
      const keys = await getImageKitKeys();
      if (!keys) return null;
      
      const base64Content = "data:text/plain;base64," + btoa(unescape(encodeURIComponent(content)));
      
      const response = await fetch("https://upload.imagekit.io/api/v1/files/upload", {
        method: "POST",
        headers: {
          Authorization: "Basic " + btoa(keys.privateKey + ":"),
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
          file: base64Content,
          fileName: fileName,
          folder: folder,
          useUniqueFileName: false,
          overwriteFile: true,
          responseFields: "url"
        })
      });
      
      return await response.json();
    }

    // FALLBACK: Carregar arquivo com timeout (ImageKit → Blob)
    async function loadFileWithFallback(fileData, timeoutMs = 5000) {
      // Se tem URL do ImageKit
      if (fileData.imageKitUrl) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
          
          const response = await fetch(fileData.imageKitUrl, { signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (response.ok) {
            const content = await response.text();
            return content;
          }
          throw new Error('Fetch failed');
        } catch (error) {
          console.warn('ImageKit lento ou offline, usando fallback:', error);
          showWarningModal('⏳ ImageKit demorou muito. Usando fallback local...');
          
          // Fallback: usar conteúdo salvo localmente
          if (fileData.content) {
            return fileData.content;
          }
          return '';
        }
      }
      return fileData.content || '';
    }

    function getContentSize(content) {
      return new Blob([content]).size;
    }

    async function checkStorageLimit(newContentSize, oldContentSize = 0) {
      const totalAfterAdd = userStorage.used - oldContentSize + newContentSize;
      return totalAfterAdd <= userStorage.limit;
    }

    async function saveFile(fileKey, content) {
      const fileData = files[fileKey];
      const fileName = fileData.originalName || fileData.name;
      const folder = `users/${currentUser.uid}/projects/${currentProjectId}`;
      
      const contentSize = getContentSize(content);
      const oldSize = fileData.size || 0;
      
      if (!await checkStorageLimit(contentSize, oldSize)) {
        showNotification('Limite de armazenamento excedido! Faça upgrade.', 'error');
        return false;
      }
      
      try {
        // Tentar upload para ImageKit
        const result = await uploadToImageKit(content, fileName, folder);
        
        if (result && result.url) {
          files[fileKey] = {
            ...fileData,
            content: content,
            imageKitFileId: result.fileId,
            imageKitUrl: result.url,
            publicUrl: result.url,
            size: contentSize,
            updatedAt: new Date().toISOString()
          };
          
          if (fileKey === currentFile) {
            currentFileUrl = result.url;
            updateUrlPanel(result.url);
          }
          
          showNotification('✅ Salvo no ImageKit!', 'success');
        } else {
          // Fallback: salvar apenas no Firebase
          files[fileKey] = {
            ...fileData,
            content: content,
            size: contentSize,
            updatedAt: new Date().toISOString()
          };
          showNotification('⚠️ Salvo localmente (ImageKit indisponível)', 'warning');
        }
        
        // Atualizar armazenamento
        userStorage.used = userStorage.used - oldSize + contentSize;
        await db.ref(`users/${currentUser.uid}/storage`).set({
          used: userStorage.used,
          limit: userStorage.limit,
          updatedAt: new Date().toISOString()
        });
        
        updateStorageDisplay();
        return true;
      } catch (error) {
        console.error('Erro no upload:', error);
        
        // Fallback final: salvar só no Firebase
        files[fileKey] = {
          ...fileData,
          content: content,
          size: contentSize,
          updatedAt: new Date().toISOString()
        };
        
        showNotification('⚠️ Erro no ImageKit. Salvo localmente.', 'warning');
        return true;
      }
    }

    function updateUrlPanel(url) {
      if (url) {
        elements.fileUrl.value = url;
        elements.urlPanel.style.display = 'flex';
      } else {
        elements.urlPanel.style.display = 'none';
      }
    }

    function updateStorageDisplay() {
      const usedMB = (userStorage.used / (1024 * 1024)).toFixed(2);
      const limitMB = (userStorage.limit / (1024 * 1024)).toFixed(0);
      elements.storageUsed.textContent = usedMB;
      elements.storageLimit.textContent = limitMB;
      elements.storageUsed.style.color = userStorage.used / userStorage.limit > 0.9 ? '#ff9800' : '#4caf50';
    }

    // Configurar Monaco Editor
    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });

    require(['vs/editor/editor.main'], function() {
      editor = monaco.editor.create(elements.container, {
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false },
        language: 'html',
        fontSize: 13,
        fontFamily: 'Consolas, monospace'
      });
      
      editor.onDidChangeModelContent(() => {
        if (currentFile) elements.saveFileBtn.disabled = false;
      });
      
      initializeApp();
    });

    async function initializeApp() {
      auth.onAuthStateChanged(async user => {
        if (!user) {
          window.location.href = 'auth.html';
          return;
        }
        
        currentUser = user;
        elements.userName.textContent = user.displayName || user.email.split('@')[0];
        
        const urlParams = new URLSearchParams(window.location.search);
        currentProjectId = urlParams.get('projectId');
        
        if (!currentProjectId) {
          alert('ID do projeto não encontrado!');
          window.location.href = 'index.html';
          return;
        }
        
        await loadUserStorage();
        await loadProject();
        
        elements.loadingScreen.style.opacity = '0';
        setTimeout(() => {
          elements.loadingScreen.style.display = 'none';
          elements.appContent.style.display = 'flex';
        }, 500);
        
        setupEventListeners();
      });
    }

    async function loadUserStorage() {
      const userRef = db.ref(`users/${currentUser.uid}/storage`);
      const snapshot = await userRef.once('value');
      const data = snapshot.val();
      
      if (data) {
        userStorage.used = data.used || 0;
        userStorage.limit = data.limit || 5 * 1024 * 1024;
      }
      updateStorageDisplay();
    }

    async function loadProject() {
      const projectRef = db.ref(`projects/${currentUser.uid}/${currentProjectId}`);
      const snapshot = await projectRef.once('value');
      const projectData = snapshot.val();
      
      if (!projectData) {
        alert('Projeto não encontrado!');
        window.location.href = 'index.html';
        return;
      }
      
      elements.projectName.value = projectData.name || 'Projeto sem nome';
      files = projectData.files || {};
      
      const fileKeys = Object.keys(files);
      if (fileKeys.length > 0) {
        await openFile(fileKeys[0]);
      } else {
        await createDefaultIndexHtml();
      }
      
      updateTabs();
    }

    async function createDefaultIndexHtml() {
      const fileName = 'index.html';
      const fileKey = btoa(encodeURIComponent(fileName)).replace(/=/g, '');
      
      const defaultContent = `<!DOCTYPE html>
<html>
<head>
  <title>Meu Projeto</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    h1 { color: #667eea; }
    button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Bem-vindo ao seu projeto!</h1>
    <p>Este é seu arquivo index.html. Comece a editar!</p>
    <button onclick="alert('Olá mundo!')">Clique aqui</button>
  </div>
</body>
</html>`;
      
      files[fileKey] = {
        name: fileName,
        originalName: fileName,
        content: defaultContent,
        language: 'html',
        size: getContentSize(defaultContent),
        createdAt: new Date().toISOString()
      };
      
      await saveProject();
      await openFile(fileKey);
    }

    async function saveProject() {
      const projectRef = db.ref(`projects/${currentUser.uid}/${currentProjectId}`);
      await projectRef.update({
        files: files,
        updatedAt: new Date().toISOString()
      });
    }

    async function openFile(fileKey) {
      if (!files[fileKey] || !editor) return;
      
      currentFile = fileKey;
      const fileData = files[fileKey];
      
      if (fileData.imageKitUrl) {
        currentFileUrl = fileData.imageKitUrl;
        updateUrlPanel(fileData.imageKitUrl);
      } else {
        updateUrlPanel(null);
      }
      
      let language = 'plaintext';
      const ext = (fileData.originalName || fileData.name).split('.').pop().toLowerCase();
      switch(ext) {
        case 'html': language = 'html'; break;
        case 'css': language = 'css'; break;
        case 'js': language = 'javascript'; break;
        case 'json': language = 'json'; break;
        case 'xml': language = 'xml'; break;
      }
      
      // USAR FALLBACK
      const content = await loadFileWithFallback(fileData, 5000);
      
      let model = models[fileKey];
      if (!model) {
        model = monaco.editor.createModel(
          content,
          language,
          monaco.Uri.parse(`file:///${fileData.originalName || fileData.name}`)
        );
        models[fileKey] = model;
      } else {
        model.setValue(content);
        monaco.editor.setModelLanguage(model, language);
      }
      
      editor.setModel(model);
      updateTabs();
      elements.saveFileBtn.disabled = true;
    }

    async function saveCurrentFile() {
      if (!currentFile || !editor) return;
      
      const model = editor.getModel();
      if (model) {
        const content = model.getValue();
        const success = await saveFile(currentFile, content);
        
        if (success) {
          await saveProject();
          elements.saveFileBtn.disabled = true;
          elements.saveFileBtn.textContent = '✓ Salvo!';
          setTimeout(() => {
            elements.saveFileBtn.textContent = '💾 Salvar';
          }, 1500);
        }
      }
    }

    async function createNewFile() {
      const fileName = elements.newFileName.value.trim();
      if (!fileName) {
        showNotification('Digite um nome de arquivo', 'error');
        return;
      }
      
      const fileKey = btoa(encodeURIComponent(fileName)).replace(/=/g, '');
      
      if (files[fileKey]) {
        showNotification('Arquivo já existe!', 'error');
        return;
      }
      
      let content = '';
      const ext = fileName.split('.').pop().toLowerCase();
      switch(ext) {
        case 'html':
          content = `<!DOCTYPE html>\n<html>\n<head>\n  <title>${fileName}</title>\n</head>\n<body>\n  \n</body>\n</html>`;
          break;
        case 'css':
          content = `/* ${fileName} */\n\n`;
          break;
        case 'js':
          content = `// ${fileName}\n\n`;
          break;
        default:
          content = `// ${fileName}\n`;
      }
      
      files[fileKey] = {
        name: fileName,
        originalName: fileName,
        content: content,
        language: ext,
        size: getContentSize(content),
        createdAt: new Date().toISOString()
      };
      
      await saveProject();
      await openFile(fileKey);
      elements.newFileName.value = '';
      showNotification(`Arquivo ${fileName} criado!`, 'success');
    }

    function updateTabs() {
      elements.tabsContainer.innerHTML = '';
      
      Object.keys(files).forEach(fileKey => {
        const fileData = files[fileKey];
        const tab = document.createElement('button');
        tab.className = `tab-btn ${fileKey === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(fileKey);
        
        const label = document.createElement('span');
        label.textContent = fileData.originalName || fileData.name;
        tab.appendChild(label);
        
        if (fileData.imageKitUrl) {
          const icon = document.createElement('span');
          icon.textContent = ' ☁️';
          icon.style.fontSize = '10px';
          tab.appendChild(icon);
        }
        
        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-tab-btn';
        closeBtn.innerHTML = '×';
        closeBtn.onclick = async (e) => {
          e.stopPropagation();
          
          if (Object.keys(files).length <= 1) {
            showNotification('Não pode fechar o último arquivo', 'warning');
            return;
          }
          
          delete files[fileKey];
          await saveProject();
          
          if (fileKey === currentFile) {
            const firstKey = Object.keys(files)[0];
            await openFile(firstKey);
          }
          
          updateTabs();
        };
        
        tab.appendChild(closeBtn);
        elements.tabsContainer.appendChild(tab);
      });
    }

    function copyFileUrl() {
      if (currentFileUrl) {
        navigator.clipboard.writeText(currentFileUrl);
        showNotification('URL copiada!', 'success');
      } else {
        showNotification('Salve o arquivo primeiro para gerar URL', 'warning');
      }
    }

    function openFileUrl() {
      if (currentFileUrl) {
        window.open(currentFileUrl, '_blank');
      }
    }

    function previewProject() {
      const indexFile = Object.values(files).find(f => 
        (f.originalName === 'index.html' || f.name === 'index.html')
      );
      
      if (indexFile) {
        if (indexFile.imageKitUrl) {
          window.open(indexFile.imageKitUrl, '_blank');
        } else if (indexFile.content) {
          const blob = new Blob([indexFile.content], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          window.open(url, '_blank');
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
      } else {
        showNotification('Crie um arquivo index.html primeiro', 'warning');
      }
    }

    function openPlansPage() {
      window.open(`plans.html?userId=${currentUser.uid}`, '_blank');
    }

    function setupEventListeners() {
      elements.newFileForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        await createNewFile();
      });
      
      elements.saveFileBtn.addEventListener('click', saveCurrentFile);
      elements.previewBtn.addEventListener('click', previewProject);
      elements.copyUrlBtn.addEventListener('click', copyFileUrl);
      elements.openUrlBtn.addEventListener('click', openFileUrl);
      elements.plansBtn.addEventListener('click', openPlansPage);
      
      elements.logoutBtn.addEventListener('click', () => {
        auth.signOut().then(() => {
          window.location.href = 'auth.html';
        });
      });
      
      elements.projectName.addEventListener('blur', async () => {
        const newName = elements.projectName.value.trim();
        if (newName) {
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(newName);
          showNotification('Nome atualizado!', 'success');
        }
      });
    }

    window.closeWarningModal = closeWarningModal;
  </script>
</body>
</html>
