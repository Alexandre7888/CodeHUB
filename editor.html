<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor com IA</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    .loader {
      width: 120px;
      animation: spin 1s linear infinite;
      border-radius: 50%;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    #top-bar {
      display: flex;
      padding: 8px 12px;
      background: #1e1e1e;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    #project-name {
      background: #252526;
      color: white;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      width: 200px;
    }
    
    button {
      background: #4361ee;
      border: none;
      color: white;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    
    #saveFileBtn { background: #4cc9f0; }
    #previewBtn { background: #4895ef; }
    #puterDashboardBtn { background: #20b2aa; }
    .logout-btn { background: #f44336; }
    
    #storage-info {
      background: #333;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 11px;
      margin-left: 10px;
    }
    
    #user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .url-panel-top {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2d2d2d;
      padding: 4px 10px;
      border-radius: 6px;
      margin-left: 10px;
      font-size: 11px;
    }
    
    .url-panel-top input {
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
      width: 250px;
    }
    
    #projects-sidebar {
      width: 260px;
      background: #252526;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .projects-header {
      padding: 12px;
      background: #2d2d2d;
      font-weight: bold;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .projects-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .project-item {
      padding: 10px;
      margin-bottom: 8px;
      background: #1e1e1e;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #333;
    }
    
    .project-item:hover {
      background: #2d2d2d;
      border-color: #4cc9f0;
    }
    
    .project-item.active {
      background: #4361ee;
      border-color: #4cc9f0;
    }
    
    .project-name {
      font-weight: bold;
      margin-bottom: 4px;
    }
    
    .project-date {
      font-size: 10px;
      color: #888;
    }
    
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    #editor-container {
      flex: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #tabs {
      display: flex;
      background: #252526;
      align-items: center;
      gap: 1px;
      overflow-x: auto;
      min-height: 36px;
    }
    
    .tab-btn {
      background: #2d2d2d;
      padding: 6px 12px;
      position: relative;
      padding-right: 25px;
      border-radius: 0;
      font-size: 12px;
    }
    
    .tab-btn.active {
      background: #1e1e1e;
      color: white;
    }
    
    .close-tab-btn {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 14px;
    }
    
    #container {
      flex: 1;
      overflow: hidden;
    }
    
    #ai-sidebar {
      width: 420px;
      background: #252526;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 250px;
      max-width: 600px;
    }
    
    .resize-handle {
      position: absolute;
      left: -3px;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: ew-resize;
      background: transparent;
      z-index: 100;
    }
    
    .resize-handle:hover {
      background: #4cc9f0;
    }
    
    .sidebar-header {
      padding: 12px;
      background: #2d2d2d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    
    /* Chat Messages - 50% da altura */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    
    .message {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      background: #4361ee;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    
    .message.ai {
      background: #3d3d3d;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }
    
    .message.ai.streaming {
      border-left: 3px solid #9c27b0;
    }
    
    .message.system {
      background: #ff9800;
      align-self: center;
      font-size: 12px;
      border-radius: 20px;
    }
    
    .message pre {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 10px;
      font-size: 12px;
    }
    
    .chat-controls {
      padding: 12px;
      border-top: 1px solid #333;
      background: #252526;
    }
    
    .mode-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      justify-content: center;
    }
    
    .mode-toggle-btn {
      flex: 1;
      background: #333;
      padding: 8px;
      font-size: 13px;
      border-radius: 8px;
    }
    
    .mode-toggle-btn.active {
      background: #9c27b0;
    }
    
    .mode-toggle-btn.edit-mode {
      background: #2d2d2d;
    }
    
    .mode-toggle-btn.edit-mode.active {
      background: #4caf50;
    }
    
    .chat-input-wrapper {
      display: flex;
      gap: 10px;
    }
    
    .chat-input-wrapper textarea {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 10px;
      border-radius: 8px;
      resize: none;
      font-family: inherit;
      font-size: 13px;
    }
    
    .chat-input-wrapper button {
      background: #9c27b0;
      padding: 10px 20px;
      border-radius: 8px;
    }
    
    /* Activities Panel - 50% da altura */
    .activities-panel {
      background: #1e1e1e;
      border-top: 1px solid #333;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }
    
    .activities-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #2d2d2d;
      font-size: 12px;
      color: #4cc9f0;
      border-bottom: 1px solid #333;
    }
    
    .activities-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 11px;
    }
    
    .activity-item {
      background: #2d2d2d;
      border-radius: 8px;
      padding: 8px;
      margin-top: 8px;
    }
    
    .activity-online { color: #4caf50; font-weight: bold; }
    .activity-offline { color: #f44336; }
    .activity-delete-btn {
      background: #f44336;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      margin-top: 6px;
    }
    
    .no-activities {
      text-align: center;
      color: #888;
      padding: 15px;
      font-size: 11px;
    }
    
    .publish-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10001;
    }
    
    .publish-modal-content {
      background: #2d2d2d;
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .publish-modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }
    
    .btn-publish-yes { background: #4caf50; }
    .btn-publish-no { background: #f44336; }
    
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      font-size: 13px;
    }
    
    .notification.success { background: #4caf50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196f3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .monaco-editor { width: 100%; height: 100%; }
    
    .puter-status {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #333;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f44336;
    }
    
    .status-dot.connected { background: #4caf50; }
    
    .new-project-btn {
      background: #4caf50;
      font-size: 11px;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="Loading">
    <h2>Carregando CodeHUB...</h2>
  </div>

  <div id="app-content" style="display: none; height: 100vh; display: flex; flex-direction: column;">
    <div id="top-bar">
      <button id="puterDashboardBtn">🚀 Puter Dashboard</button>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <div id="storage-info">📦 <span id="storage-used">0</span> / <span id="storage-limit">5</span> MB</div>
      
      <div class="url-panel-top" id="urlPanelTop" style="display: none;">
        <span>🔗</span>
        <input type="text" id="fileUrlTop" readonly onclick="this.select()">
        <button id="openUrlTopBtn">Abrir</button>
        <button id="publishTopBtn" style="background:#20b2aa;">🌐 Publicar</button>
      </div>
      
      <div id="user-info">
        <span id="user-name"></span>
        <div class="puter-status"><div class="status-dot" id="puterStatusDot"></div><span id="puterStatusText">Puter</span></div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="main-container">
      <div id="projects-sidebar">
        <div class="projects-header"><span>📁 Meus Projetos</span><button class="new-project-btn" onclick="createNewProject()">+ Novo</button></div>
        <div class="projects-list" id="projects-list"><div style="text-align:center; padding:20px; color:#888;">Carregando...</div></div>
      </div>

      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container"></div>
      </div>

      <div id="ai-sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        
        <div class="sidebar-header">
          <h3>🤖 Assistente IA</h3>
        </div>
        
        <!-- Chat Messages - 50% da altura -->
        <div class="chat-messages" id="chatMessages"></div>
        
        <div class="chat-controls">
          <div class="mode-toggle">
            <button class="mode-toggle-btn" id="chatModeBtn" onclick="setMode('chat')">💬 Conversar (Só Visualizar)</button>
            <button class="mode-toggle-btn edit-mode active" id="editModeBtn" onclick="setMode('edit')">✏️ Editar (Criar/Editar/Deletar)</button>
          </div>
          <div class="chat-input-wrapper">
            <textarea id="chatInput" placeholder="Digite seu comando..." rows="2"></textarea>
            <button id="sendChatBtn">Enviar</button>
          </div>
        </div>
        
        <!-- Activities Panel - 50% da altura -->
        <div class="activities-panel">
          <div class="activities-header">
            <span>📊 Atividades do Usuário</span>
          </div>
          <div class="activities-content" id="activitiesContent">
            <div id="activitiesList">
              <div class="no-activities">🔍 Carregando atividades...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="publishModal" class="publish-modal">
    <div class="publish-modal-content">
      <h3>🚀 Publicar no Puter?</h3>
      <p>Deseja publicar as alterações no Puter agora?</p>
      <div class="publish-modal-buttons">
        <button class="btn-publish-yes" id="publishYesBtn">✅ Sim, publicar</button>
        <button class="btn-publish-no" id="publishNoBtn">❌ Não, depois</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let models = {};
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 };
    let currentHostingUrl = null;
    let currentHostingSubdomain = null;
    let currentHostingDirectory = null;
    let allProjects = [];
    let currentMode = 'edit'; // 'edit' ou 'chat'

    const ACTIVITIES_DB_URL = "https://html-785e3-default-rtdb.firebaseio.com/activities";
    const ACTIVITY_SCRIPT_URL = "https://code.codehub.ct.ws/atividade.js";
    
    let sidebarWidth = 420;

    const elements = {
      loadingScreen: document.getElementById('loading-screen'),
      appContent: document.getElementById('app-content'),
      projectName: document.getElementById('project-name'),
      saveFileBtn: document.getElementById('saveFileBtn'),
      previewBtn: document.getElementById('previewBtn'),
      puterDashboardBtn: document.getElementById('puterDashboardBtn'),
      storageUsed: document.getElementById('storage-used'),
      storageLimit: document.getElementById('storage-limit'),
      userName: document.getElementById('user-name'),
      logoutBtn: document.getElementById('logoutBtn'),
      tabsContainer: document.getElementById('tabs'),
      container: document.getElementById('container'),
      urlPanelTop: document.getElementById('urlPanelTop'),
      fileUrlTop: document.getElementById('fileUrlTop'),
      openUrlTopBtn: document.getElementById('openUrlTopBtn'),
      publishTopBtn: document.getElementById('publishTopBtn'),
      chatMessages: document.getElementById('chatMessages'),
      chatInput: document.getElementById('chatInput'),
      sendChatBtn: document.getElementById('sendChatBtn'),
      projectsList: document.getElementById('projects-list'),
      puterStatusDot: document.getElementById('puterStatusDot'),
      puterStatusText: document.getElementById('puterStatusText'),
      publishModal: document.getElementById('publishModal'),
      publishYesBtn: document.getElementById('publishYesBtn'),
      publishNoBtn: document.getElementById('publishNoBtn'),
      activitiesList: document.getElementById('activitiesList'),
      aiSidebar: document.getElementById('ai-sidebar'),
      resizeHandle: document.getElementById('resizeHandle'),
      chatModeBtn: document.getElementById('chatModeBtn'),
      editModeBtn: document.getElementById('editModeBtn')
    };

    // ==================== MODO ====================
    function setMode(mode) {
      currentMode = mode;
      
      if (mode === 'chat') {
        elements.chatModeBtn.classList.add('active');
        elements.editModeBtn.classList.remove('active');
        showNotification('💬 Modo Conversar - Posso ANALISAR e VISUALIZAR seu código, mas NÃO posso editar!', 'info');
      } else {
        elements.editModeBtn.classList.add('active');
        elements.chatModeBtn.classList.remove('active');
        showNotification('✏️ Modo Editar - Posso CRIAR, EDITAR, DELETAR e PUBLICAR seus arquivos!', 'success');
      }
      
      localStorage.setItem('codehub_mode', mode);
    }

    function showNotification(msg, type = 'info') {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }

    function updatePuterStatus(connected) {
      if (connected) {
        elements.puterStatusDot.classList.add('connected');
        elements.puterStatusText.textContent = 'Online';
      } else {
        elements.puterStatusDot.classList.remove('connected');
        elements.puterStatusText.textContent = 'Offline';
      }
    }

    function showPublishModal(onConfirm, onCancel) {
      elements.publishModal.style.display = 'flex';
      const confirmHandler = () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        if (onConfirm) onConfirm();
      };
      const cancelHandler = () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        if (onCancel) onCancel();
      };
      elements.publishYesBtn.addEventListener('click', confirmHandler);
      elements.publishNoBtn.addEventListener('click', cancelHandler);
    }

    // ==================== FUNÇÕES DO CHAT ====================
    
    function addChatMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      elements.chatMessages.appendChild(msgDiv);
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
      
      if (currentProjectId && currentUser) {
        const chatRef = db.ref(`chats/${currentUser.uid}/${currentProjectId}`).push();
        chatRef.set({ text: text, type: type, timestamp: Date.now() });
      }
    }

    async function loadChatHistory() {
      if (!currentProjectId || !currentUser) return;
      const chatsRef = db.ref(`chats/${currentUser.uid}/${currentProjectId}`);
      const snapshot = await chatsRef.orderByChild('timestamp').once('value');
      elements.chatMessages.innerHTML = '';
      snapshot.forEach(child => {
        const msg = child.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${msg.type}`;
        msgDiv.innerHTML = msg.text.replace(/\n/g, '<br>');
        elements.chatMessages.appendChild(msgDiv);
      });
      if (elements.chatMessages.children.length === 0) {
        addChatMessage('🤖 Olá! Sou seu assistente IA.<br><br>📝 <strong>Modos:</strong><br>• 💬 Conversar: analiso e visualizo seu código (sem editar)<br>• ✏️ Editar: posso criar, editar, deletar e publicar<br><br>💡 Escolha o modo nos botões acima!', 'system');
      }
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
    }

    function clearChat() {
      if (confirm('Limpar todo o histórico do chat?')) {
        db.ref(`chats/${currentUser.uid}/${currentProjectId}`).remove();
        elements.chatMessages.innerHTML = '';
        addChatMessage('🤖 Chat limpo! Digite um novo comando.', 'system');
      }
    }

    // ==================== ATIVIDADES ====================
    async function loadActivities() {
      if (!currentProjectId) return;
      try {
        const res = await fetch(`${ACTIVITIES_DB_URL}/${currentProjectId}.json`);
        const data = await res.json();
        
        if (!data) {
          elements.activitiesList.innerHTML = '<div class="no-activities">📭 Nenhuma atividade registrada ainda</div>';
          return;
        }
        
        const now = Date.now();
        const elapsed = data.time || Math.floor((now - (data.start || now)) / 1000);
        const isOnline = (now - (data.lastSeen || 0)) < 10000;
        
        elements.activitiesList.innerHTML = `
          <div class="activity-item">
            <div><span class="${isOnline ? 'activity-online' : 'activity-offline'}">${isOnline ? '🟢 ONLINE' : '⚫ OFFLINE'}</span></div>
            <div>📅 Primeira visita: ${new Date(data.start || now).toLocaleString()}</div>
            <div>⏱ Tempo no site: ${Math.floor(elapsed/60)}min ${elapsed%60}s</div>
            <div>🔄 Total de visitas: ${data.visits || 1}</div>
            <button class="activity-delete-btn" onclick="deleteActivity('${currentProjectId}')">🗑 Limpar atividades</button>
          </div>
        `;
        if (isOnline) setTimeout(loadActivities, 5000);
      } catch (error) { console.error(error); }
    }

    async function deleteActivity(projectId) {
      if (confirm('Limpar atividades?')) {
        await fetch(`${ACTIVITIES_DB_URL}/${projectId}.json`, { method: "DELETE" });
        showNotification('Atividades limpas!', 'success');
        loadActivities();
      }
    }

    function injectActivityScript(htmlContent) {
      const script = `<script src="${ACTIVITY_SCRIPT_URL}?projectid=${currentProjectId}"><\/script>`;
      if (htmlContent.includes('</body>')) return htmlContent.replace('</body>', script + '\n</body>');
      if (htmlContent.includes('</html>')) return htmlContent.replace('</html>', script + '\n</html>');
      return htmlContent + script;
    }

    // ==================== AÇÕES (APENAS NO MODO EDITAR) ====================
    
    function validateAndFixHTML(content) {
      let html = content;
      if (!html.includes('<!DOCTYPE')) html = '<!DOCTYPE html>\n' + html;
      if (!html.includes('<html')) html = html.replace('<!DOCTYPE html>\n', '<!DOCTYPE html>\n<html>\n');
      if (!html.includes('</html>')) html += '\n</html>';
      if (!html.includes('<head>')) html = html.replace('<html>', '<html>\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>CodeHUB</title>\n</head>');
      if (!html.includes('<body>')) html = html.replace('</head>', '</head>\n<body>');
      if (!html.includes('</body>')) html = html.replace('</html>', '</body>\n</html>');
      return html;
    }

    async function createFiles(filesData) {
      if (currentMode === 'chat') {
        addChatMessage('⚠️ Modo Conversar ativado. Para criar arquivos, mude para o modo "✏️ Editar".', 'system');
        return [];
      }
      
      const created = [];
      for (const fileInfo of filesData) {
        let fileName = fileInfo.name;
        let content = fileInfo.content;
        
        if (!fileName || fileName === 'unknown') {
          if (content.includes('<!DOCTYPE') || content.includes('<html')) fileName = 'index.html';
          else if (content.includes('{') && content.includes('}')) fileName = 'style.css';
          else if (content.includes('function') || content.includes('const')) fileName = 'script.js';
          else fileName = 'arquivo.txt';
        }
        
        if (!fileName.includes('.')) {
          if (content.includes('<!DOCTYPE') || content.includes('<html')) fileName += '.html';
          else if (content.includes('{') && content.includes('}')) fileName += '.css';
          else fileName += '.js';
        }
        
        if (fileName.endsWith('.html')) {
          content = validateAndFixHTML(content);
          content = injectActivityScript(content);
        }
        
        const fileKey = btoa(fileName).replace(/=/g, '');
        files[fileKey] = {
          name: fileName, originalName: fileName, content: content,
          size: content.length, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        };
        created.push(fileName);
      }
      await saveProject();
      if (created.length > 0) {
        const firstKey = btoa(created[0]).replace(/=/g, '');
        await openFile(firstKey);
      }
      return created;
    }

    async function editFile(fileName, newContent) {
      if (currentMode === 'chat') {
        addChatMessage('⚠️ Modo Conversar ativado. Para editar arquivos, mude para o modo "✏️ Editar".', 'system');
        return false;
      }
      
      let targetKey = null;
      for (const key in files) {
        if (files[key].name.toLowerCase() === fileName.toLowerCase() ||
            files[key].name.toLowerCase().includes(fileName.toLowerCase())) {
          targetKey = key;
          break;
        }
      }
      if (!targetKey && currentFile) targetKey = currentFile;
      if (!targetKey) return false;
      
      let finalContent = newContent;
      if (files[targetKey].name.endsWith('.html')) {
        finalContent = validateAndFixHTML(newContent);
        finalContent = injectActivityScript(finalContent);
      }
      
      await saveFile(targetKey, finalContent);
      await saveProject();
      if (targetKey === currentFile && editor) editor.setValue(finalContent);
      return files[targetKey].name;
    }

    async function deleteFile(fileName) {
      if (currentMode === 'chat') {
        addChatMessage('⚠️ Modo Conversar ativado. Para deletar arquivos, mude para o modo "✏️ Editar".', 'system');
        return false;
      }
      
      let targetKey = null;
      for (const key in files) {
        if (files[key].name.toLowerCase() === fileName.toLowerCase() ||
            files[key].name.toLowerCase().includes(fileName.toLowerCase())) {
          targetKey = key;
          break;
        }
      }
      if (!targetKey) return false;
      
      const deletedName = files[targetKey].name;
      delete files[targetKey];
      delete models[targetKey];
      
      if (targetKey === currentFile) {
        const remaining = Object.keys(files);
        if (remaining.length > 0) await openFile(remaining[0]);
        else editor.setModel(null);
      }
      
      await saveProject();
      updateTabs();
      return deletedName;
    }

    async function publishProject() {
      if (currentMode === 'chat') {
        addChatMessage('⚠️ Modo Conversar ativado. Para publicar, mude para o modo "✏️ Editar".', 'system');
        return false;
      }
      
      const auth = await ensurePuterAuth();
      if (!auth) return false;
      
      const hasIndex = Object.values(files).some(f => f.name === 'index.html');
      if (!hasIndex) {
        addChatMessage('❌ Falta o arquivo index.html', 'system');
        return false;
      }
      
      addChatMessage('🚀 Publicando no Puter...', 'system');
      try {
        const dirName = `codehub_${currentUser.uid}_${Date.now()}`;
        await puter.fs.mkdir(dirName);
        for (const file of Object.values(files)) {
          let content = file.content || '';
          if (file.name.endsWith('.html') && !content.includes('atividade.js')) content = injectActivityScript(content);
          await puter.fs.write(`${dirName}/${file.name}`, content);
        }
        
        let subdomain = currentHostingSubdomain;
        if (!subdomain) {
          subdomain = `codehub-${Math.random().toString(36).substring(2, 10)}`;
          const site = await puter.hosting.create(subdomain, dirName);
          subdomain = site.subdomain;
        } else {
          await puter.hosting.update(subdomain, dirName);
        }
        
        const url = `https://${subdomain}.puter.site`;
        currentHostingUrl = url;
        currentHostingSubdomain = subdomain;
        currentHostingDirectory = dirName;
        await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).set({ url, subdomain, directory: dirName });
        
        elements.fileUrlTop.value = url;
        elements.urlPanelTop.style.display = 'flex';
        
        addChatMessage(`✅ Site publicado! 🔗 ${url}`, 'ai');
        return url;
      } catch(e) { addChatMessage(`❌ Erro: ${e.message}`, 'system'); throw e; }
    }

    async function updatePublishedSite() {
      if (currentMode === 'chat') {
        addChatMessage('⚠️ Modo Conversar ativado. Para atualizar o site, mude para o modo "✏️ Editar".', 'system');
        return false;
      }
      
      if (!currentHostingSubdomain) return await publishProject();
      addChatMessage('🔄 Atualizando site publicado...', 'system');
      try {
        for (const file of Object.values(files)) {
          let content = file.content || '';
          if (file.name.endsWith('.html') && !content.includes('atividade.js')) content = injectActivityScript(content);
          await puter.fs.write(`${currentHostingDirectory}/${file.name}`, content);
        }
        await puter.hosting.update(currentHostingSubdomain, currentHostingDirectory);
        addChatMessage(`✅ Site atualizado! 🔗 ${currentHostingUrl}`, 'ai');
        return currentHostingUrl;
      } catch(e) { addChatMessage(`❌ Erro: ${e.message}`, 'system'); throw e; }
    }

    // ==================== IA PRINCIPAL ====================
    
    function extractJSON(text) {
      try {
        return JSON.parse(text);
      } catch(e) {
        const match = text.match(/\{[\s\S]*\}/);
        if (match) {
          try {
            return JSON.parse(match[0]);
          } catch(e2) {
            return null;
          }
        }
        return null;
      }
    }

    async function sendToAI() {
      const userMessage = elements.chatInput.value.trim();
      if (!userMessage) return;
      
      addChatMessage(userMessage, 'user');
      elements.chatInput.value = '';
      
      const streamingMsgDiv = document.createElement('div');
      streamingMsgDiv.className = 'message ai streaming';
      const contentSpan = document.createElement('span');
      streamingMsgDiv.appendChild(contentSpan);
      elements.chatMessages.appendChild(streamingMsgDiv);
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
      
      let accumulatedText = '';
      
      try {
        await ensurePuterAuth();
        
        const existingFiles = [];
        for (const [key, file] of Object.entries(files)) {
          existingFiles.push({ name: file.name, content: file.content || '' });
        }
        
        let prompt = '';
        
        if (currentMode === 'chat') {
          prompt = `
            Você é um assistente de programação amigável que só ANALISA e VISUALIZA código.
            
            PROJETO: ${elements.projectName.value}
            ARQUIVOS: ${existingFiles.map(f => f.name).join(', ')}
            CONTEÚDO DOS ARQUIVOS:
            ${existingFiles.map(f => `--- ${f.name} ---\n${f.content.substring(0, 800)}`).join('\n\n')}
            
            COMANDO: "${userMessage}"
            
            IMPORTANTE: Você está no modo CONVERSAR. Você NÃO pode criar, editar ou deletar arquivos.
            Apenas ANALISE e VISUALIZE o código existente.
            Responda em português de forma clara, explicando o que vê no código.
            Se quiser sugerir melhorias, diga o que poderia ser feito, mas NÃO execute ações.
          `;
        } else {
          prompt = `
            Você é um assistente que EXECUTA ações no código.
            
            PROJETO: ${elements.projectName.value}
            ARQUIVOS EXISTENTES: ${existingFiles.map(f => f.name).join(', ')}
            CONTEÚDO ATUAL:
            ${existingFiles.map(f => `--- ${f.name} ---\n${f.content.substring(0, 500)}`).join('\n\n')}
            
            COMANDO: "${userMessage}"
            
            Responda SOMENTE com um JSON neste formato:
            {"action":"criar","files":[{"name":"index.html","content":"<!DOCTYPE html>..."}],"message":"Site criado"}
            OU {"action":"editar","targetFile":"index.html","newContent":"...","message":"Editado"}
            OU {"action":"deletar","targetFile":"style.css","message":"Deletado"}
            OU {"action":"publicar","message":"Publicado"}
            OU {"action":"atualizar","message":"Atualizado"}
            
            IMPORTANTE: Códigos HTML devem ser COMPLETOS e bonitos.
          `;
        }
        
        const response = await puter.ai.chat(prompt);
        
        let aiResponse = '';
        if (typeof response === 'string') aiResponse = response;
        else if (response.message?.content) aiResponse = response.message.content;
        else aiResponse = JSON.stringify(response);
        
        // Streaming letra por letra
        for (let i = 0; i < aiResponse.length; i++) {
          accumulatedText += aiResponse[i];
          contentSpan.innerHTML = accumulatedText.replace(/\n/g, '<br>');
          elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
          await new Promise(r => setTimeout(r, 8 + Math.random() * 10));
        }
        
        streamingMsgDiv.classList.remove('streaming');
        
        if (currentMode === 'edit') {
          const result = extractJSON(aiResponse);
          
          if (result && result.action) {
            switch(result.action) {
              case 'criar':
                if (result.files && result.files.length > 0) {
                  for (const file of result.files) {
                    if (file.name.endsWith('.html') && file.content) {
                      file.content = validateAndFixHTML(file.content);
                    }
                  }
                  const created = await createFiles(result.files);
                  addChatMessage(`✅ ${result.message || 'Arquivos criados! ' + created.join(', ')}`, 'ai');
                  showPublishModal(() => updatePublishedSite(), () => {});
                }
                break;
              case 'editar':
                if (result.targetFile && result.newContent) {
                  if (result.targetFile.endsWith('.html')) {
                    result.newContent = validateAndFixHTML(result.newContent);
                  }
                  const edited = await editFile(result.targetFile, result.newContent);
                  if (edited) {
                    addChatMessage(`✅ ${result.message || `Arquivo "${edited}" editado!`}`, 'ai');
                    showPublishModal(() => updatePublishedSite(), () => {});
                  } else {
                    addChatMessage(`❌ Arquivo "${result.targetFile}" não encontrado`, 'ai');
                  }
                }
                break;
              case 'deletar':
                if (result.targetFile) {
                  const deleted = await deleteFile(result.targetFile);
                  if (deleted) {
                    addChatMessage(`✅ ${result.message || `Arquivo "${deleted}" deletado!`}`, 'ai');
                    showPublishModal(() => updatePublishedSite(), () => {});
                  } else {
                    addChatMessage(`❌ Arquivo "${result.targetFile}" não encontrado`, 'ai');
                  }
                }
                break;
              case 'publicar':
                await publishProject();
                addChatMessage(`✅ ${result.message || 'Site publicado!'}`, 'ai');
                break;
              case 'atualizar':
                await updatePublishedSite();
                addChatMessage(`✅ ${result.message || 'Site atualizado!'}`, 'ai');
                break;
              default:
                addChatMessage(result.message || 'Comando executado!', 'ai');
            }
          } else if (aiResponse.includes('```')) {
            addChatMessage(aiResponse, 'ai');
          } else {
            addChatMessage(aiResponse, 'ai');
          }
        } else {
          // Modo chat - mostrar resposta normalmente (só análise)
          addChatMessage(aiResponse, 'ai');
        }
        
      } catch (error) {
        streamingMsgDiv.classList.remove('streaming');
        contentSpan.innerHTML = `❌ Erro: ${error.message}`;
        console.error(error);
        addChatMessage(`❌ Erro: ${error.message}`, 'ai');
      }
    }

    async function saveProject() {

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== EDITOR ====================
    function getContentSize(content) { return new Blob([content]).size; }

    async function saveFile(fileKey, content) {
      const fileData = files[fileKey];
      const size = getContentSize(content);
      const oldSize = fileData.size || 0;
      userStorage.used = userStorage.used - oldSize + size;
      files[fileKey] = { ...fileData, content, size, updatedAt: new Date().toISOString() };
      await db.ref(`users/${currentUser.uid}/storage`).set({ used: userStorage.used, limit: userStorage.limit });
      updateStorageDisplay();
      return true;
    }

    function updateStorageDisplay() {
      const usedMB = (userStorage.used / (1024 * 1024)).toFixed(2);
      const limitMB = (userStorage.limit / (1024 * 1024)).toFixed(0);
      elements.storageUsed.textContent = usedMB;
      elements.storageLimit.textContent = limitMB;
    }

    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });

    require(['vs/editor/editor.main'], function() {
      editor = monaco.editor.create(elements.container, {
        theme: 'vs-dark', automaticLayout: true, minimap: { enabled: false }, language: 'html', fontSize: 13
      });
      editor.onDidChangeModelContent(() => { if (currentFile) elements.saveFileBtn.disabled = false; });
      initializeApp();
    });

    async function initializeApp() {
      auth.onAuthStateChanged(async user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        currentUser = user;
        elements.userName.textContent = user.displayName || user.email.split('@')[0];
        
        const urlParams = new URLSearchParams(window.location.search);
        currentProjectId = urlParams.get('projectId');
        
        await loadUserStorage();
        await loadProjects();
        
        if (currentProjectId && allProjects.some(p => p.id === currentProjectId)) {
          await loadProjectData();
          await loadChatHistory();
          await loadActivities();
        } else if (allProjects.length > 0) {
          await selectProject(allProjects[0].id);
        } else {
          await createNewProject();
        }
        
        elements.loadingScreen.style.opacity = '0';
        setTimeout(() => {
          elements.loadingScreen.style.display = 'none';
          elements.appContent.style.display = 'flex';
        }, 500);
        
        setupEventListeners();
        initPuter();
        loadPreferences();
        initResizing();
      });
    }

    async function loadUserStorage() {
      const snapshot = await db.ref(`users/${currentUser.uid}/storage`).once('value');
      const data = snapshot.val();
      if (data) { userStorage.used = data.used || 0; userStorage.limit = data.limit || 5 * 1024 * 1024; }
      updateStorageDisplay();
    }

    async function openFile(fileKey) {
      if (!files[fileKey] || !editor) return;
      currentFile = fileKey;
      const fileData = files[fileKey];
      let lang = 'plaintext';
      const ext = (fileData.name || '').split('.').pop().toLowerCase();
      if (ext === 'html') lang = 'html';
      else if (ext === 'css') lang = 'css';
      else if (ext === 'js') lang = 'javascript';
      
      const content = fileData.content || '';
      let model = models[fileKey];
      if (!model) {
        model = monaco.editor.createModel(content, lang, monaco.Uri.parse(`file:///${fileData.name}`));
        models[fileKey] = model;
      } else {
        model.setValue(content);
        monaco.editor.setModelLanguage(model, lang);
      }
      editor.setModel(model);
      updateTabs();
      elements.saveFileBtn.disabled = true;
    }

    async function saveCurrentFile() {
      if (!currentFile || !editor) return;
      const content = editor.getModel().getValue();
      const success = await saveFile(currentFile, content);
      if (success) {
        await saveProject();
        elements.saveFileBtn.disabled = true;
        elements.saveFileBtn.textContent = '✓';
        setTimeout(() => { elements.saveFileBtn.textContent = '💾 Salvar'; }, 1500);
        showNotification('Arquivo salvo!', 'success');
      }
    }

    function updateTabs() {
      elements.tabsContainer.innerHTML = '';
      Object.keys(files).forEach(key => {
        const tab = document.createElement('button');
        tab.className = `tab-btn ${key === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(key);
        tab.innerHTML = `${files[key].name} <button class="close-tab-btn" onclick="event.stopPropagation(); closeFile('${key}')">&times;</button>`;
        elements.tabsContainer.appendChild(tab);
      });
    }

    async function closeFile(fileKey) {
      if (Object.keys(files).length <= 1) { showNotification('Não pode fechar o último arquivo', 'warning'); return; }
      delete files[fileKey];
      await saveProject();
      if (fileKey === currentFile) await openFile(Object.keys(files)[0]);
      updateTabs();
    }

    // ==================== PUTER ====================
    async function initPuter() {
      try { const user = await puter.auth.getUser(); updatePuterStatus(!!user); } catch(e) { updatePuterStatus(false); }
    }

    async function ensurePuterAuth() {
      try { const user = await puter.auth.getUser(); if (user) { updatePuterStatus(true); return true; } } catch(e) {}
      try { await puter.auth.signIn(); updatePuterStatus(true); return true; } catch(e) { return false; }
    }

    function openPuterDashboard() { window.open('https://puter.com', '_blank'); }
    
    function previewProject() {
      const index = Object.values(files).find(f => f.name === 'index.html');
      if (index?.content) {
        const blob = new Blob([index.content], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } else { showNotification('Crie um index.html primeiro', 'warning'); }
    }

    // ==================== PREFERÊNCIAS ====================
    function loadPreferences() {
      const savedSidebarWidth = localStorage.getItem('codehub_sidebar_width');
      if (savedSidebarWidth) {
        sidebarWidth = parseInt(savedSidebarWidth);
        elements.aiSidebar.style.width = sidebarWidth + 'px';
      }
      
      const savedMode = localStorage.getItem('codehub_mode');
      if (savedMode === 'chat') {
        setMode('chat');
      } else {
        setMode('edit');
      }
    }

    function savePreferences() {
      localStorage.setItem('codehub_sidebar_width', sidebarWidth);
    }

    function initResizing() {
      let isResizing = false;
      elements.resizeHandle.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'ew-resize';
        e.preventDefault();
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const newWidth = window.innerWidth - e.clientX;
        if (newWidth >= 250 && newWidth <= 600) {
          sidebarWidth = newWidth;
          elements.aiSidebar.style.width = sidebarWidth + 'px';
        }
      });
      
      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          document.body.style.cursor = '';
          savePreferences();
        }
      });
    }

    function setupEventListeners() {
      elements.saveFileBtn.addEventListener('click', saveCurrentFile);
      elements.previewBtn.addEventListener('click', previewProject);
      elements.puterDashboardBtn.addEventListener('click', openPuterDashboard);
      elements.openUrlTopBtn?.addEventListener('click', () => { if (currentHostingUrl) window.open(currentHostingUrl, '_blank'); });
      elements.publishTopBtn?.addEventListener('click', () => publishProject());
      elements.sendChatBtn.addEventListener('click', sendToAI);
      elements.chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); } });
      elements.logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));
      elements.projectName.addEventListener('blur', async () => {
        const newName = elements.projectName.value.trim();
        if (newName && currentProjectId) {
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(newName);
          await loadProjects();
        }
      });
    }

    window.selectProject = selectProject;
    window.createNewProject = createNewProject;
    window.clearChat = clearChat;
    window.closeFile = closeFile;
    window.deleteActivity = deleteActivity;
    window.setMode = setMode;
  </script>
</body>
</html>
