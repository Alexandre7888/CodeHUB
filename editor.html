<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor com IA</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e293b, #0f172a); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; transition: opacity 0.5s ease; }
    .loader { width: 80px; animation: spin 1s linear infinite; border-radius: 50%; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #top-bar { display: flex; padding: 8px 12px; background: #1e1e1e; align-items: center; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 8px; }
    #project-name { background: #252526; color: white; border: 1px solid #333; border-radius: 4px; padding: 6px 10px; width: 200px; }
    button { background: #4361ee; border: none; color: white; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: all 0.2s; }
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    #saveFileBtn { background: #4cc9f0; }
    #previewBtn { background: #4895ef; }
    #sitePublishBtn { background: #22c55e; }
    .logout-btn { background: #f44336; }
    #storage-info { background: #333; padding: 4px 10px; border-radius: 5px; font-size: 11px; margin-left: 10px; }
    #user-info { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .url-panel-top { display: flex; align-items: center; gap: 8px; background: #2d2d2d; padding: 4px 10px; border-radius: 6px; margin-left: 10px; font-size: 11px; }
    .url-panel-top input { background: #1e1e1e; border: 1px solid #333; color: white; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 10px; width: 250px; }
    .url-panel-top button { padding: 4px 8px; font-size: 11px; }
    #left-sidebar { width: 280px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
    .section-header { padding: 12px; background: #2d2d2d; font-weight: bold; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .projects-list { flex: 1; overflow-y: auto; padding: 8px; max-height: 40%; }
    .project-item { padding: 10px; margin-bottom: 8px; background: #1e1e1e; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid #333; }
    .project-item:hover { background: #2d2d2d; border-color: #4cc9f0; }
    .project-item.active { background: #4361ee; border-color: #4cc9f0; }
    .project-name { font-weight: bold; margin-bottom: 4px; font-size: 13px; }
    .project-date { font-size: 10px; color: #888; }
    .workers-list { flex: 1; overflow-y: auto; padding: 8px; border-top: 1px solid #333; }
    .worker-item { background: #1e1e1e; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid #333; }
    .worker-name { font-weight: bold; color: #4cc9f0; font-size: 12px; margin-bottom: 4px; }
    .worker-route { font-size: 11px; color: #22c55e; font-family: monospace; margin-bottom: 4px; }
    .worker-url { font-size: 10px; color: #888; word-break: break-all; margin-bottom: 8px; }
    .worker-status { font-size: 10px; display: inline-block; padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; }
    .worker-status.published { background: #22c55e; color: #1e1e1e; }
    .worker-status.not-published { background: #f44336; }
    .worker-actions { display: flex; gap: 5px; flex-wrap: wrap; }
    .worker-actions button { background: #4361ee; padding: 3px 8px; font-size: 10px; }
    .worker-actions button.delete { background: #f44336; }
    .worker-actions button.test { background: #22c55e; }
    .worker-actions button.update-worker { background: #ff9800; }
    .no-workers { text-align: center; color: #888; padding: 20px; font-size: 12px; }
    .main-container { display: flex; flex: 1; overflow: hidden; }
    #editor-container { flex: 2; display: flex; flex-direction: column; overflow: hidden; }
    #tabs { display: flex; background: #252526; align-items: center; gap: 1px; overflow-x: auto; min-height: 36px; }
    .tab-btn { background: #2d2d2d; padding: 6px 12px; position: relative; padding-right: 25px; border-radius: 0; font-size: 12px; }
    .tab-btn.active { background: #1e1e1e; color: white; }
    .close-tab-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #999; cursor: pointer; font-size: 14px; }
    #container { flex: 1; overflow: hidden; position: relative; }
    #simple-editor { width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 13px; padding: 10px; border: none; resize: none; outline: none; }
    #ai-sidebar { width: 420px; background: #252526; border-left: 1px solid #333; display: flex; flex-direction: column; position: relative; min-width: 250px; max-width: 600px; }
    .resize-handle { position: absolute; left: -3px; top: 0; width: 6px; height: 100%; cursor: ew-resize; background: transparent; z-index: 100; }
    .resize-handle:hover { background: #4cc9f0; }
    .sidebar-header { padding: 12px; background: #2d2d2d; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
    .message { padding: 10px 14px; border-radius: 12px; max-width: 95%; word-wrap: break-word; font-size: 13px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { background: #4361ee; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.ai { background: #3d3d3d; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
    .message.ai.streaming { border-left: 3px solid #9c27b0; }
    .message.system { background: #ff9800; align-self: center; font-size: 12px; border-radius: 20px; }
    .message pre { background: #1e1e1e; padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 10px; font-size: 12px; }
    .chat-controls { padding: 12px; border-top: 1px solid #333; background: #252526; }
    .mode-toggle { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; }
    .mode-toggle-btn { flex: 1; background: #333; padding: 8px; font-size: 13px; border-radius: 8px; }
    .mode-toggle-btn.active { background: #9c27b0; }
    .mode-toggle-btn.edit-mode.active { background: #4caf50; }
    .chat-input-wrapper { display: flex; gap: 10px; }
    .chat-input-wrapper textarea { flex: 1; background: #1e1e1e; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; resize: none; font-family: inherit; font-size: 13px; }
    .chat-input-wrapper button { background: #9c27b0; padding: 10px 20px; border-radius: 8px; }
    .worker-editor { background: #1e1e1e; border-top: 1px solid #333; padding: 8px; }
    .worker-editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 11px; color: #4cc9f0; }
    .worker-editor-buttons { display: flex; gap: 8px; }
    .worker-editor-buttons button { padding: 4px 10px; font-size: 10px; }
    .worker-editor-buttons button.update-worker { background: #ff9800; }
    #workerCode { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 12px; padding: 10px; border-radius: 6px; resize: vertical; }
    .activities-panel { background: #1e1e1e; border-top: 1px solid #333; display: flex; flex-direction: column; min-height: 150px; max-height: 180px; }
    .activities-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #2d2d2d; font-size: 11px; color: #4cc9f0; border-bottom: 1px solid #333; }
    .activities-content { flex: 1; overflow-y: auto; padding: 8px; font-size: 11px; }
    .activity-item { background: #2d2d2d; border-radius: 6px; padding: 6px; margin-top: 6px; }
    .activity-online { color: #4caf50; font-weight: bold; }
    .activity-offline { color: #f44336; }
    .activity-delete-btn { background: #f44336; color: white; border: none; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 9px; margin-top: 4px; }
    .no-activities { text-align: center; color: #888; padding: 10px; font-size: 11px; }
    .publish-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .publish-modal-content { background: #2d2d2d; border-radius: 16px; padding: 30px; max-width: 400px; width: 90%; text-align: center; }
    .publish-modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
    .btn-publish-yes { background: #4caf50; }
    .btn-publish-no { background: #f44336; }
    .notification { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; z-index: 1000; animation: slideIn 0.3s ease; font-size: 13px; }
    .notification.success { background: #4caf50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196f3; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .puter-status { display: flex; align-items: center; gap: 5px; background: #333; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f44336; }
    .status-dot.connected { background: #4caf50; }
    .new-project-btn { background: #4caf50; font-size: 11px; padding: 4px 8px; }
    .new-worker-btn { background: #22c55e; font-size: 11px; padding: 4px 8px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="Loading">
    <h2>Carregando CodeHUB...</h2>
    <p style="font-size:12px;margin-top:10px;">Aguardando Firebase e Puter...</p>
  </div>

  <div id="app-content" style="display: none; height: 100vh; display: flex; flex-direction: column;">
    <div id="top-bar">
      <button id="puterDashboardBtn">🚀 Puter Dashboard</button>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="sitePublishBtn">🚀 Publicar Site</button>
      <div id="storage-info">📦 <span id="storage-used">0</span> / <span id="storage-limit">5</span> MB</div>
      <div class="url-panel-top" id="urlPanelTop" style="display: none;">
        <span>🔗</span>
        <input type="text" id="fileUrlTop" readonly onclick="this.select()">
        <button id="openUrlTopBtn">Abrir</button>
      </div>
      <div id="user-info">
        <span id="user-name"></span>
        <div class="puter-status"><div class="status-dot" id="puterStatusDot"></div><span id="puterStatusText">Puter</span></div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="main-container">
      <div id="left-sidebar">
        <div class="section-header"><span>📁 Meus Projetos</span><button class="new-project-btn" onclick="createNewProject()">+ Novo</button></div>
        <div class="projects-list" id="projects-list"><div style="text-align:center; padding:20px; color:#888;">Carregando...</div></div>
        <div class="section-header"><span>⚡ Workers .sc</span><button class="new-worker-btn" onclick="createNewWorker()">+ Worker</button></div>
        <div class="workers-list" id="workers-list"><div class="no-workers">📭 Nenhum worker criado</div></div>
      </div>

      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container"><textarea id="simple-editor" placeholder="Editor - você já pode digitar!" style="width:100%; height:100%; background:#1e1e1e; color:#d4d4d4; font-family:monospace; padding:10px; border:none; resize:none;"></textarea></div>
      </div>

      <div id="ai-sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="sidebar-header"><h3>🤖 Assistente IA</h3></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-controls">
          <div class="mode-toggle"><button class="mode-toggle-btn" id="chatModeBtn" onclick="setMode('chat')">💬 Conversar</button><button class="mode-toggle-btn edit-mode active" id="editModeBtn" onclick="setMode('edit')">✏️ Editar</button></div>
          <div class="chat-input-wrapper"><textarea id="chatInput" placeholder="Digite seu comando..." rows="2"></textarea><button id="sendChatBtn">Enviar</button></div>
        </div>
        <div class="worker-editor">
          <div class="worker-editor-header"><span>📝 Código do Worker (.sc)</span><div class="worker-editor-buttons"><button onclick="saveWorkerCode()">💾 Salvar</button><button id="workerPublishBtn" class="update-worker">🚀 Publicar Worker</button></div></div>
          <textarea id="workerCode" rows="6" placeholder="// Código do Worker .sc\n// Exemplo:\nrouter.get('/api/hello.sc', async () => {\n    return { message: 'Olá do Worker!' };\n});"></textarea>
        </div>
        <div class="activities-panel"><div class="activities-header"><span>📊 Atividades do Usuário</span></div><div class="activities-content" id="activitiesContent"><div id="activitiesList"><div class="no-activities">🔍 Carregando atividades...</div></div></div></div>
      </div>
    </div>
  </div>

  <div id="publishModal" class="publish-modal"><div class="publish-modal-content"><h3 id="modalTitle">🚀 Publicar?</h3><p id="modalMessage">Deseja publicar no Puter agora?</p><div class="publish-modal-buttons"><button class="btn-publish-yes" id="publishYesBtn">✅ Sim</button><button class="btn-publish-no" id="publishNoBtn">❌ Não</button></div></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 };
    let currentHostingUrl = null;
    let currentHostingSubdomain = null;
    let currentHostingDirectory = null;
    let allProjects = [];
    let currentMode = 'edit';
    let useSimpleEditor = true;
    let sitePublished = false;
    let projectWorkers = [];
    let currentWorkerData = null;

    const ACTIVITIES_DB_URL = "https://html-785e3-default-rtdb.firebaseio.com/activities";
    const ACTIVITY_SCRIPT_URL = "https://code.codehub.ct.ws/atividade.js";
    let sidebarWidth = 420;

    const simpleEditor = document.getElementById('simple-editor');
    const container = document.getElementById('container');

    const elements = {
      loadingScreen: document.getElementById('loading-screen'), appContent: document.getElementById('app-content'),
      projectName: document.getElementById('project-name'), saveFileBtn: document.getElementById('saveFileBtn'),
      previewBtn: document.getElementById('previewBtn'), sitePublishBtn: document.getElementById('sitePublishBtn'),
      puterDashboardBtn: document.getElementById('puterDashboardBtn'), storageUsed: document.getElementById('storage-used'),
      storageLimit: document.getElementById('storage-limit'), userName: document.getElementById('user-name'),
      logoutBtn: document.getElementById('logoutBtn'), tabsContainer: document.getElementById('tabs'),
      container: document.getElementById('container'), urlPanelTop: document.getElementById('urlPanelTop'),
      fileUrlTop: document.getElementById('fileUrlTop'), openUrlTopBtn: document.getElementById('openUrlTopBtn'),
      chatMessages: document.getElementById('chatMessages'), chatInput: document.getElementById('chatInput'),
      sendChatBtn: document.getElementById('sendChatBtn'), projectsList: document.getElementById('projects-list'),
      workersList: document.getElementById('workers-list'), workerCode: document.getElementById('workerCode'),
      workerPublishBtn: document.getElementById('workerPublishBtn'), puterStatusDot: document.getElementById('puterStatusDot'),
      puterStatusText: document.getElementById('puterStatusText'), publishModal: document.getElementById('publishModal'),
      publishYesBtn: document.getElementById('publishYesBtn'), publishNoBtn: document.getElementById('publishNoBtn'),
      activitiesList: document.getElementById('activitiesList'), aiSidebar: document.getElementById('ai-sidebar'),
      resizeHandle: document.getElementById('resizeHandle'), chatModeBtn: document.getElementById('chatModeBtn'),
      editModeBtn: document.getElementById('editModeBtn'), simpleEditor: document.getElementById('simple-editor'),
      modalTitle: document.getElementById('modalTitle'), modalMessage: document.getElementById('modalMessage')
    };

    simpleEditor.addEventListener('input', () => { if (currentFile && useSimpleEditor) { files[currentFile].content = simpleEditor.value; elements.saveFileBtn.disabled = false; } });

    function updateSitePublishButton() {
      if (sitePublished && currentHostingUrl) { elements.sitePublishBtn.textContent = '🔄 Atualizar Site'; elements.sitePublishBtn.style.background = '#ff9800'; }
      else { elements.sitePublishBtn.textContent = '🚀 Publicar Site'; elements.sitePublishBtn.style.background = '#22c55e'; }
    }
    function updateWorkerPublishButton() {
      if (currentWorkerData && currentWorkerData.fullUrl) { elements.workerPublishBtn.textContent = '🔄 Atualizar Worker'; elements.workerPublishBtn.style.background = '#ff9800'; }
      else { elements.workerPublishBtn.textContent = '🚀 Publicar Worker'; elements.workerPublishBtn.style.background = '#22c55e'; }
    }

    function workerLog(msg) { addChatMessage(`⚡ Worker: ${msg}`, 'system'); }
    function extractRouteFromCode(code) { const match = code.match(/router\.(get|post|put|delete)\(['"`](.*?)['"`]/); return match ? match[2] : "/api/unknown.sc"; }

    async function loadProjectWorkers() {
      if (!currentProjectId) return;
      try {
        const workersRef = db.ref(`workers/${currentUser.uid}/${currentProjectId}`);
        const snapshot = await workersRef.once('value');
        projectWorkers = [];
        snapshot.forEach(child => { projectWorkers.push({ id: child.key, ...child.val() }); });
        renderWorkersList();
        if (projectWorkers.length > 0 && !currentWorkerData) selectWorker(projectWorkers[0].id);
      } catch(e) { console.error(e); }
    }

    function renderWorkersList() {
      if (!projectWorkers.length) { elements.workersList.innerHTML = '<div class="no-workers">📭 Nenhum worker .sc criado</div>'; return; }
      elements.workersList.innerHTML = projectWorkers.map(w => `
        <div class="worker-item" onclick="selectWorker('${w.id}')">
          <div class="worker-name">📦 ${w.name || 'Sem nome'}</div>
          <div class="worker-route">🎯 ${w.route || '/api/unknown.sc'}</div>
          <div class="worker-status ${w.fullUrl ? 'published' : 'not-published'}">${w.fullUrl ? '✅ Publicado' : '📝 Rascunho'}</div>
          <div class="worker-url">🔗 ${w.fullUrl ? w.fullUrl.substring(0, 50) + '...' : 'Não publicado'}</div>
          <div class="worker-actions">
            ${w.fullUrl ? `<button class="test" onclick="event.stopPropagation(); testWorker('${w.id}')">▶️ Testar</button>` : ''}
            <button onclick="event.stopPropagation(); editWorker('${w.id}')">✏️ Editar</button>
            <button class="delete" onclick="event.stopPropagation(); deleteWorker('${w.id}')">🗑️ Deletar</button>
            ${w.fullUrl ? `<button class="update-worker" onclick="event.stopPropagation(); updateWorker('${w.id}')">🔄 Atualizar</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function selectWorker(workerId) {
      const worker = projectWorkers.find(w => w.id === workerId);
      if (!worker) return;
      currentWorkerData = worker;
      elements.workerCode.value = worker.code || '';
      updateWorkerPublishButton();
      workerLog(`Selecionado worker: ${worker.name}`);
    }

    async function createNewWorker() {
      const name = prompt('Nome do worker (ex: hello):', 'meu-worker');
      if (!name) return;
      const route = `/api/${name}.sc`;
      const defaultCode = `// Worker .sc: ${name}\nrouter.get('${route}', async () => {\n    return { message: 'Olá do worker ${name}!', timestamp: new Date().toISOString() };\n});`;
      const newWorkerRef = db.ref(`workers/${currentUser.uid}/${currentProjectId}`).push();
      const workerId = newWorkerRef.key;
      await newWorkerRef.set({ id: workerId, name, route, code: defaultCode, createdAt: new Date().toISOString() });
      await loadProjectWorkers();
      await selectWorker(workerId);
      workerLog(`Worker "${name}" criado!`);
      showNotification(`Worker criado!`, 'success');
    }

    async function saveWorkerCode() {
      if (!currentWorkerData) { showNotification('Selecione um worker', 'warning'); return; }
      const newCode = elements.workerCode.value;
      const newRoute = extractRouteFromCode(newCode);
      await db.ref(`workers/${currentUser.uid}/${currentProjectId}/${currentWorkerData.id}`).update({ code: newCode, route: newRoute, updatedAt: new Date().toISOString() });
      currentWorkerData.code = newCode;
      currentWorkerData.route = newRoute;
      workerLog(`Worker salvo localmente!`);
      showNotification('Worker salvo! (Clique em Publicar para ir para internet)', 'success');
      await loadProjectWorkers();
    }

    async function publishWorker() {
      if (!currentWorkerData) { showNotification('Selecione um worker', 'warning'); return; }
      elements.modalTitle.textContent = currentWorkerData.fullUrl ? '🔄 Atualizar Worker?' : '🚀 Publicar Worker?';
      elements.modalMessage.textContent = currentWorkerData.fullUrl ? 'Isso vai ATUALIZAR o worker existente no Puter. Deseja continuar?' : 'Isso vai PUBLICAR o worker no Puter. Deseja continuar?';
      elements.publishModal.style.display = 'flex';
      const confirmHandler = async () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        workerLog(`${currentWorkerData.fullUrl ? 'Atualizando' : 'Publicando'} worker...`);
        try {
          const authUser = await ensurePuterAuth();
          if (!authUser) throw new Error('Não foi possível autenticar no Puter');
          const fileName = `worker_${currentWorkerData.name}_${Date.now()}.sc`;
          await puter.fs.write(fileName, currentWorkerData.code);
          const workerName = `${currentProjectId.substring(0, 10)}_${currentWorkerData.name}_${Date.now().toString(36)}`;
          if (currentWorkerData.fullUrl) { try { if (currentWorkerData.deployedName) await puter.workers.delete(currentWorkerData.deployedName); } catch(e) {} }
          const w = await puter.workers.create(workerName, fileName);
          if (!w || !w.url) throw new Error('Resposta do worker inválida - sem URL');
          const fullUrl = w.url + currentWorkerData.route;
          await db.ref(`workers/${currentUser.uid}/${currentProjectId}/${currentWorkerData.id}`).update({ url: w.url, fullUrl: fullUrl, deployedName: workerName, deployedAt: new Date().toISOString() });
          currentWorkerData.url = w.url; currentWorkerData.fullUrl = fullUrl; currentWorkerData.deployedName = workerName;

      elements.publishNoBtn.addEventListener('click', cancelHandler);

    async function updateWorker(workerId) { await selectWorker(workerId); await publishWorker(); }
    async function testWorker(workerId) {
      const worker = projectWorkers.find(w => w.id === workerId);

      try {
        workerLog(`Testando ${worker.fullUrl}...`);
        const controller = new AbortController();

        const res = await fetch(worker.fullUrl, { signal: controller.signal });

        const data = await res.json();
        workerLog(`✅ Resposta: ${JSON.stringify(data, null, 2)}`);
        showNotification(`Worker respondeu!`, 'success');
      } catch(e) { workerLog(`❌ Erro: ${e.message}`, true); if (e.name === 'AbortError') workerLog(`Timeout: Worker não respondeu em 15 segundos`); }
    }

      if (!confirm('Deletar worker?')) return;

        showNotification(`Worker deletado!`, 'success');

    }

    async function publishSite() {
      const auth = await ensurePuterAuth();
      if (!auth) return false;
      const hasIndex = Object.values(files).some(f => f.name === 'index.html');
      if (!hasIndex) { addChatMessage('❌ Falta o arquivo index.html', 'system'); return false; }
      
      elements.modalTitle.textContent = sitePublished ? '🔄 Atualizar Site?' : '🚀 Publicar Site?';
      elements.modalMessage.textContent = sitePublished ? 'Isso vai ATUALIZAR o site existente. Deseja continuar?' : 'Isso vai PUBLICAR o site no Puter. Deseja continuar?';
      elements.publishModal.style.display = 'flex';
      
      const confirmHandler = async () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        
        addChatMessage(`${sitePublished ? 'Atualizando' : 'Publicando'} site...`, 'system');
        try {
          // 1. Criar diretório com todos os arquivos do projeto
          const dirName = `codehub_${currentUser.uid}_${currentProjectId}_${Date.now()}`;
          await puter.fs.mkdir(dirName);
          
          // 2. Salvar todos os arquivos no diretório
          for (const [key, file] of Object.entries(files)) {
            let content = file.content || '';
            if (file.name.endsWith('.html') && !content.includes('atividade.js')) {
              content = injectActivityScript(content);
            }
            await puter.fs.write(`${dirName}/${file.name}`, content);
          }
          
          let finalUrl = '';
          
          if (!sitePublished || !currentHostingSubdomain) {
            // Primeira publicação - criar novo hosting (como no exemplo do Puter)
            const subdomain = puter.randName();
            const site = await puter.hosting.create(subdomain, dirName);
            currentHostingSubdomain = site.subdomain;
            currentHostingDirectory = dirName;
            finalUrl = `https://${site.subdomain}.puter.site`;
            sitePublished = true;
          } else {
            // Atualização - usar hosting.update (como no exemplo do Puter)
            await puter.hosting.update(currentHostingSubdomain, dirName);
            currentHostingDirectory = dirName;
            finalUrl = currentHostingUrl;
          }
          
          currentHostingUrl = finalUrl;
          
          // Salvar informações no Firebase
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).set({ 
            url: currentHostingUrl, 
            subdomain: currentHostingSubdomain, 
            directory: currentHostingDirectory, 
            publishedAt: new Date().toISOString() 
          });
          
          elements.fileUrlTop.value = currentHostingUrl;
          elements.urlPanelTop.style.display = 'flex';
          updateSitePublishButton();
          addChatMessage(`✅ Site ${sitePublished ? 'atualizado' : 'publicado'}! 🔗 ${currentHostingUrl}`, 'ai');
          showNotification(`Site ${sitePublished ? 'atualizado' : 'publicado'} com sucesso!`, 'success');
          
        } catch(e) { 
          addChatMessage(`❌ Erro ao ${sitePublished ? 'atualizar' : 'publicar'} site: ${e.message}`, 'system');
          showNotification(`Erro: ${e.message}`, 'error');
        }
      };
      
      const cancelHandler = () => { 
        elements.publishModal.style.display = 'none'; 
        elements.publishYesBtn.removeEventListener('click', confirmHandler); 
        elements.publishNoBtn.removeEventListener('click', cancelHandler); 
      };
      
      elements.publishYesBtn.addEventListener('click', confirmHandler);
      elements.publishNoBtn.addEventListener('click', cancelHandler);
    }

    function showNotification(msg, type = 'info') { const n = document.createElement('div'); n.className = `notification ${type}`; n.textContent = msg; document.body.appendChild(n); setTimeout(() => n.remove(), 4000); }
    function updatePuterStatus(connected) { if (connected) { elements.puterStatusDot.classList.add('connected'); elements.puterStatusText.textContent = 'Online'; } else { elements.puterStatusDot.classList.remove('connected'); elements.puterStatusText.textContent = 'Offline'; } }
    function addChatMessage(text, type) { const msgDiv = document.createElement('div'); msgDiv.className = `message ${type}`; msgDiv.innerHTML = text.replace(/\n/g, '<br>'); elements.chatMessages.appendChild(msgDiv); elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight; if (currentProjectId && currentUser) { db.ref(`chats/${currentUser.uid}/${currentProjectId}`).push({ text, type, timestamp: Date.now() }); } }
    async function loadChatHistory() { if (!currentProjectId || !currentUser) return; const snapshot = await db.ref(`chats/${currentUser.uid}/${currentProjectId}`).orderByChild('timestamp').once('value'); elements.chatMessages.innerHTML = ''; snapshot.forEach(child => { const msg = child.val(); const msgDiv = document.createElement('div'); msgDiv.className = `message ${msg.type}`; msgDiv.innerHTML = msg.text.replace(/\n/g, '<br>'); elements.chatMessages.appendChild(msgDiv); }); if (elements.chatMessages.children.length === 0) { addChatMessage('🤖 Olá! 💡 Dica: Clique em "Salvar" para salvar localmente, e "Publicar" para ir pra internet!', 'system'); } }
    async function loadActivities() { if (!currentProjectId) return; try { const res = await fetch(`${ACTIVITIES_DB_URL}/${currentProjectId}.json`); const data = await res.json(); if (!data) { elements.activitiesList.innerHTML = '<div class="no-activities">📭 Nenhuma atividade registrada</div>'; return; } const now = Date.now(); const elapsed = data.time || Math.floor((now - (data.start || now)) / 1000); const isOnline = (now - (data.lastSeen || 0)) < 10000; elements.activitiesList.innerHTML = `<div class="activity-item"><div><span class="${isOnline ? 'activity-online' : 'activity-offline'}">${isOnline ? '🟢 ONLINE' : '⚫ OFFLINE'}</span></div><div>📅 Primeira visita: ${new Date(data.start || now).toLocaleString()}</div><div>⏱ Tempo: ${Math.floor(elapsed/60)}min ${elapsed%60}s</div><div>🔄 Visitas: ${data.visits || 1}</div><button class="activity-delete-btn" onclick="deleteActivity('${currentProjectId}')">🗑 Limpar</button></div>`; if (isOnline) setTimeout(loadActivities, 5000); } catch(e) { console.error(e); } }
    async function deleteActivity(projectId) { if (confirm('Limpar atividades?')) { await fetch(`${ACTIVITIES_DB_URL}/${projectId}.json`, { method: "DELETE" }); showNotification('Atividades limpas!', 'success'); loadActivities(); } }
    function injectActivityScript(htmlContent) { const script = `<script src="${ACTIVITY_SCRIPT_URL}?projectid=${currentProjectId}"><\/script>`; if (htmlContent.includes('</body>')) return htmlContent.replace('</body>', script + '\n</body>'); if (htmlContent.includes('</html>')) return htmlContent.replace('</html>', script + '\n</html>'); return htmlContent + script; }
    function validateAndFixHTML(content) { let html = content; if (!html.includes('<!DOCTYPE')) html = '<!DOCTYPE html>\n' + html; if (!html.includes('<html')) html = html.replace('<!DOCTYPE html>\n', '<!DOCTYPE html>\n<html>\n'); if (!html.includes('</html>')) html += '\n</html>'; if (!html.includes('<head>')) html = html.replace('<html>', '<html>\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>CodeHUB</title>\n</head>'); if (!html.includes('<body>')) html = html.replace('</head>', '</head>\n<body>'); if (!html.includes('</body>')) html = html.replace('</html>', '</body>\n</html>'); return html; }

    async function createFiles(filesData) {
      if (currentMode === 'chat') { addChatMessage('⚠️ Modo Conversar - Para criar, mude para "✏️ Editar"', 'system'); return []; }
      const created = [];
      for (const fileInfo of filesData) {
        let fileName = fileInfo.name;
        let content = fileInfo.content;
        if (!fileName || fileName === 'unknown') {
          if (content.includes('<!DOCTYPE') || content.includes('<html')) fileName = 'index.html';
          else if (content.includes('{') && content.includes('}')) fileName = 'style.css';
          else if (content.includes('function') || content.includes('const')) fileName = 'script.js';
          else if (content.includes('router.')) fileName = 'worker.sc';
          else fileName = 'arquivo.txt';
        }
        if (!fileName.includes('.')) {
          if (content.includes('<!DOCTYPE') || content.includes('<html')) fileName += '.html';
          else if (content.includes('{') && content.includes('}')) fileName += '.css';
          else if (content.includes('router.')) fileName += '.sc';
          else fileName += '.js';
        }
        if (fileName.endsWith('.sc')) {
          const route = extractRouteFromCode(content);
          const workerName = fileName.replace('.sc', '');
          const newWorkerRef = db.ref(`workers/${currentUser.uid}/${currentProjectId}`).push();
          await newWorkerRef.set({ id: newWorkerRef.key, name: workerName, route, code: content, createdAt: new Date().toISOString() });
          await loadProjectWorkers();
        }
        if (fileName.endsWith('.html')) { content = validateAndFixHTML(content); content = injectActivityScript(content); }
        const fileKey = btoa(fileName).replace(/=/g, '');
        files[fileKey] = { name: fileName, originalName: fileName, content, size: content.length, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        created.push(fileName);
      }
      await saveProject();
      if (created.length > 0) { const firstKey = btoa(created[0]).replace(/=/g, ''); await openFile(firstKey); }
      return created;
    }

    async function editFile(fileName, newContent) {
      if (currentMode === 'chat') { addChatMessage('⚠️ Modo Conversar - Para editar, mude para "✏️ Editar"', 'system'); return false; }
      if (fileName.endsWith('.sc')) {
        const route = extractRouteFromCode(newContent);
        const workerName = fileName.replace('.sc', '');
        const existingWorker = projectWorkers.find(w => w.name === workerName);
        if (existingWorker) { await db.ref(`workers/${currentUser.uid}/${currentProjectId}/${existingWorker.id}`).update({ code: newContent, route, updatedAt: new Date().toISOString() }); await loadProjectWorkers(); }
      }
      let targetKey = null;
      for (const key in files) { if (files[key].name.toLowerCase() === fileName.toLowerCase() || files[key].name.toLowerCase().includes(fileName.toLowerCase())) { targetKey = key; break; } }
      if (!targetKey && currentFile) targetKey = currentFile;
      if (!targetKey) return false;
      let finalContent = newContent;
      if (files[targetKey].name.endsWith('.html')) { finalContent = validateAndFixHTML(newContent); finalContent = injectActivityScript(finalContent); }
      await saveFile(targetKey, finalContent);
      await saveProject();
      if (targetKey === currentFile) { if (useSimpleEditor) simpleEditor.value = finalContent; else if (editor) editor.setValue(finalContent); }
      return files[targetKey].name;
    }

    async function deleteFile(fileName) {
      if (currentMode === 'chat') { addChatMessage('⚠️ Modo Conversar - Para deletar, mude para "✏️ Editar"', 'system'); return false; }
      if (fileName.endsWith('.sc')) { const workerName = fileName.replace('.sc', ''); const worker = projectWorkers.find(w => w.name === workerName); if (worker) await deleteWorker(worker.id); }
      let targetKey = null;
      for (const key in files) { if (files[key].name.toLowerCase() === fileName.toLowerCase() || files[key].name.toLowerCase().includes(fileName.toLowerCase())) { targetKey = key; break; } }
      if (!targetKey) return false;
      const deletedName = files[targetKey].name;
      delete files[targetKey];
      if (targetKey === currentFile) {
        const remaining = Object.keys(files);
        if (remaining.length > 0) await openFile(remaining[0]);
        else { if (useSimpleEditor) simpleEditor.value = ''; else if (editor) editor.setModel(null); currentFile = null; }
      }
      await saveProject();
      updateTabs();
      return deletedName;
    }

    async function sendToAI() {
      const userMessage = elements.chatInput.value.trim();
      if (!userMessage) return;
      addChatMessage(userMessage, 'user');
      elements.chatInput.value = '';
      const streamingMsgDiv = document.createElement('div');
      streamingMsgDiv.className = 'message ai streaming';
      const contentSpan = document.createElement('span');
      streamingMsgDiv.appendChild(contentSpan);
      elements.chatMessages.appendChild(streamingMsgDiv);
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
      let fullResponse = '';
      try {
        await ensurePuterAuth();
        const existingFiles = [];
        for (const [key, file] of Object.entries(files)) { existingFiles.push({ name: file.name, content: file.content || '' }); }
        let prompt = '';
        if (currentMode === 'chat') { prompt = `Você é um assistente de programação amigável que só ANALISA código. PROJETO: ${elements.projectName.value} ARQUIVOS: ${existingFiles.map(f => f.name).join(', ')} COMANDO: "${userMessage}" Modo CONVERSAR - NÃO pode criar, editar ou deletar. Apenas ANALISE.`; }
        else { prompt = `Você é um assistente que EXECUTA ações no código. PROJETO: ${elements.projectName.value} ARQUIVOS: ${existingFiles.map(f => f.name).join(', ')} CONTEÚDO: ${existingFiles.map(f => `--- ${f.name} ---\n${f.content.substring(0, 500)}`).join('\n\n')} COMANDO: "${userMessage}" Responda SOMENTE com um JSON: {"action":"criar","files":[{"name":"index.html","content":"<!DOCTYPE html>..."}],"message":"msg"} OU {"action":"editar","targetFile":"index.html","newContent":"...","message":"msg"} OU {"action":"deletar","targetFile":"style.css","message":"msg"}`; }
        const res = await puter.ai.chat(prompt, { stream: true });
        for await (const chunk of res) { fullResponse += chunk; contentSpan.innerHTML = fullResponse.replace(/\n/g, '<br>'); elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight; }
        streamingMsgDiv.classList.remove('streaming');
        if (currentMode === 'edit') {
          try {
            const jsonMatch = fullResponse.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              const result = JSON.parse(jsonMatch[0]);
              if (result.action) {
                switch(result.action) {
                  case 'criar': if (result.files) { const created = await createFiles(result.files); addChatMessage(`✅ ${result.message || 'Arquivos criados: ' + created.join(', ')}`, 'ai'); showNotification('Arquivos criados! Clique em "Salvar" para guardar, e "Publicar" para ir pra internet!', 'info'); } break;
                  case 'editar': if (result.targetFile && result.newContent) { const edited = await editFile(result.targetFile, result.newContent); if (edited) addChatMessage(`✅ ${result.message || 'Arquivo editado!'}`, 'ai'); } break;
                  case 'deletar': if (result.targetFile) { const deleted = await deleteFile(result.targetFile); if (deleted) addChatMessage(`✅ ${result.message || 'Arquivo deletado!'}`, 'ai'); } break;
                }
              }
            }
          } catch(e) {}
        }
      } catch (error) { streamingMsgDiv.classList.remove('streaming'); contentSpan.innerHTML = `❌ Erro: ${error.message}`; console.error(error); }
    }

    async function loadProjects() {
      const projectsRef = db.ref(`projects/${currentUser.uid}`);
      const snapshot = await projectsRef.once('value');
      allProjects = [];
      snapshot.forEach(child => { allProjects.push({ id: child.key, name: child.val().name || 'Sem nome', updatedAt: child.val().updatedAt || new Date().toISOString() }); });
      allProjects.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      renderProjectsList();
    }
    function renderProjectsList() {
      if (allProjects.length === 0) { elements.projectsList.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum projeto<br><button class="new-project-btn" onclick="createNewProject()">+ Criar</button></div>'; return; }
      elements.projectsList.innerHTML = allProjects.map(p => `<div class="project-item ${currentProjectId === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')"><div class="project-name">📄 ${escapeHtml(p.name)}</div><div class="project-date">${new Date(p.updatedAt).toLocaleDateString()}</div></div>`).join('');
    }
    async function selectProject(projectId) { if (currentProjectId === projectId) return; currentProjectId = projectId; await loadProjectData(); await loadChatHistory(); await loadActivities(); await loadProjectWorkers(); updateTabs(); window.history.pushState({}, '', `?projectId=${projectId}`); }
    async function createNewProject() { const name = prompt('Nome do projeto:', 'Meu Projeto'); if (!name) return; const newProjectRef = db.ref(`projects/${currentUser.uid}`).push(); const projectId = newProjectRef.key; const fileKey = btoa('index.html').replace(/=/g, ''); const defaultHTML = `<!DOCTYPE html><html><head><title>${name}</title></head><body><h1>${name}</h1><p>Bem-vindo!</p></body></html>`; const content = injectActivityScript(defaultHTML); await newProjectRef.set({ name, files: { [fileKey]: { name: 'index.html', content, size: content.length, createdAt: new Date().toISOString() } }, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }); await loadProjects(); await selectProject(projectId); showNotification(`Projeto "${name}" criado!`, 'success'); }
    async function loadProjectData() { const snapshot = await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).once('value'); const data = snapshot.val(); if (!data) return; elements.projectName.value = data.name || 'Projeto'; files = data.files || {}; if (data.hosting && data.hosting.url) { currentHostingUrl = data.hosting.url; currentHostingSubdomain = data.hosting.subdomain; currentHostingDirectory = data.hosting.directory; sitePublished = true; elements.fileUrlTop.value = currentHostingUrl; elements.urlPanelTop.style.display = 'flex'; } else { sitePublished = false; } updateSitePublishButton(); const fileKeys = Object.keys(files); if (fileKeys.length > 0) await openFile(fileKeys[0]); else await createDefaultIndexHtml(); updateTabs(); renderProjectsList(); }
    async function createDefaultIndexHtml() { const fileName = 'index.html'; const fileKey = btoa(fileName).replace(/=/g, ''); const defaultHTML = `<!DOCTYPE html><html><head><title>${elements.projectName.value || 'Projeto'}</title></head><body><h1>Bem-vindo!</h1></body></html>`; const content = injectActivityScript(defaultHTML); files[fileKey] = { name: fileName, originalName: fileName, content, size: content.length, createdAt: new Date().toISOString() }; await saveProject(); await openFile(fileKey); }
    async function saveProject() { await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).update({ files, updatedAt: new Date().toISOString() }); }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    async function saveFile(fileKey, content) { const fileData = files[fileKey]; const size = new Blob([content]).size; const oldSize = fileData.size || 0; userStorage.used = userStorage.used - oldSize + size; files[fileKey] = { ...fileData, content, size, updatedAt: new Date().toISOString() }; await db.ref(`users/${currentUser.uid}/storage`).set({ used: userStorage.used, limit: userStorage.limit }); updateStorageDisplay(); return true; }
    function updateStorageDisplay() { const usedMB = (userStorage.used / (1024 * 1024)).toFixed(2); const limitMB = (userStorage.limit / (1024 * 1024)).toFixed(0); elements.storageUsed.textContent = usedMB; elements.storageLimit.textContent = limitMB; }

    function initializeApp() {
      auth.onAuthStateChanged(async user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        currentUser = user; elements.userName.textContent = user.displayName || user.email.split('@')[0];
        const urlParams = new URLSearchParams(window.location.search);
        currentProjectId = urlParams.get('projectId');
        await loadUserStorage();
        await loadProjects();
        if (currentProjectId && allProjects.some(p => p.id === currentProjectId)) { await loadProjectData(); await loadChatHistory(); await loadActivities(); await loadProjectWorkers(); }
        else if (allProjects.length > 0) { await selectProject(allProjects[0].id); }
        else { await createNewProject(); }
        const loadingScreen = document.getElementById('loading-screen');
        loadingScreen.style.opacity = '0';
        setTimeout(() => { loadingScreen.style.display = 'none'; document.getElementById('app-content').style.display = 'flex'; }, 300);
        setupEventListeners();
        initPuter();
        loadPreferences();
        initResizing();
        setTimeout(() => {
          require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
          require(['vs/editor/editor.main'], function() {
            useSimpleEditor = false;
            document.getElementById('simple-editor').style.display = 'none';
            const container = document.getElementById('container');
            container.innerHTML = '<div id="monaco-editor" style="width:100%;height:100%;"></div>';
            editor = monaco.editor.create(document.getElementById('monaco-editor'), { theme: 'vs-dark', automaticLayout: true, minimap: { enabled: false }, language: 'html', fontSize: 13 });
            editor.onDidChangeModelContent(() => { if (currentFile) elements.saveFileBtn.disabled = false; });
            if (currentFile && files[currentFile]) editor.setValue(files[currentFile].content || '');
          });
        }, 500);
      });
    }

    async function loadUserStorage() { const snapshot = await db.ref(`users/${currentUser.uid}/storage`).once('value'); const data = snapshot.val(); if (data) { userStorage.used = data.used || 0; userStorage.limit = data.limit || 5 * 1024 * 1024; } updateStorageDisplay(); }
    async function openFile(fileKey) { if (!files[fileKey]) return; currentFile = fileKey; const content = files[fileKey].content || ''; if (useSimpleEditor) simpleEditor.value = content; else if (editor) editor.setValue(content); updateTabs(); elements.saveFileBtn.disabled = true; }
    async function saveCurrentFile() { if (!currentFile) return; let content; if (useSimpleEditor) content = simpleEditor.value; else if (editor) content = editor.getValue(); else return; const success = await saveFile(currentFile, content); if (success) { await saveProject(); elements.saveFileBtn.disabled = true; elements.saveFileBtn.textContent = '✓'; setTimeout(() => { elements.saveFileBtn.textContent = '💾 Salvar'; }, 1500); showNotification('Arquivo salvo localmente!', 'success'); } }
    function updateTabs() { elements.tabsContainer.innerHTML = ''; Object.keys(files).forEach(key => { const tab = document.createElement('button'); tab.className = `tab-btn ${key === currentFile ? 'active' : ''}`; tab.onclick = () => openFile(key); tab.innerHTML = `${files[key].name} <button class="close-tab-btn" onclick="event.stopPropagation(); closeFile('${key}')">&times;</button>`; elements.tabsContainer.appendChild(tab); }); }
    async function closeFile(fileKey) { if (Object.keys(files).length <= 1) { showNotification('Não pode fechar o último arquivo', 'warning'); return; } delete files[fileKey]; await saveProject(); if (fileKey === currentFile) await openFile(Object.keys(files)[0]); updateTabs(); }
    async function initPuter() { try { const user = await puter.auth.getUser(); updatePuterStatus(!!user); } catch(e) { updatePuterStatus(false); } }
    async function ensurePuterAuth() { try { const user = await puter.auth.getUser(); if (user) { updatePuterStatus(true); return true; } } catch(e) {} try { await puter.auth.signIn(); updatePuterStatus(true); return true; } catch(e) { return false; } }
    function openPuterDashboard() { window.open('https://puter.com', '_blank'); }
    function previewProject() { const index = Object.values(files).find(f => f.name === 'index.html'); if (index?.content) { const blob = new Blob([index.content], { type: 'text/html' }); const url = URL.createObjectURL(blob); window.open(url, '_blank'); setTimeout(() => URL.revokeObjectURL(url), 1000); } else { showNotification('Crie um index.html primeiro', 'warning'); } }
    function loadPreferences() { const savedSidebarWidth = localStorage.getItem('codehub_sidebar_width'); if (savedSidebarWidth) { sidebarWidth = parseInt(savedSidebarWidth); elements.aiSidebar.style.width = sidebarWidth + 'px'; } const savedMode = localStorage.getItem('codehub_mode'); if (savedMode === 'chat') setMode('chat'); else setMode('edit'); }
    function savePreferences() { localStorage.setItem('codehub_sidebar_width', sidebarWidth); }
    function initResizing() { let isResizing = false; elements.resizeHandle.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'ew-resize'; e.preventDefault(); }); document.addEventListener('mousemove', (e) => { if (!isResizing) return; const newWidth = window.innerWidth - e.clientX; if (newWidth >= 250 && newWidth <= 600) { sidebarWidth = newWidth; elements.aiSidebar.style.width = sidebarWidth + 'px'; } }); document.addEventListener('mouseup', () => { if (isResizing) { isResizing = false; document.body.style.cursor = ''; savePreferences(); } }); }
    function setupEventListeners() {
      elements.saveFileBtn.addEventListener('click', saveCurrentFile);
      elements.previewBtn.addEventListener('click', previewProject);
      elements.sitePublishBtn.addEventListener('click', publishSite);
      elements.puterDashboardBtn.addEventListener('click', openPuterDashboard);
      elements.openUrlTopBtn?.addEventListener('click', () => { if (currentHostingUrl) window.open(currentHostingUrl, '_blank'); });
      elements.sendChatBtn.addEventListener('click', sendToAI);
      elements.workerPublishBtn.addEventListener('click', publishWorker);
      elements.chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); } });
      elements.logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));
      elements.projectName.addEventListener('blur', async () => { const newName = elements.projectName.value.trim(); if (newName && currentProjectId) { await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(newName); await loadProjects(); } });
    }

    initializeApp();

    window.selectProject = selectProject;
    window.createNewProject = createNewProject;
    window.clearChat = () => { if (confirm('Limpar chat?')) { db.ref(`chats/${currentUser.uid}/${currentProjectId}`).remove(); elements.chatMessages.innerHTML = ''; addChatMessage('🤖 Chat limpo!', 'system'); } };
    window.closeFile = closeFile;
    window.deleteActivity = deleteActivity;
    window.setMode = setMode;
    window.createNewWorker = createNewWorker;
    window.selectWorker = selectWorker;
    window.saveWorkerCode = saveWorkerCode;
    window.publishWorker = publishWorker;
    window.updateWorker = updateWorker;
    window.testWorker = testWorker;
    window.editWorker = editWorker;
    window.deleteWorker = deleteWorker;
  </script>
</body>
</html>
