<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor de Código</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    :root {
      --zoom-level: 1;
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d2d;
      --border-color: #333;
      --text-primary: #fff;
      --text-secondary: #888;
      --accent-blue: #4361ee;
      --accent-cyan: #4cc9f0;
      --accent-green: #22c55e;
      --accent-orange: #ff9800;
      --accent-red: #f44336;
      --accent-purple: #9c27b0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden;
      zoom: var(--zoom-level);
    }
    
    #loading-screen { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: radial-gradient(circle at center, #1e293b, #0f172a); 
      display: flex; justify-content: center; align-items: center; flex-direction: column; 
      z-index: 9999; transition: opacity 0.5s ease; 
    }
    .loader { width: 80px; animation: spin 1s linear infinite; border-radius: 50%; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    #top-bar { 
      display: flex; padding: 8px 12px; background: var(--bg-primary); 
      align-items: center; border-bottom: 1px solid var(--border-color); 
      flex-wrap: wrap; gap: 8px; z-index: 100;
    }
    #project-name { 
      background: var(--bg-secondary); color: var(--text-primary); 
      border: 1px solid var(--border-color); border-radius: 4px; padding: 6px 10px; width: 200px; 
    }
    button { 
      background: var(--accent-blue); border: none; color: white; padding: 6px 12px; 
      cursor: pointer; border-radius: 4px; font-size: 13px; transition: all 0.2s; 
    }
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    
    #saveFileBtn { background: var(--accent-cyan); }
    #previewBtn { background: #4895ef; }
    #sitePublishBtn { background: var(--accent-green); }
    #siteDeleteBtn { background: var(--accent-red); display: none; }
    #siteHistoryBtn { background: #764ba2; }
    .logout-btn { background: var(--accent-red); }
    
    #storage-info { background: #333; padding: 4px 10px; border-radius: 5px; font-size: 11px; margin-left: 10px; }
    #user-info { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    
    .url-panel-top { 
      display: flex; align-items: center; gap: 8px; background: var(--bg-tertiary); 
      padding: 4px 10px; border-radius: 6px; margin-left: 10px; font-size: 11px; 
    }
    .url-panel-top input { 
      background: var(--bg-primary); border: 1px solid var(--border-color); 
      color: var(--text-primary); padding: 4px 8px; border-radius: 4px; 
      font-family: monospace; font-size: 10px; width: 250px; 
    }
    .url-panel-top button { padding: 4px 8px; font-size: 11px; }
    
    .zoom-controls {
      display: flex; align-items: center; gap: 5px; margin-left: 10px;
      background: var(--bg-tertiary); padding: 4px 8px; border-radius: 6px;
    }
    .zoom-controls button { padding: 2px 8px; font-size: 14px; background: var(--bg-secondary); border-radius: 4px; min-width: 28px; }
    .zoom-controls span { font-size: 11px; min-width: 40px; text-align: center; color: var(--accent-cyan); }
    
    .project-type-indicator {
      background: var(--bg-tertiary); padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px;
    }
    
    .main-container { display: flex; flex: 1; overflow: hidden; }
    #editor-container { flex: 2; display: flex; flex-direction: column; overflow: hidden; }
    #tabs { 
      display: flex; background: var(--bg-secondary); align-items: center; 
      gap: 1px; overflow-x: auto; min-height: 36px; 
    }
    .tab-btn { 
      background: var(--bg-tertiary); padding: 6px 12px; position: relative; 
      padding-right: 25px; border-radius: 0; font-size: 12px; white-space: nowrap;
    }
    .tab-btn.active { background: var(--bg-primary); color: var(--text-primary); }
    .close-tab-btn { 
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%); 
      background: transparent; border: none; color: #999; cursor: pointer; font-size: 14px; 
    }
    #container { flex: 1; overflow: hidden; position: relative; }
    #simple-editor { 
      width: 100%; height: 100%; background: var(--bg-primary); color: #d4d4d4; 
      font-family: 'Consolas', monospace; font-size: 13px; padding: 10px; 
      border: none; resize: none; outline: none; 
    }
    
    #ai-sidebar { 
      width: 420px; background: var(--bg-secondary); border-left: 1px solid var(--border-color); 
      display: flex; flex-direction: column; position: relative; min-width: 250px; max-width: 600px; 
    }
    .resize-handle { 
      position: absolute; left: -3px; top: 0; width: 6px; height: 100%; 
      cursor: ew-resize; background: transparent; z-index: 100; 
    }
    .resize-handle:hover { background: var(--accent-cyan); }
    
    .sidebar-header { padding: 12px; background: var(--bg-tertiary); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
    .message { padding: 10px 14px; border-radius: 12px; max-width: 95%; word-wrap: break-word; font-size: 13px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { background: var(--accent-blue); align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.ai { background: #3d3d3d; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
    .message.ai.streaming { border-left: 3px solid var(--accent-purple); }
    .message.system { background: var(--accent-orange); align-self: center; font-size: 12px; border-radius: 20px; }
    
    .chat-controls { padding: 12px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); }
    .mode-toggle { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; }
    .mode-toggle-btn { flex: 1; background: #333; padding: 8px; font-size: 13px; border-radius: 8px; }
    .mode-toggle-btn.active { background: var(--accent-purple); }
    .mode-toggle-btn.edit-mode.active { background: #4caf50; }
    .chat-input-wrapper { display: flex; gap: 10px; }
    .chat-input-wrapper textarea { 
      flex: 1; background: var(--bg-primary); border: 1px solid var(--border-color); 
      color: var(--text-primary); padding: 10px; border-radius: 8px; resize: none; 
      font-family: inherit; font-size: 13px; 
    }
    .chat-input-wrapper button { background: var(--accent-purple); padding: 10px 20px; border-radius: 8px; }
    
    .quick-actions { 
      display: flex; gap: 5px; flex-wrap: wrap; padding: 8px 12px; 
      background: var(--bg-primary); border-top: 1px solid var(--border-color); 
    }
    .quick-actions button { background: #333; padding: 4px 8px; font-size: 10px; border-radius: 12px; }
    .quick-actions button:hover { background: var(--accent-blue); }
    
    /* Worker Editor Window */
    .worker-editor-window {
      position: fixed; background: var(--bg-secondary); border: 2px solid var(--accent-cyan);
      border-radius: 12px; z-index: 500; min-width: 350px; min-height: 250px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6); display: none; flex-direction: column;
      resize: both; overflow: hidden;
    }
    .worker-editor-header-window {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: var(--bg-tertiary); cursor: move;
      user-select: none; border-radius: 10px 10px 0 0; border-bottom: 1px solid var(--border-color);
    }
    .worker-editor-header-window .title { font-weight: bold; color: var(--accent-cyan); font-size: 13px; }
    .worker-editor-header-window .window-controls { display: flex; gap: 6px; }
    .worker-editor-header-window .window-controls button {
      width: 28px; height: 28px; border-radius: 50%; font-size: 14px; padding: 0;
      display: flex; align-items: center; justify-content: center; background: transparent;
      border: 1px solid var(--border-color); color: var(--text-primary); cursor: pointer;
    }
    .worker-editor-header-window .window-controls button.close:hover { background: var(--accent-red); border-color: var(--accent-red); }
    .worker-editor-body-window {
      flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow: auto;
    }
    .worker-editor-body-window textarea {
      flex: 1; background: var(--bg-primary); border: 1px solid var(--border-color);
      color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 12px;
      padding: 10px; border-radius: 6px; resize: none; min-height: 120px;
    }
    .worker-editor-body-window .worker-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .worker-editor-body-window .worker-buttons button { padding: 6px 12px; font-size: 11px; }
    .worker-editor-window.minimized { min-height: auto !important; height: auto !important; resize: none; }
    .worker-editor-window.minimized .worker-editor-body-window { display: none; }
    
    .context-menu {
      position: fixed; background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 8px 0; z-index: 10000; min-width: 200px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5); display: none;
    }
    .context-menu .menu-item {
      padding: 10px 16px; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s; color: var(--text-primary);
    }
    .context-menu .menu-item:hover { background: var(--accent-blue); }
    .context-menu .menu-divider { height: 1px; background: var(--border-color); margin: 6px 0; }
    .context-menu .menu-shortcut { margin-left: auto; color: var(--text-secondary); font-size: 11px; }
    
    .notification { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; z-index: 1000; animation: slideIn 0.3s; font-size: 13px; }
    .notification.success { background: #4caf50; }
    .notification.error { background: var(--accent-red); }
    .notification.info { background: #2196f3; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .publish-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .publish-modal-content { background: var(--bg-tertiary); border-radius: 16px; padding: 30px; max-width: 500px; width: 90%; text-align: center; }
    .publish-modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
    
    .activities-panel { background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 8px; max-height: 120px; overflow-y: auto; }
    .activities-header { font-size: 11px; color: var(--accent-cyan); margin-bottom: 5px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="Loading">
    <h2>Carregando CodeHUB...</h2>
  </div>

  <div id="app-content" style="display: none; height: 100vh; display: flex; flex-direction: column;">
    <div id="top-bar">
      <button onclick="window.location.href='index.html'">🏠 Início</button>
      <div class="project-type-indicator">
        <span>💻</span>
        <span style="color:#4cc9f0;">Código</span>
      </div>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="sitePublishBtn">🚀 Publicar Site</button>
      <button id="siteDeleteBtn">🗑️ Deletar Site</button>
      <button id="siteHistoryBtn">📋 Histórico</button>
      <div class="url-panel-top" id="urlPanelTop" style="display: none;">
        <span>🔗</span>
        <input type="text" id="fileUrlTop" readonly onclick="this.select()">
        <button id="openUrlTopBtn">Abrir</button>
        <button id="copyUrlTopBtn">📋 Copiar</button>
      </div>
      <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">➖</button>
        <span id="zoomLevel">100%</span>
        <button onclick="changeZoom(0.1)">➕</button>
        <button onclick="resetZoom()">↺</button>
      </div>
      <div id="user-info">
        <span id="user-name"></span>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="main-container">
      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container"><textarea id="simple-editor" placeholder="Editor - você já pode digitar!" style="width:100%; height:100%; background:#1e1e1e; color:#d4d4d4; font-family:monospace; padding:10px; border:none; resize:none;"></textarea></div>
      </div>

      <div id="ai-sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="sidebar-header"><h3>🤖 Assistente IA</h3></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="quick-actions" id="quickActions">
          <button onclick="quickAction('criar-worker')">➕ Criar Worker</button>
          <button onclick="quickAction('editar-worker')">✏️ Editar Worker</button>
          <button onclick="quickAction('explicar-worker')">📖 Explicar</button>
          <button onclick="quickAction('listar-workers')">📋 Listar</button>
        </div>
        <div class="chat-controls">
          <div class="mode-toggle">
            <button class="mode-toggle-btn" id="chatModeBtn" onclick="setMode('chat')">💬 Conversar</button>
            <button class="mode-toggle-btn edit-mode active" id="editModeBtn" onclick="setMode('edit')">✏️ Editar</button>
          </div>
          <div class="chat-input-wrapper">
            <textarea id="chatInput" placeholder="Digite seu comando..." rows="2"></textarea>
            <button id="sendChatBtn">Enviar</button>
          </div>
        </div>
        <div class="worker-editor" style="background:var(--bg-primary);border-top:1px solid var(--border-color);padding:8px;">
          <div class="worker-editor-header"><span>📝 Código do Worker (.sc)</span><div class="worker-editor-buttons"><button onclick="saveWorkerCode()">💾 Salvar</button><button id="workerPublishBtn" class="update-worker" onclick="publishWorker()">🚀 Publicar Worker</button></div></div>
          <textarea id="workerCode" rows="4" placeholder="// Código do Worker .sc"></textarea>
        </div>
        <div class="activities-panel">
          <div class="activities-header">📊 Atividades</div>
          <div id="activitiesList"><span style="color:#888;font-size:11px;">🔍 Carregando...</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Worker Editor Flutuante -->
  <div class="worker-editor-window" id="workerEditorWindow" style="top:100px;left:150px;width:500px;height:400px;">
    <div class="worker-editor-header-window" id="workerEditorHeader">
      <div class="title">📝 <span id="workerWindowTitle">Editor de Worker</span></div>
      <div class="window-controls">
        <button onclick="toggleWorkerWindowSize()" title="Minimizar">━</button>
        <button class="close" onclick="closeWorkerWindow()" title="Fechar">✕</button>
      </div>
    </div>
    <div class="worker-editor-body-window">
      <textarea id="workerCodeWindow" rows="10" placeholder="// Código do Worker .sc"></textarea>
      <div class="worker-buttons">
        <button onclick="saveWorkerCodeWindow()">💾 Salvar</button>
        <button onclick="publishWorkerWindow()" style="background:#ff9800;">🚀 Publicar Worker</button>
        <button onclick="testWorkerWindow()" style="background:#22c55e;">▶️ Testar</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="menu-item" onclick="contextAction('save')">💾 Salvar <span class="menu-shortcut">Ctrl+S</span></div>
    <div class="menu-item" onclick="contextAction('publish')">🚀 Publicar Site</div>
    <div class="menu-item" onclick="contextAction('update')">🔄 Atualizar Site</div>
    <div class="menu-item" onclick="contextAction('delete')">🗑️ Deletar Site</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="contextAction('history')">📋 Histórico</div>
    <div class="menu-item" onclick="contextAction('openWorker')">📝 Abrir Worker</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="contextAction('zoomIn')">🔍 Zoom +</div>
    <div class="menu-item" onclick="contextAction('zoomOut')">🔍 Zoom -</div>
    <div class="menu-item" onclick="contextAction('zoomReset')">↺ Reset Zoom</div>
  </div>

  <!-- Publish Modal -->
  <div id="publishModal" class="publish-modal">
    <div class="publish-modal-content">
      <h3 id="modalTitle" style="color:white;">🚀 Publicar?</h3>
      <p id="modalMessage" style="color:#ccc;margin:15px 0;"></p>
      <div class="publish-modal-buttons">
        <button id="publishYesBtn" style="background:#4caf50;padding:10px 30px;border-radius:8px;">✅ Sim</button>
        <button id="publishNoBtn" style="background:#f44336;padding:10px 30px;border-radius:8px;">❌ Não</button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div id="historyModal" class="publish-modal">
    <div class="publish-modal-content" style="max-width:600px;max-height:70vh;overflow-y:auto;">
      <h3 style="color:white;">📋 Histórico de Sites</h3>
      <div id="historyList" style="color:#ccc;text-align:left;margin:15px 0;"></div>
      <button onclick="closeHistoryModal()" style="background:#f44336;padding:10px 30px;border-radius:8px;">Fechar</button>
    </div>
  </div>

  <script>
    // ============== CONFIGURAÇÃO ==============
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // ============== VARIÁVEIS GLOBAIS ==============
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let currentZoom = 1;
    let useSimpleEditor = true;
    let currentMode = 'edit';
    
    // Dados do site (iguais ao exemplo)
    let sitesSalvos = JSON.parse(localStorage.getItem('codehub_sites') || '[]');
    let hostingSubdomain = null;
    let hostingDirectory = null;
    let hostingUrl = null;
    let siteCreated = false;
    
    // Worker
    let currentWorkerData = null;

    const ACTIVITY_SCRIPT_URL = "https://code.codehub.ct.ws/atividade.js";
    const urlParams = new URLSearchParams(window.location.search);
    currentProjectId = urlParams.get('projectId');

    // ============== ZOOM ==============
    function changeZoom(delta) {
      currentZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
      document.body.style.zoom = currentZoom;
      document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
      localStorage.setItem('codehub_zoom', currentZoom);
    }
    function resetZoom() { currentZoom = 1; document.body.style.zoom = 1; document.getElementById('zoomLevel').textContent = '100%'; localStorage.setItem('codehub_zoom', 1); }

    // ============== CONTEXT MENU ==============
    function initContextMenu() {
      const menu = document.getElementById('contextMenu');
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX, window.innerWidth - 220) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 300) + 'px';
      });
      document.addEventListener('click', (e) => { if (!menu.contains(e.target)) menu.style.display = 'none'; });
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey) {
          if (e.key === 's') { e.preventDefault(); saveCurrentFile(); }
          if (e.key === '=' || e.key === '+') { e.preventDefault(); changeZoom(0.1); }
          if (e.key === '-') { e.preventDefault(); changeZoom(-0.1); }
          if (e.key === '0') { e.preventDefault(); resetZoom(); }
        }
      });
    }

    function contextAction(action) {
      document.getElementById('contextMenu').style.display = 'none';
      switch(action) {
        case 'save': saveCurrentFile(); break;
        case 'publish': publishSite(); break;
        case 'update': updateSite(); break;
        case 'delete': deleteSite(); break;
        case 'history': showHistory(); break;
        case 'openWorker': openWorkerWindow(); break;
        case 'zoomIn': changeZoom(0.1); break;
        case 'zoomOut': changeZoom(-0.1); break;
        case 'zoomReset': resetZoom(); break;
      }
    }

    // ============== UTILITÁRIOS ==============
    function showNotification(msg, type) {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg; document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }

    function addChatMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      document.getElementById('chatMessages').appendChild(msgDiv);
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }

    async function garantirLoginPuter() {
      try { await puter.auth.getUser(); return true; } catch(e) {}
      try { await puter.auth.signIn(); return true; } catch(e) { return false; }
    }

    // Salvar site no localStorage (igual ao exemplo)
    function salvarSiteNoHistorico(subdomain, dir) {
      const site = {
        subdomain: subdomain,
        dir: dir,
        data: new Date().toLocaleString(),
        url: `https://${subdomain}.puter.site`
      };
      sitesSalvos = sitesSalvos.filter(s => s.subdomain !== subdomain);
      sitesSalvos.unshift(site);
      localStorage.setItem('codehub_sites', JSON.stringify(sitesSalvos));
    }

    function updateSiteButtons() {
      const publishBtn = document.getElementById('sitePublishBtn');
      const deleteBtn = document.getElementById('siteDeleteBtn');
      
      if (siteCreated) {
        publishBtn.textContent = '🔄 Atualizar Site';
        publishBtn.style.background = '#ff9800';
        deleteBtn.style.display = 'inline-block';
      } else {
        publishBtn.textContent = '🚀 Publicar Site';
        publishBtn.style.background = '#22c55e';
        deleteBtn.style.display = 'none';
      }
    }

    // ============== PUBLISH SITE (igual ao exemplo) ==============
    async function publishSite() {
      if (!await garantirLoginPuter()) {
        addChatMessage('❌ Faça login no Puter primeiro!', 'system');
        showNotification('Faça login no Puter!', 'error');
        return;
      }
      
      const indexFile = Object.values(files).find(f => (f.name || f.originalName) === 'index.html');
      if (!indexFile) { 
        addChatMessage('❌ Crie um index.html primeiro!', 'system'); 
        showNotification('Crie um index.html!', 'warning');
        return; 
      }
      
      if (siteCreated) {
        // Já tem site = ATUALIZAR
        await updateSite();
        return;
      }
      
      document.getElementById('modalTitle').textContent = '🚀 Publicar Site?';
      document.getElementById('modalMessage').textContent = 'Seu site será hospedado no Puter com URL pública.';
      document.getElementById('publishModal').style.display = 'flex';
      
      const yes = document.getElementById('publishYesBtn');
      const no = document.getElementById('publishNoBtn');
      
      const handler = async () => {
        document.getElementById('publishModal').style.display = 'none';
        yes.removeEventListener('click', handler);
        no.removeEventListener('click', cancelHandler);
        
        addChatMessage('🚀 Publicando site...', 'system');
        
        try {
          // PASSO 1: Criar diretório (como no exemplo)
          const dirName = `codehub_${currentProjectId.substring(0, 10)}_${Date.now().toString(36)}`;
          addChatMessage(`📁 Diretório: ${dirName}`, 'system');
          try { await puter.fs.mkdir(dirName); } catch {}
          
          // PASSO 2: Salvar TODOS os arquivos
          addChatMessage(`💾 Enviando arquivos...`, 'system');
          for (const [key, file] of Object.entries(files)) {
            const fileName = file.originalName || file.name;
            let content = file.content || '';
            if (fileName.endsWith('.html')) content = injectActivityScript(content);
            await puter.fs.write(`${dirName}/${fileName}`, content);
          }
          
          // PASSO 3: Criar site (subdomain + dir)
          const subdomain = puter.randName();
          addChatMessage(`🌐 Criando: ${subdomain}.puter.site`, 'system');
          const site = await puter.hosting.create(subdomain, dirName);
          
          // Salvar dados
          hostingSubdomain = site.subdomain;
          hostingDirectory = dirName;
          hostingUrl = `https://${site.subdomain}.puter.site`;
          siteCreated = true;
          
          // Salvar no histórico local (como no exemplo)
          salvarSiteNoHistorico(site.subdomain, dirName);
          
          // Mostrar URL
          document.getElementById('fileUrlTop').value = hostingUrl;
          document.getElementById('urlPanelTop').style.display = 'flex';
          updateSiteButtons();
          
          // Salvar no Firebase
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).set({
            url: hostingUrl, subdomain: hostingSubdomain,
            directory: hostingDirectory, publishedAt: new Date().toISOString()
          });
          
          addChatMessage(`✅ Publicado!<br>🔗 ${hostingUrl}`, 'ai');
          showNotification('✅ Site publicado!', 'success');
          navigator.clipboard.writeText(hostingUrl).catch(() => {});
          
        } catch(e) {
          addChatMessage(`❌ Erro: ${e.message}`, 'system');
          showNotification('Erro: ' + e.message, 'error');
        }
      };
      
      const cancelHandler = () => {
        document.getElementById('publishModal').style.display = 'none';
        yes.removeEventListener('click', handler);
        no.removeEventListener('click', cancelHandler);
      };
      
      yes.addEventListener('click', handler);
      no.addEventListener('click', cancelHandler);
    }

    // ============== UPDATE SITE (igual ao exemplo) ==============
    async function updateSite() {
      if (!siteCreated) { 
        showNotification('Publique primeiro!', 'warning'); 
        return; 
      }
      if (!await garantirLoginPuter()) return;
      
      addChatMessage('🔄 Atualizando site...', 'system');
      
      try {
        // Salvar todos os arquivos novamente
        for (const [key, file] of Object.entries(files)) {
          const fileName = file.originalName || file.name;
          let content = file.content || '';
          if (fileName.endsWith('.html')) content = injectActivityScript(content);
          await puter.fs.write(`${hostingDirectory}/${fileName}`, content);
        }
        
        // Atualizar (como no exemplo: update(subdomain, dir))
        await puter.hosting.update(hostingSubdomain, hostingDirectory);
        
        addChatMessage(`✅ Site atualizado!<br>🔗 ${hostingUrl}`, 'ai');
        showNotification('✅ Site atualizado!', 'success');
        
      } catch(e) {
        addChatMessage(`❌ Erro: ${e.message}`, 'system');
        showNotification('Erro: ' + e.message, 'error');
      }
    }

    // ============== DELETE SITE (igual ao exemplo) ==============
    async function deleteSite() {
      if (!siteCreated) { showNotification('Nenhum site para deletar', 'warning'); return; }
      
      if (!confirm(`⚠️ Deletar permanentemente:\n${hostingUrl}?`)) return;
      if (!await garantirLoginPuter()) return;
      
      addChatMessage('🗑️ Deletando site...', 'system');
      
      try {
        // Deletar (como no exemplo: hosting.delete(subdomain))
        await puter.hosting.delete(hostingSubdomain);
        
        // Remover do histórico local
        sitesSalvos = sitesSalvos.filter(s => s.subdomain !== hostingSubdomain);
        localStorage.setItem('codehub_sites', JSON.stringify(sitesSalvos));
        
        addChatMessage(`✅ Site deletado!`, 'system');
        showNotification('✅ Site deletado!', 'success');
        
        // Limpar
        hostingSubdomain = null;
        hostingDirectory = null;
        hostingUrl = null;
        siteCreated = false;
        
        document.getElementById('urlPanelTop').style.display = 'none';
        updateSiteButtons();
        
        // Remover do Firebase
        await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).remove();
        
      } catch(e) {
        addChatMessage(`❌ Erro: ${e.message}`, 'system');
        showNotification('Erro: ' + e.message, 'error');
      }
    }

    // ============== HISTÓRICO (igual ao exemplo) ==============
    async function showHistory() {
      const modal = document.getElementById('historyModal');
      const list = document.getElementById('historyList');
      
      modal.style.display = 'flex';
      
      // Buscar do Firebase + localStorage
      const snapshot = await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).once('value');
      const hostingData = snapshot.val();
      
      let html = '<div style="max-height:50vh;overflow-y:auto;">';
      
      // Site atual
      if (hostingData) {
        html += `<div style="background:#2d2d2d;padding:12px;border-radius:8px;margin-bottom:10px;border-left:3px solid #4cc9f0;">
          <strong style="color:#4cc9f0;">📌 Site Atual</strong><br>
          🔗 <a href="${hostingData.url}" target="_blank" style="color:#4895ef;">${hostingData.url}</a><br>
          📁 Pasta: ${hostingData.directory}<br>
          📅 ${new Date(hostingData.publishedAt).toLocaleString()}<br>
          <div style="margin-top:8px;">
            <button onclick="updateSiteFromHistory()" style="background:#ff9800;padding:4px 10px;font-size:11px;">🔄 Atualizar</button>
            <button onclick="deleteSiteFromHistory()" style="background:#f44336;padding:4px 10px;font-size:11px;">🗑️ Deletar</button>
          </div>
        </div>`;
      }
      
      // Histórico local
      if (sitesSalvos.length > 0) {
        html += '<strong style="color:#ff9800;">📋 Histórico Local:</strong>';
        sitesSalvos.forEach((site, i) => {
          html += `<div style="background:#2d2d2d;padding:10px;border-radius:6px;margin:5px 0;font-size:12px;">
            🔗 <a href="${site.url}" target="_blank" style="color:#4895ef;">${site.url}</a><br>
            📁 ${site.dir} | 📅 ${site.data}
          </div>`;
        });
      }
      
      if (!hostingData && sitesSalvos.length === 0) {
        html += '<p style="color:#888;">📭 Nenhum site no histórico</p>';
      }
      
      html += '</div>';
      list.innerHTML = html;
    }

    function closeHistoryModal() {
      document.getElementById('historyModal').style.display = 'none';
    }

    async function updateSiteFromHistory() {
      closeHistoryModal();
      await updateSite();
    }

    async function deleteSiteFromHistory() {
      closeHistoryModal();
      await deleteSite();
    }

    function injectActivityScript(html) {
      const script = `<script src="${ACTIVITY_SCRIPT_URL}?projectid=${currentProjectId}"><\/script>`;
      if (html.includes('</body>')) return html.replace('</body>', script + '\n</body>');
      if (html.includes('</html>')) return html.replace('</html>', script + '\n</html>');
      return html + script;
    }

    // ============== WORKER WINDOW ==============
    function initWorkerWindow() {
      const win = document.getElementById('workerEditorWindow');
      const header = document.getElementById('workerEditorHeader');
      let isDragging = false, startX, startY, startLeft, startTop;
      header.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        isDragging = true; startX = e.clientX; startY = e.clientY;
        startLeft = win.offsetLeft; startTop = win.offsetTop;
        win.style.transition = 'none'; document.body.style.userSelect = 'none';
      });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        win.style.left = Math.max(0, startLeft + e.clientX - startX) + 'px';
        win.style.top = Math.max(0, startTop + e.clientY - startY) + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (isDragging) { isDragging = false; win.style.transition = ''; document.body.style.userSelect = ''; }
      });
    }

    function openWorkerWindow() {
      const win = document.getElementById('workerEditorWindow');
      win.style.display = 'flex';
      if (currentWorkerData) {
        document.getElementById('workerCodeWindow').value = currentWorkerData.code || '';
        document.getElementById('workerWindowTitle').textContent = 'Worker: ' + currentWorkerData.name;
      }
    }
    function closeWorkerWindow() { document.getElementById('workerEditorWindow').style.display = 'none'; }
    function toggleWorkerWindowSize() { document.getElementById('workerEditorWindow').classList.toggle('minimized'); }

    async function saveWorkerCodeWindow() {
      if (!currentWorkerData) return;
      const code = document.getElementById('workerCodeWindow').value;
      const match = code.match(/router\.(get|post|put|delete)\(['"`](.*?)['"`]/);
      const route = match ? match[2] : '/api/hello.sc';
      await db.ref(`workers/${currentUser.uid}/${currentProjectId}/${currentWorkerData.id}`).update({ code, route, updatedAt: new Date().toISOString() });
      currentWorkerData.code = code;
      showNotification('Worker salvo!', 'success');
    }

    async function publishWorkerWindow() {
      await saveWorkerCodeWindow();
      await publishWorker();
    }

    async function testWorkerWindow() {
      if (!currentWorkerData?.fullUrl) { showNotification('Worker não publicado', 'warning'); return; }
      try {
        const res = await fetch(currentWorkerData.fullUrl);
        const data = await res.json();
        addChatMessage(`✅ Resposta: ${JSON.stringify(data)}`, 'ai');
      } catch(e) { addChatMessage(`❌ Erro: ${e.message}`, 'system'); }
    }

    // ============== WORKER ==============
    async function saveWorkerCode() {
      if (!currentWorkerData) { showNotification('Selecione um worker', 'warning'); return; }
      const code = document.getElementById('workerCode').value;
      const match = code.match(/router\.(get|post|put|delete)\(['"`](.*?)['"`]/);
      const route = match ? match[2] : '/api/hello.sc';
      await db.ref(`workers/${currentUser.uid}/${currentProjectId}/${currentWorkerData.id}`).update({ code, route, updatedAt: new Date().toISOString() });
      currentWorkerData.code = code;
      if (document.getElementById('workerEditorWindow').style.display === 'flex') {
        document.getElementById('workerCodeWindow').value = code;
      }
      showNotification('Worker salvo!', 'success');
    }

    async function publishWorker() {
      if (!currentWorkerData) return;
      await saveWorkerCode();
      if (!await garantirLoginPuter()) return;
      
      addChatMessage('🚀 Publicando worker...', 'system');
      try {
        const cleanName = currentWorkerData.name.replace(/[^a-zA-Z0-9]/g, '').substring(0, 15);
        const fileName = `${cleanName}_${Date.now().toString(36)}.sc`;
        await puter.fs.write(fileName, currentWorkerData.code);
        
        const deployName = `${cleanName}_${Date.now().toString(36)}`;
        if (currentWorkerData.deployedName) {
          try { await puter.workers.delete(currentWorkerData.deployedName); } catch(e) {}
        }
        
        const w = await puter.workers.create(deployName, fileName);
        const fullUrl = `https://${deployName}.${w.username || 'puter'}.work${currentWorkerData.route}`;
        
        await db.ref(`workers/${currentUser.uid}/${currentProjectId}/${currentWorkerData.id}`).update({
          url: fullUrl, fullUrl, deployedName: deployName, deployedAt: new Date().toISOString()
        });
        currentWorkerData.url = fullUrl;
        currentWorkerData.fullUrl = fullUrl;
        addChatMessage(`✅ Worker publicado!<br>🔗 ${fullUrl}`, 'ai');
        showNotification('Worker publicado!', 'success');
      } catch(e) {
        addChatMessage(`❌ Erro: ${e.message}`, 'system');
      }
    }

    // ============== ARQUIVOS ==============
    async function saveCurrentFile() {
      if (!currentFile) return;
      files[currentFile].content = document.getElementById('simple-editor').value;
      files[currentFile].size = new Blob([files[currentFile].content]).size;
      files[currentFile].updatedAt = new Date().toISOString();
      await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).update({ files, updatedAt: new Date().toISOString() });
      showNotification('Salvo! 💾', 'success');
    }

    async function openFile(fileKey) {
      if (!files[fileKey]) return;
      currentFile = fileKey;
      document.getElementById('simple-editor').value = files[fileKey].content || '';
      updateTabs();
    }

    function updateTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = '';
      Object.keys(files).forEach(key => {
        const tab = document.createElement('button');
        tab.className = `tab-btn ${key === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(key);
        tab.innerHTML = `${files[key].name || files[key].originalName || 'arquivo'} <button class="close-tab-btn" onclick="event.stopPropagation();closeFile('${key}')">&times;</button>`;
        tabs.appendChild(tab);
      });
    }

    async function closeFile(fileKey) {
      if (Object.keys(files).length <= 1) return;
      delete files[fileKey];
      await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).update({ files, updatedAt: new Date().toISOString() });
      if (fileKey === currentFile) await openFile(Object.keys(files)[0]);
      updateTabs();
    }

    function previewProject() {
      const index = Object.values(files).find(f => (f.name || f.originalName) === 'index.html');
      if (index?.content) {
        const blob = new Blob([index.content], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
      } else {
        showNotification('Crie um index.html', 'warning');
      }
    }

    // ============== QUICK ACTIONS ==============
    function quickAction(action) {
      const input = document.getElementById('chatInput');
      switch(action) {
        case 'criar-worker': input.value = 'Crie um worker chamado api com rota GET /api/dados.sc'; break;
        case 'editar-worker': input.value = currentWorkerData ? `Edite o worker ${currentWorkerData.name}` : 'Edite o worker'; break;
        case 'explicar-worker': if (currentWorkerData) addChatMessage(`📦 ${currentWorkerData.name}: ${currentWorkerData.code?.substring(0, 300)}`, 'ai'); break;
        case 'listar-workers': 
          const workerSnap = db.ref(`workers/${currentUser.uid}/${currentProjectId}`).once('value').then(s => {
            const workers = s.val();
            if (workers) Object.entries(workers).forEach(([id, w]) => addChatMessage(`📦 ${w.name} | ${w.route}`, 'ai'));
            else addChatMessage('📭 Nenhum worker', 'system');
          });
          break;
      }
      input.focus();
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('chatModeBtn').classList.toggle('active', mode === 'chat');
      document.getElementById('editModeBtn').classList.toggle('active', mode === 'edit');
      localStorage.setItem('codehub_mode', mode);
    }

    async function sendToAI() {
      const msg = document.getElementById('chatInput').value.trim();
      if (!msg) return;
      addChatMessage(msg, 'user');
      document.getElementById('chatInput').value = '';
      
      try {
        await garantirLoginPuter();
        const res = await puter.ai.chat(msg, { stream: false });
        addChatMessage(res, 'ai');
      } catch(e) {
        addChatMessage('Erro: ' + e.message, 'system');
      }
    }

    // ============== INIT ==============
    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'auth.html'; return; }
      currentUser = user;
      document.getElementById('user-name').textContent = user.displayName || user.email?.split('@')[0] || 'Usuário';
      
      const savedZoom = localStorage.getItem('codehub_zoom');
      if (savedZoom) { currentZoom = parseFloat(savedZoom); document.body.style.zoom = currentZoom; }
      document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
      
      const savedMode = localStorage.getItem('codehub_mode');
      setMode(savedMode === 'chat' ? 'chat' : 'edit');
      
      if (currentProjectId) {
        const snapshot = await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).once('value');
        const data = snapshot.val();
        if (data) {
          document.getElementById('project-name').value = data.name || '';
          files = data.files || {};
          
          if (data.hosting?.url) {
            hostingUrl = data.hosting.url;
            hostingSubdomain = data.hosting.subdomain;
            hostingDirectory = data.hosting.directory;
            siteCreated = true;
            document.getElementById('fileUrlTop').value = hostingUrl;
            document.getElementById('urlPanelTop').style.display = 'flex';
          }
          updateSiteButtons();
          
          const workerSnap = await db.ref(`workers/${currentUser.uid}/${currentProjectId}`).once('value');
          const workers = workerSnap.val();
          if (workers) {
            const first = Object.entries(workers)[0];
            if (first) { currentWorkerData = { id: first[0], ...first[1] }; document.getElementById('workerCode').value = currentWorkerData.code || ''; }
          }
          
          const keys = Object.keys(files);
          if (keys.length > 0) await openFile(keys[0]);
          updateTabs();
        }
      }
      
      document.getElementById('loading-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        initContextMenu();
        initWorkerWindow();
        addChatMessage('🤖 Olá! Pronto para codar! 🚀', 'system');
      }, 300);
    });

    // Event listeners
    document.getElementById('saveFileBtn').addEventListener('click', saveCurrentFile);
    document.getElementById('previewBtn').addEventListener('click', previewProject);
    document.getElementById('sitePublishBtn').addEventListener('click', publishSite);
    document.getElementById('siteDeleteBtn').addEventListener('click', deleteSite);
    document.getElementById('siteHistoryBtn').addEventListener('click', showHistory);
    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));
    document.getElementById('openUrlTopBtn')?.addEventListener('click', () => { if (hostingUrl) window.open(hostingUrl, '_blank'); });
    document.getElementById('copyUrlTopBtn')?.addEventListener('click', () => { 
      if (hostingUrl) { navigator.clipboard.writeText(hostingUrl); showNotification('📋 URL copiada!', 'success'); }
    });
    document.getElementById('project-name').addEventListener('blur', async function() {
      const name = this.value.trim();
      if (name && currentProjectId) await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(name);
    });
    document.getElementById('sendChatBtn').addEventListener('click', sendToAI);
    document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); } });
    
    // Resize
    const handle = document.getElementById('resizeHandle');
    let isResizing = false;
    handle.addEventListener('mousedown', (e) => { isResizing = true; e.preventDefault(); });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const w = window.innerWidth - e.clientX;
      if (w >= 250 && w <= 600) document.getElementById('ai-sidebar').style.width = w + 'px';
    });
    document.addEventListener('mouseup', () => { isResizing = false; });
    
    // Fechar modais
    document.getElementById('publishModal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });
    document.getElementById('historyModal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });

    // Expor funções
    window.contextAction = contextAction;
    window.changeZoom = changeZoom;
    window.resetZoom = resetZoom;
    window.closeFile = closeFile;
    window.saveCurrentFile = saveCurrentFile;
    window.publishSite = publishSite;
    window.updateSite = updateSite;
    window.deleteSite = deleteSite;
    window.showHistory = showHistory;
    window.closeHistoryModal = closeHistoryModal;
    window.updateSiteFromHistory = updateSiteFromHistory;
    window.deleteSiteFromHistory = deleteSiteFromHistory;
    window.saveWorkerCode = saveWorkerCode;
    window.publishWorker = publishWorker;
    window.openWorkerWindow = openWorkerWindow;
    window.closeWorkerWindow = closeWorkerWindow;
    window.toggleWorkerWindowSize = toggleWorkerWindowSize;
    window.saveWorkerCodeWindow = saveWorkerCodeWindow;
    window.publishWorkerWindow = publishWorkerWindow;
    window.testWorkerWindow = testWorkerWindow;
    window.previewProject = previewProject;
    window.setMode = setMode;
    window.quickAction = quickAction;
  </script>
</body>
</html>
