<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    :root {
      --zoom-level: 1;
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d2d;
      --border-color: #333;
      --text-primary: #fff;
      --text-secondary: #888;
      --accent-blue: #4361ee;
      --accent-cyan: #4cc9f0;
      --accent-green: #22c55e;
      --accent-orange: #ff9800;
      --accent-red: #f44336;
      --accent-purple: #9c27b0;
      --accent-pink: #f72585;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden;
      zoom: var(--zoom-level);
    }
    
    #loading-screen { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: radial-gradient(circle at center, #1e293b, #0f172a); 
      display: flex; justify-content: center; align-items: center; flex-direction: column; 
      z-index: 9999; transition: opacity 0.5s ease; 
    }
    .loader { width: 80px; animation: spin 1s linear infinite; border-radius: 50%; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    #top-bar { 
      display: flex; padding: 8px 12px; background: var(--bg-primary); 
      align-items: center; border-bottom: 1px solid var(--border-color); 
      flex-wrap: wrap; gap: 8px; z-index: 100;
    }
    #project-name { 
      background: var(--bg-secondary); color: var(--text-primary); 
      border: 1px solid var(--border-color); border-radius: 4px; padding: 6px 10px; width: 200px; 
    }
    button { 
      background: var(--accent-blue); border: none; color: white; padding: 6px 12px; 
      cursor: pointer; border-radius: 4px; font-size: 13px; transition: all 0.2s; 
    }
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    #saveFileBtn { background: var(--accent-cyan); }
    #previewBtn { background: #4895ef; }
    #sitePublishBtn { background: var(--accent-green); }
    #pdfExportBtn { background: var(--accent-pink); }
    .logout-btn { background: var(--accent-red); }
    
    #storage-info { background: #333; padding: 4px 10px; border-radius: 5px; font-size: 11px; }
    #user-info { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    
    .url-panel-top { 
      display: flex; align-items: center; gap: 8px; background: var(--bg-tertiary); 
      padding: 4px 10px; border-radius: 6px; font-size: 11px; 
    }
    .url-panel-top input { 
      background: var(--bg-primary); border: 1px solid var(--border-color); 
      color: var(--text-primary); padding: 4px 8px; border-radius: 4px; 
      font-family: monospace; font-size: 10px; width: 250px; 
    }
    
    .zoom-controls {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg-tertiary); padding: 4px 8px; border-radius: 6px;
    }
    .zoom-controls button { padding: 2px 8px; font-size: 14px; background: var(--bg-secondary); }
    .zoom-controls span { font-size: 11px; min-width: 40px; text-align: center; color: var(--accent-cyan); }
    
    .project-type-indicator {
      background: var(--bg-tertiary); padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px;
    }
    .type-code { color: var(--accent-blue); }
    .type-pdf { color: var(--accent-pink); }
    
    .main-container { display: flex; flex: 1; overflow: hidden; }
    #editor-container { flex: 2; display: flex; flex-direction: column; overflow: hidden; }
    #tabs { 
      display: flex; background: var(--bg-secondary); align-items: center; 
      gap: 1px; overflow-x: auto; min-height: 36px; 
    }
    .tab-btn { 
      background: var(--bg-tertiary); padding: 6px 12px; position: relative; 
      padding-right: 25px; border-radius: 0; font-size: 12px; white-space: nowrap;
    }
    .tab-btn.active { background: var(--bg-primary); }
    .close-tab-btn { 
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%); 
      background: transparent; border: none; color: #999; cursor: pointer; font-size: 14px; 
    }
    #container { flex: 1; overflow: hidden; position: relative; }
    #simple-editor { 
      width: 100%; height: 100%; background: var(--bg-primary); color: #d4d4d4; 
      font-family: 'Consolas', monospace; font-size: 13px; padding: 10px; 
      border: none; resize: none; outline: none; 
    }
    
    /* PDF Editor */
    #pdf-editor-container {
      width: 100%; height: 100%; background: #f5f5f5; 
      display: flex; flex-direction: column; align-items: center; 
      padding: 30px; overflow-y: auto;
    }
    #pdf-canvas-area {
      background: white; width: 100%; max-width: 800px; 
      min-height: 600px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      padding: 40px;
    }
    #pdf-title-input {
      width: 100%; font-size: 28px; font-weight: bold; border: none;
      border-bottom: 2px solid #e0e0e0; padding: 10px; margin-bottom: 20px;
      background: transparent; outline: none; font-family: inherit;
    }
    #pdf-content-editor {
      width: 100%; min-height: 400px; border: 1px solid #e0e0e0;
      border-radius: 8px; padding: 15px; font-size: 14px; line-height: 1.8;
      font-family: inherit; resize: vertical; background: #fafafa;
    }
    .pdf-toolbar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .pdf-toolbar button {
      background: var(--accent-pink); padding: 8px 16px; font-size: 12px;
    }
    .pdf-page-indicator {
      text-align: center; padding: 10px; color: #666; font-size: 12px;
    }
    
    #ai-sidebar { 
      width: 420px; background: var(--bg-secondary); border-left: 1px solid var(--border-color); 
      display: flex; flex-direction: column; position: relative; min-width: 250px; max-width: 600px; 
    }
    .resize-handle { 
      position: absolute; left: -3px; top: 0; width: 6px; height: 100%; 
      cursor: ew-resize; background: transparent; z-index: 100; 
    }
    .resize-handle:hover { background: var(--accent-cyan); }
    .sidebar-header { padding: 12px; background: var(--bg-tertiary); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
    .message { padding: 10px 14px; border-radius: 12px; max-width: 95%; word-wrap: break-word; font-size: 13px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { background: var(--accent-blue); align-self: flex-end; }
    .message.ai { background: #3d3d3d; align-self: flex-start; white-space: pre-wrap; }
    .message.ai.streaming { border-left: 3px solid var(--accent-purple); }
    .message.system { background: var(--accent-orange); align-self: center; font-size: 12px; border-radius: 20px; }
    .chat-controls { padding: 12px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); }
    .chat-input-wrapper { display: flex; gap: 10px; }
    .chat-input-wrapper textarea { flex: 1; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px; border-radius: 8px; resize: none; }
    .chat-input-wrapper button { background: var(--accent-purple); padding: 10px 20px; border-radius: 8px; }
    
    .context-menu {
      position: fixed; background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 8px 0; z-index: 10000; min-width: 200px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5); display: none;
    }
    .context-menu .menu-item {
      padding: 10px 16px; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s;
    }
    .context-menu .menu-item:hover { background: var(--accent-blue); }
    .context-menu .menu-divider { height: 1px; background: var(--border-color); margin: 6px 0; }
    
    .notification { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; z-index: 1000; animation: slideIn 0.3s; }
    .notification.success { background: #4caf50; }
    .notification.error { background: var(--accent-red); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .publish-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .publish-modal-content { background: var(--bg-tertiary); border-radius: 16px; padding: 30px; max-width: 400px; width: 90%; text-align: center; }
    .publish-modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="Loading">
    <h2>Carregando Editor...</h2>
  </div>

  <div id="app-content" style="display:none;height:100vh;display:flex;flex-direction:column;">
    <div id="top-bar">
      <button onclick="window.location.href='index.html'">🏠 Início</button>
      <div class="project-type-indicator" id="projectTypeIndicator">
        <span id="projectTypeIcon">💻</span>
        <span id="projectTypeLabel">Código</span>
      </div>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="sitePublishBtn">🚀 Publicar Site</button>
      <button id="pdfExportBtn" style="display:none;background:#f72585;">📄 Exportar PDF</button>
      <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">➖</button>
        <span id="zoomLevel">100%</span>
        <button onclick="changeZoom(0.1)">➕</button>
        <button onclick="resetZoom()">↺</button>
      </div>
      <div class="url-panel-top" id="urlPanelTop" style="display:none;">
        <input type="text" id="fileUrlTop" readonly onclick="this.select()">
        <button id="openUrlTopBtn">Abrir</button>
      </div>
      <div id="user-info">
        <span id="user-name"></span>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="main-container">
      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container">
          <textarea id="simple-editor" placeholder="Editor..." style="width:100%;height:100%;background:#1e1e1e;color:#d4d4d4;font-family:monospace;padding:10px;border:none;resize:none;"></textarea>
          <div id="pdf-editor-container" style="display:none;">
            <div id="pdf-canvas-area">
              <div class="pdf-toolbar">
                <button onclick="addPdfPage()">➕ Nova Página</button>
                <button onclick="formatPdfBold()">🔤 Negrito</button>
                <button onclick="formatPdfItalic()">📝 Itálico</button>
                <button onclick="savePdfDocument()">💾 Salvar PDF</button>
              </div>
              <input type="text" id="pdf-title-input" placeholder="Título do Documento...">
              <textarea id="pdf-content-editor" placeholder="Comece a escrever seu documento..."></textarea>
              <div class="pdf-page-indicator">Página 1 de 1</div>
            </div>
          </div>
        </div>
      </div>

      <div id="ai-sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="sidebar-header"><h3>🤖 Assistente IA</h3></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-controls">
          <div class="chat-input-wrapper">
            <textarea id="chatInput" placeholder="Digite seu comando..." rows="2"></textarea>
            <button id="sendChatBtn">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="context-menu" id="contextMenu">
    <div class="menu-item" onclick="contextAction('save')">💾 Salvar</div>
    <div class="menu-item" onclick="contextAction('preview')">👁️ Preview</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="contextAction('zoomIn')">🔍 Zoom +</div>
    <div class="menu-item" onclick="contextAction('zoomOut')">🔍 Zoom -</div>
    <div class="menu-item" onclick="contextAction('zoomReset')">↺ Reset Zoom</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="contextAction('newFile')">📄 Novo Arquivo</div>
    <div class="menu-item" onclick="contextAction('clearChat')">🗑️ Limpar Chat</div>
  </div>

  <div id="publishModal" class="publish-modal">
    <div class="publish-modal-content">
      <h3 id="modalTitle">🚀 Publicar?</h3>
      <p id="modalMessage"></p>
      <div class="publish-modal-buttons">
        <button class="btn-publish-yes" id="publishYesBtn" style="background:#4caf50;">✅ Sim</button>
        <button class="btn-publish-no" id="publishNoBtn" style="background:#f44336;">❌ Não</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let currentHostingUrl = null;
    let currentHostingSubdomain = null;
    let currentHostingDirectory = null;
    let siteCreated = false;
    let useSimpleEditor = true;
    let currentZoom = 1;
    let projectType = 'code'; // 'code' ou 'pdf'
    let cloudPath = null;

    const urlParams = new URLSearchParams(window.location.search);
    currentProjectId = urlParams.get('projectId');

    // ============== ZOOM ==============
    function changeZoom(delta) {
      currentZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
      document.body.style.zoom = currentZoom;
      document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
      localStorage.setItem('codehub_zoom', currentZoom);
    }
    function resetZoom() { currentZoom = 1; document.body.style.zoom = 1; document.getElementById('zoomLevel').textContent = '100%'; }

    // ============== CONTEXT MENU ==============
    function initContextMenu() {
      const menu = document.getElementById('contextMenu');
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX, window.innerWidth - 220) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 250) + 'px';
      });
      document.addEventListener('click', (e) => { if (!menu.contains(e.target)) menu.style.display = 'none'; });
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveCurrentFile(); }
      });
    }

    window.contextAction = function(action) {
      document.getElementById('contextMenu').style.display = 'none';
      switch(action) {
        case 'save': saveCurrentFile(); break;
        case 'preview': previewProject(); break;
        case 'zoomIn': changeZoom(0.1); break;
        case 'zoomOut': changeZoom(-0.1); break;
        case 'zoomReset': resetZoom(); break;
        case 'newFile': 
          const name = prompt('Nome do arquivo:', 'novo.txt');
          if (name) { const key = btoa(name).replace(/=/g, ''); files[key] = { name, content: '', size: 0, createdAt: new Date().toISOString() }; saveProject(); openFile(key); updateTabs(); }
          break;
        case 'clearChat':
          if (confirm('Limpar chat?')) { db.ref(`chats/${currentUser.uid}/${currentProjectId}`).remove(); document.getElementById('chatMessages').innerHTML = ''; addChatMessage('🤖 Chat limpo!', 'system'); }
          break;
      }
    }

    // ============== INICIALIZAÇÃO ==============
    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'auth.html'; return; }
      currentUser = user;
      document.getElementById('user-name').textContent = user.displayName || user.email?.split('@')[0] || 'Usuário';
      
      const savedZoom = localStorage.getItem('codehub_zoom');
      if (savedZoom) { currentZoom = parseFloat(savedZoom); document.body.style.zoom = currentZoom; }
      document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
      
      if (currentProjectId) {
        await loadProjectData();
        await loadChatHistory();
      }
      
      document.getElementById('loading-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
      }, 300);
      
      setupEventListeners();
      initContextMenu();
      initResizing();
    });

    async function loadProjectData() {
      const snapshot = await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).once('value');
      const data = snapshot.val();
      if (!data) return;
      
      projectType = data.type || 'code';
      cloudPath = data.cloudPath || null;
      
      // Atualizar indicador de tipo
      const typeIcon = document.getElementById('projectTypeIcon');
      const typeLabel = document.getElementById('projectTypeLabel');
      if (projectType === 'pdf') {
        typeIcon.textContent = '📄';
        typeLabel.textContent = 'PDF';
        typeLabel.className = 'type-pdf';
        document.getElementById('pdfExportBtn').style.display = 'inline-block';
        document.getElementById('sitePublishBtn').style.display = 'none';
        showPdfEditor();
      } else {
        typeIcon.textContent = '💻';
        typeLabel.textContent = 'Código';
        typeLabel.className = 'type-code';
        document.getElementById('pdfExportBtn').style.display = 'none';
        document.getElementById('sitePublishBtn').style.display = 'inline-block';
        showCodeEditor();
      }
      
      document.getElementById('project-name').value = data.name || '';
      files = data.files || {};
      
      if (data.hosting?.url) {
        currentHostingUrl = data.hosting.url;
        currentHostingSubdomain = data.hosting.subdomain;
        siteCreated = true;
        document.getElementById('fileUrlTop').value = currentHostingUrl;
        document.getElementById('urlPanelTop').style.display = 'flex';
      }
      
      if (projectType === 'pdf' && cloudPath) {
        await loadPdfFromCloud();
      }
      
      const keys = Object.keys(files);
      if (keys.length > 0) await openFile(keys[0]);
      updateTabs();
    }

    function showCodeEditor() {
      document.getElementById('pdf-editor-container').style.display = 'none';
      document.getElementById('simple-editor').style.display = 'block';
    }

    function showPdfEditor() {
      document.getElementById('simple-editor').style.display = 'none';
      document.getElementById('pdf-editor-container').style.display = 'flex';
    }

    async function loadPdfFromCloud() {
      try {
        const blob = await puter.fs.read(`${cloudPath}/document.json`);
        const text = await blob.text();
        const data = JSON.parse(text);
        document.getElementById('pdf-title-input').value = data.title || '';
        document.getElementById('pdf-content-editor').value = data.content || '';
      } catch(e) {
        console.log('PDF ainda não salvo no Cloud');
      }
    }

    async function savePdfDocument() {
      if (projectType !== 'pdf' || !cloudPath) return;
      try {
        const pdfData = {
          title: document.getElementById('pdf-title-input').value,
          content: document.getElementById('pdf-content-editor').value,
          updatedAt: new Date().toISOString()
        };
        await puter.fs.write(`${cloudPath}/document.json`, JSON.stringify(pdfData, null, 2));
        showNotification('PDF salvo no Cloud! 💾', 'success');
      } catch(e) {
        showNotification('Erro ao salvar: ' + e.message, 'error');
      }
    }

    // Funções do editor PDF
    window.addPdfPage = function() {
      const editor = document.getElementById('pdf-content-editor');
      editor.value += '\n\n--- Nova Página ---\n\n';
      showNotification('Nova página adicionada!', 'info');
    }
    window.formatPdfBold = function() { showNotification('Selecione o texto e use Ctrl+B', 'info'); }
    window.formatPdfItalic = function() { showNotification('Selecione o texto e use Ctrl+I', 'info'); }

    // ============== FUNÇÕES DO EDITOR ==============
    async function saveProject() {
      await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).update({ files, updatedAt: new Date().toISOString() });
    }

    async function openFile(fileKey) {
      if (!files[fileKey]) return;
      currentFile = fileKey;
      const content = files[fileKey].content || '';
      document.getElementById('simple-editor').value = content;
      updateTabs();
    }

    async function saveCurrentFile() {
      if (projectType === 'pdf') {
        await savePdfDocument();
        return;
      }
      if (!currentFile) return;
      const content = document.getElementById('simple-editor').value;
      files[currentFile] = { ...files[currentFile], content, size: new Blob([content]).size, updatedAt: new Date().toISOString() };
      await saveProject();
      showNotification('Salvo! 💾', 'success');
    }

    function updateTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = '';
      Object.keys(files).forEach(key => {
        const tab = document.createElement('button');
        tab.className = `tab-btn ${key === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(key);
        tab.innerHTML = `${files[key].name} <button class="close-tab-btn" onclick="event.stopPropagation();closeFile('${key}')">&times;</button>`;
        tabs.appendChild(tab);
      });
    }

    async function closeFile(fileKey) {
      if (Object.keys(files).length <= 1) return;
      delete files[fileKey];
      await saveProject();
      if (fileKey === currentFile) await openFile(Object.keys(files)[0]);
      updateTabs();
    }

    function previewProject() {
      if (projectType === 'pdf') {
        showNotification('Preview de PDF em desenvolvimento', 'info');
        return;
      }
      const index = Object.values(files).find(f => f.name === 'index.html');
      if (index?.content) {
        const blob = new Blob([index.content], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
      } else {
        showNotification('Crie um index.html primeiro', 'warning');
      }
    }

    async function publishSite() {
      if (projectType === 'pdf') {
        showNotification('Use "Exportar PDF" para salvar', 'info');
        return;
      }
      // (Mantida a função original de publish site)
      showNotification('Publicação iniciada...', 'info');
    }

    function addChatMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      document.getElementById('chatMessages').appendChild(msgDiv);
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
      if (currentProjectId && currentUser) {
        db.ref(`chats/${currentUser.uid}/${currentProjectId}`).push({ text, type, timestamp: Date.now() });
      }
    }

    async function loadChatHistory() {
      const snapshot = await db.ref(`chats/${currentUser.uid}/${currentProjectId}`).orderByChild('timestamp').once('value');
      document.getElementById('chatMessages').innerHTML = '';
      snapshot.forEach(child => {
        const msg = child.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${msg.type}`;
        msgDiv.innerHTML = msg.text.replace(/\n/g, '<br>');
        document.getElementById('chatMessages').appendChild(msgDiv);
      });
      if (!snapshot.exists()) {
        addChatMessage('🤖 Olá! Sou seu assistente. Use Ctrl+S para salvar.', 'system');
      }
    }

    function showNotification(msg, type) {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }

    function initResizing() {
      const handle = document.getElementById('resizeHandle');
      let isResizing = false;
      handle.addEventListener('mousedown', (e) => { isResizing = true; e.preventDefault(); });
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const w = window.innerWidth - e.clientX;
        if (w >= 250 && w <= 600) {
          document.getElementById('ai-sidebar').style.width = w + 'px';
          localStorage.setItem('codehub_sidebar_width', w);
        }
      });
      document.addEventListener('mouseup', () => { isResizing = false; });
    }

    function setupEventListeners() {
      document.getElementById('saveFileBtn').addEventListener('click', saveCurrentFile);
      document.getElementById('previewBtn').addEventListener('click', previewProject);
      document.getElementById('sitePublishBtn').addEventListener('click', publishSite);
      document.getElementById('pdfExportBtn').addEventListener('click', savePdfDocument);
      document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));
      document.getElementById('openUrlTopBtn')?.addEventListener('click', () => { if (currentHostingUrl) window.open(currentHostingUrl, '_blank'); });
      document.getElementById('project-name').addEventListener('blur', async () => {
        const name = document.getElementById('project-name').value.trim();
        if (name) await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(name);
      });
      document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); }
      });
      document.getElementById('sendChatBtn').addEventListener('click', sendToAI);
    }

    async function sendToAI() {
      const msg = document.getElementById('chatInput').value.trim();
      if (!msg) return;
      addChatMessage(msg, 'user');
      document.getElementById('chatInput').value = '';
      addChatMessage('🤖 Processando... (IA em desenvolvimento)', 'ai');
    }

    // Expor funções globalmente
    window.closeFile = closeFile;
    window.changeZoom = changeZoom;
    window.resetZoom = resetZoom;
    window.saveCurrentFile = saveCurrentFile;
    window.savePdfDocument = savePdfDocument;
    window.addPdfPage = addPdfPage;
    window.formatPdfBold = formatPdfBold;
    window.formatPdfItalic = formatPdfItalic;
    window.previewProject = previewProject;
    window.publishSite = publishSite;
  </script>
</body>
</html>
