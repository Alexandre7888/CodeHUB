<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor Rápido</title>
  <!-- Carregar Firebase primeiro (essencial) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Puter.js -->
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Loading mais simples e rápido */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid #333;
      border-top-color: #9c27b0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #top-bar {
      display: flex;
      padding: 6px 10px;
      background: #1e1e1e;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    #project-name {
      background: #252526;
      color: white;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 5px 8px;
      width: 180px;
      font-size: 12px;
    }
    
    button {
      background: #4361ee;
      border: none;
      color: white;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    
    #saveFileBtn { background: #4cc9f0; }
    #previewBtn { background: #4895ef; }
    #puterDashboardBtn { background: #20b2aa; }
    .logout-btn { background: #f44336; }
    
    #storage-info {
      background: #333;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      margin-left: 8px;
    }
    
    #user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    #projects-sidebar {
      width: 220px;
      background: #252526;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .projects-header {
      padding: 8px;
      background: #2d2d2d;
      font-weight: bold;
      font-size: 12px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .projects-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    
    .project-item {
      padding: 8px;
      margin-bottom: 6px;
      background: #1e1e1e;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #333;
      font-size: 12px;
    }
    
    .project-item.active {
      background: #4361ee;
    }
    
    .project-name {
      font-weight: bold;
      margin-bottom: 3px;
    }
    
    .project-date {
      font-size: 9px;
      color: #888;
    }
    
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    #editor-container {
      flex: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #tabs {
      display: flex;
      background: #252526;
      align-items: center;
      gap: 1px;
      overflow-x: auto;
      min-height: 32px;
    }
    
    .tab-btn {
      background: #2d2d2d;
      padding: 5px 10px;
      position: relative;
      padding-right: 22px;
      border-radius: 0;
      font-size: 11px;
    }
    
    .tab-btn.active {
      background: #1e1e1e;
    }
    
    .close-tab-btn {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 12px;
    }
    
    #container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #1e1e1e;
    }
    
    /* Editor simples fallback enquanto Monaco não carrega */
    #simple-editor {
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      padding: 10px;
      border: none;
      resize: none;
      outline: none;
    }
    
    #ai-sidebar {
      width: 350px;
      background: #252526;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 8px;
      background: #2d2d2d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 150px;
    }
    
    .message {
      padding: 8px 10px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 12px;
    }
    
    .message.user {
      background: #4361ee;
      align-self: flex-end;
    }
    
    .message.ai {
      background: #3d3d3d;
      align-self: flex-start;
    }
    
    .message.system {
      background: #ff9800;
      align-self: center;
      font-size: 11px;
    }
    
    .chat-input-area {
      padding: 8px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
    }
    
    .chat-input-area textarea {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 8px;
      border-radius: 6px;
      resize: none;
      font-size: 12px;
    }
    
    .chat-input-area button {
      background: #9c27b0;
      padding: 8px 16px;
    }
    
    /* Atividades */
    .activities-panel {
      background: #1e1e1e;
      border-top: 1px solid #333;
      padding: 8px;
      max-height: 160px;
      overflow-y: auto;
      font-size: 11px;
    }
    
    .activities-header {
      display: flex;
      justify-content: space-between;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      font-size: 11px;
      color: #4cc9f0;
    }
    
    .activity-item {
      background: #2d2d2d;
      border-radius: 6px;
      padding: 6px;
      margin-top: 6px;
    }
    
    .activity-online { color: #4caf50; }
    .activity-offline { color: #f44336; }
    
    .url-panel {
      background: #252526;
      padding: 5px 10px;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    
    .url-panel input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
    }
    
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 16px;
      border-radius: 6px;
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      font-size: 12px;
    }
    
    .notification.success { background: #4caf50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196f3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .puter-status {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #333;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 10px;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f44336;
    }
    
    .status-dot.connected { background: #4caf50; }
    
    .new-project-btn {
      background: #4caf50;
      font-size: 10px;
      padding: 3px 6px;
    }
    
    .publish-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10001;
    }
    
    .publish-modal-content {
      background: #2d2d2d;
      border-radius: 12px;
      padding: 20px;
      max-width: 350px;
      width: 90%;
      text-align: center;
    }
    
    .publish-modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }
    
    .btn-publish-yes { background: #4caf50; }
    .btn-publish-no { background: #f44336; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader"></div>
    <h3 style="margin-top: 15px;">Carregando CodeHUB...</h3>
  </div>

  <div id="app-content" style="display: none; height: 100vh; display: flex; flex-direction: column;">
    <div id="top-bar">
      <button id="puterDashboardBtn">🚀 Puter</button>
      <input type="text" id="project-name" placeholder="Nome">
      <button id="saveFileBtn" disabled>💾</button>
      <button id="previewBtn">👁️</button>
      <div id="storage-info">📦 <span id="storage-used">0</span>MB</div>
      <div id="user-info">
        <span id="user-name"></span>
        <div class="puter-status"><div class="status-dot" id="puterStatusDot"></div><span>Puter</span></div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="main-container">
      <div id="projects-sidebar">
        <div class="projects-header"><span>📁 Projetos</span><button class="new-project-btn" onclick="createNewProject()">+</button></div>
        <div class="projects-list" id="projects-list"><div style="text-align:center; padding:20px;">Carregando...</div></div>
      </div>

      <div id="editor-container">
        <div id="tabs"></div>
        <textarea id="simple-editor" placeholder="Carregando editor..."></textarea>
        <div id="container" style="display: none;"></div>
      </div>

      <div id="ai-sidebar">
        <div class="sidebar-header"><span>🤖 IA</span><button onclick="clearChat()" style="background:#555; padding:2px 6px;">Limpar</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <textarea id="chatInput" placeholder="Comando..." rows="1"></textarea>
          <button id="sendChatBtn">Enviar</button>
        </div>
        <div class="activities-panel" id="activitiesPanel">
          <div class="activities-header"><span>📊 Atividades</span><span id="activityProjectId"></span></div>
          <div id="activitiesList"><div class="activity-item">⏳ Carregando...</div></div>
        </div>
      </div>
    </div>
    
    <div class="url-panel" id="urlPanel" style="display: none;">
      <span>🔗 URL:</span>
      <input type="text" id="fileUrl" readonly>
      <button id="openUrlBtn">Abrir</button>
    </div>
  </div>

  <div id="publishModal" class="publish-modal">
    <div class="publish-modal-content">
      <h3>Publicar no Puter?</h3>
      <div class="publish-modal-buttons">
        <button class="btn-publish-yes" id="publishYesBtn">Sim</button>
        <button class="btn-publish-no" id="publishNoBtn">Não</button>
      </div>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-785e3-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // Variáveis
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 };
    let currentHostingUrl = null;
    let currentHostingSubdomain = null;
    let allProjects = [];
    let simpleEditor = document.getElementById('simple-editor');
    let useSimpleEditor = true;
    
    const ACTIVITIES_DB_URL = "https://html-785e3-default-rtdb.firebaseio.com/activities";
    const ACTIVITY_SCRIPT_URL = "https://code.codehub.ct.ws/atividade.js";
    
    const elements = {
      loadingScreen: document.getElementById('loading-screen'),
      appContent: document.getElementById('app-content'),
      projectName: document.getElementById('project-name'),
      saveFileBtn: document.getElementById('saveFileBtn'),
      previewBtn: document.getElementById('previewBtn'),
      puterDashboardBtn: document.getElementById('puterDashboardBtn'),
      storageUsed: document.getElementById('storage-used'),
      userName: document.getElementById('user-name'),
      logoutBtn: document.getElementById('logoutBtn'),
      tabsContainer: document.getElementById('tabs'),
      container: document.getElementById('container'),
      simpleEditor: document.getElementById('simple-editor'),
      urlPanel: document.getElementById('urlPanel'),
      fileUrl: document.getElementById('fileUrl'),
      openUrlBtn: document.getElementById('openUrlBtn'),
      chatMessages: document.getElementById('chatMessages'),
      chatInput: document.getElementById('chatInput'),
      sendChatBtn: document.getElementById('sendChatBtn'),
      projectsList: document.getElementById('projects-list'),
      puterStatusDot: document.getElementById('puterStatusDot'),
      activitiesList: document.getElementById('activitiesList'),
      activityProjectId: document.getElementById('activityProjectId'),
      publishModal: document.getElementById('publishModal'),
      publishYesBtn: document.getElementById('publishYesBtn'),
      publishNoBtn: document.getElementById('publishNoBtn')
    };

    function showNotification(msg, type = 'info') {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 3000);
    }

    function updatePuterStatus(connected) {
      if (connected) elements.puterStatusDot.classList.add('connected');
      else elements.puterStatusDot.classList.remove('connected');
    }

    // ==================== PAINEL DE ATIVIDADES ====================
    async function loadActivities() {
      if (!currentProjectId) return;
      try {
        const res = await fetch(`${ACTIVITIES_DB_URL}/${currentProjectId}.json`);
        const data = await res.json();
        elements.activityProjectId.textContent = currentProjectId.substring(0, 10);
        
        if (!data) {
          elements.activitiesList.innerHTML = '<div class="activity-item">📭 Sem atividades</div>';
          return;
        }
        
        const now = Date.now();
        const elapsed = data.time || Math.floor((now - (data.start || now)) / 1000);
        const isOnline = (now - (data.lastSeen || 0)) < 10000;
        
        elements.activitiesList.innerHTML = `
          <div class="activity-item">
            <div><span class="${isOnline ? 'activity-online' : 'activity-offline'}">${isOnline ? '🟢 ONLINE' : '⚫ OFFLINE'}</span></div>
            <div>⏱ ${Math.floor(elapsed/60)}min ${elapsed%60}s</div>
            <div>🔄 ${data.visits || 1} visitas</div>
            <button onclick="deleteActivity('${currentProjectId}')" style="background:#f44336; border:none; color:white; padding:2px 6px; border-radius:4px; margin-top:4px; font-size:10px;">Limpar</button>
          </div>
        `;
        
        if (isOnline) setTimeout(loadActivities, 5000);
      } catch(e) { console.error(e); }
    }

    async function deleteActivity(projectId) {
      await fetch(`${ACTIVITIES_DB_URL}/${projectId}.json`, { method: "DELETE" });
      loadActivities();
    }

    // ==================== INJETAR SCRIPT ====================
    function injectActivityScript(htmlContent) {
      const script = `<script src="${ACTIVITY_SCRIPT_URL}?projectid=${currentProjectId}"><\/script>`;
      if (htmlContent.includes('</body>')) return htmlContent.replace('</body>', script + '\n</body>');
      if (htmlContent.includes('</html>')) return htmlContent.replace('</html>', script + '\n</html>');
      return htmlContent + script;
    }

    // ==================== AÇÕES ====================
    function addChatMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      elements.chatMessages.appendChild(msgDiv);
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
      if (currentProjectId && currentUser) {
        db.ref(`chats/${currentUser.uid}/${currentProjectId}`).push({ text, type, timestamp: Date.now() });
      }
    }

    async function loadChatHistory() {
      if (!currentProjectId || !currentUser) return;
      const snapshot = await db.ref(`chats/${currentUser.uid}/${currentProjectId}`).orderByChild('timestamp').once('value');
      elements.chatMessages.innerHTML = '';
      snapshot.forEach(child => {
        const msg = child.val();
        const div = document.createElement('div');
        div.className = `message ${msg.type}`;
        div.innerHTML = msg.text.replace(/\n/g, '<br>');
        elements.chatMessages.appendChild(div);
      });
      if (elements.chatMessages.children.length === 0) {
        addChatMessage('🤖 Olá! Comandos: "Crie um site", "Edite o index.html", "Publique"', 'system');
      }
    }

    function clearChat() {
      if (confirm('Limpar chat?')) {
        db.ref(`chats/${currentUser.uid}/${currentProjectId}`).remove();
        elements.chatMessages.innerHTML = '';
        addChatMessage('🤖 Chat limpo!', 'system');
      }
    }

    async function saveFileToStorage(fileKey, content) {
      const fileData = files[fileKey];
      const size = new Blob([content]).size;
      const oldSize = fileData?.size || 0;
      userStorage.used = userStorage.used - oldSize + size;
      files[fileKey] = { ...fileData, name: fileData?.name || fileKey, content, size, updatedAt: new Date().toISOString() };
      await db.ref(`users/${currentUser.uid}/storage`).set({ used: userStorage.used, limit: userStorage.limit });
      updateStorageDisplay();
    }

    function updateStorageDisplay() {
      const usedMB = (userStorage.used / (1024 * 1024)).toFixed(1);
      elements.storageUsed.textContent = usedMB;
    }

    async function saveCurrentFile() {
      if (!currentFile) return;
      const content = useSimpleEditor ? simpleEditor.value : editor.getValue();
      await saveFileToStorage(currentFile, content);
      await saveProject();
      elements.saveFileBtn.disabled = true;
      elements.saveFileBtn.textContent = '✓';
      setTimeout(() => { elements.saveFileBtn.textContent = '💾'; }, 1000);
      showNotification('Salvo!', 'success');
    }

    async function saveProject() {
      await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).update({ files, updatedAt: new Date().toISOString() });
    }

    async function openFile(fileKey) {
      if (!files[fileKey]) return;
      currentFile = fileKey;
      const content = files[fileKey].content || '';
      
      if (useSimpleEditor) {
        simpleEditor.value = content;
      } else if (editor) {
        editor.setValue(content);
      }
      
      updateTabs();
      elements.saveFileBtn.disabled = true;
    }

    async function createNewFile() {
      let fileName = prompt('Nome do arquivo:', 'novo.html');
      if (!fileName) return;
      if (!fileName.includes('.')) fileName += '.html';
      
      let content = '';
      if (fileName.endsWith('.html')) content = '<!DOCTYPE html><html><head><title>Novo</title></head><body></body></html>';
      else if (fileName.endsWith('.css')) content = '/* CSS */\n';
      else content = '// JavaScript\n';
      
      if (fileName.endsWith('.html')) content = injectActivityScript(content);
      
      const fileKey = btoa(fileName).replace(/=/g, '');
      files[fileKey] = { name: fileName, content, size: content.length, createdAt: new Date().toISOString() };
      await saveProject();
      await openFile(fileKey);
      updateTabs();
      showNotification(`Arquivo ${fileName} criado!`, 'success');
    }

    function updateTabs() {
      elements.tabsContainer.innerHTML = '';
      Object.keys(files).forEach(key => {
        const tab = document.createElement('button');
        tab.className = `tab-btn ${key === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(key);
        tab.innerHTML = `${files[key].name} <button class="close-tab-btn" onclick="event.stopPropagation(); closeFile('${key}')">&times;</button>`;
        elements.tabsContainer.appendChild(tab);
      });
    }

    async function closeFile(fileKey) {
      if (Object.keys(files).length <= 1) { showNotification('Não pode fechar o último arquivo', 'warning'); return; }
      delete files[fileKey];
      await saveProject();
      if (fileKey === currentFile) await openFile(Object.keys(files)[0]);
      updateTabs();
    }

    // ==================== PROJETOS ====================
    async function loadProjects() {
      const snapshot = await db.ref(`projects/${currentUser.uid}`).once('value');
      allProjects = [];
      snapshot.forEach(child => {
        allProjects.push({ id: child.key, name: child.val().name || 'Sem nome', updatedAt: child.val().updatedAt || new Date().toISOString() });
      });
      allProjects.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      renderProjectsList();
    }

    function renderProjectsList() {
      if (allProjects.length === 0) {
        elements.projectsList.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum projeto<br><button class="new-project-btn" onclick="createNewProject()" style="margin-top:8px;">+ Criar</button></div>';
        return;
      }
      elements.projectsList.innerHTML = allProjects.map(p => `
        <div class="project-item ${currentProjectId === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
          <div class="project-name">📄 ${escapeHtml(p.name)}</div>
          <div class="project-date">${new Date(p.updatedAt).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

    async function selectProject(projectId) {
      if (currentProjectId === projectId) return;
      currentProjectId = projectId;
      await loadProjectData();
      await loadChatHistory();
      await loadActivities();
      updateTabs();
      window.history.pushState({}, '', `?projectId=${projectId}`);
    }

    async function createNewProject() {
      const name = prompt('Nome do projeto:', 'Meu Projeto');
      if (!name) return;
      
      const newProjectRef = db.ref(`projects/${currentUser.uid}`).push();
      const projectId = newProjectRef.key;
      const fileKey = btoa('index.html').replace(/=/g, '');
      const defaultContent = injectActivityScript(`<!DOCTYPE html><html><head><title>${name}</title></head><body><h1>${name}</h1></body></html>`);
      
      await newProjectRef.set({
        name, files: { [fileKey]: { name: 'index.html', content: defaultContent, size: defaultContent.length, createdAt: new Date().toISOString() } },
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
      });
      await loadProjects();
      await selectProject(projectId);
      showNotification(`Projeto "${name}" criado!`, 'success');
    }

    async function loadProjectData() {
      const snapshot = await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).once('value');
      const data = snapshot.val();
      if (!data) return;
      
      elements.projectName.value = data.name || 'Projeto';
      files = data.files || {};
      
      const fileKeys = Object.keys(files);
      if (fileKeys.length > 0) await openFile(fileKeys[0]);
      else await createDefaultIndexHtml();
      
      if (data.hosting) {
        currentHostingUrl = data.hosting.url;
        currentHostingSubdomain = data.hosting.subdomain;
        if (currentHostingUrl) {
          elements.fileUrl.value = currentHostingUrl;
          elements.urlPanel.style.display = 'flex';
        }
      }
      updateTabs();
      renderProjectsList();
    }

    async function createDefaultIndexHtml() {
      const fileName = 'index.html';
      const fileKey = btoa(fileName).replace(/=/g, '');
      const content = injectActivityScript(`<!DOCTYPE html><html><head><title>${elements.projectName.value || 'Projeto'}</title></head><body><h1>Bem-vindo!</h1></body></html>`);
      files[fileKey] = { name: fileName, content, size: content.length, createdAt: new Date().toISOString() };
      await saveProject();
      await openFile(fileKey);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== IA ====================
    async function sendToAI() {
      const msg = elements.chatInput.value.trim();
      if (!msg) return;
      addChatMessage(msg, 'user');
      elements.chatInput.value = '';
      addChatMessage('🤔 Processando...', 'ai');
      
      try {
        await ensurePuterAuth();
        
        const existingFiles = Object.keys(files).map(k => files[k].name).join(', ');
        const prompt = `Comando: "${msg}". Projeto: ${elements.projectName.value}. Arquivos: ${existingFiles}. Responda com JSON: {"action":"criar|editar|publicar","files":[{"name":"nome","content":"codigo"}],"targetFile":"arquivo","newContent":"conteudo","message":"msg"}`;
        
        const response = await puter.ai.chat(prompt);
        let aiResponse = typeof response === 'string' ? response : (response.message?.content || JSON.stringify(response));
        
        const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
        const msgs = document.querySelectorAll('.message.ai');
        if (msgs.length && msgs[msgs.length-1].innerText === '🤔 Processando...') msgs[msgs.length-1].remove();
        
        if (jsonMatch) {
          try {
            const result = JSON.parse(jsonMatch[0]);
            if (result.action === 'criar' && result.files) {
              for (const f of result.files) {
                let name = f.name || 'arquivo.html';
                let content = f.content || '';
                if (name.endsWith('.html')) content = injectActivityScript(content);
                const key = btoa(name).replace(/=/g, '');
                files[key] = { name, content, size: content.length, createdAt: new Date().toISOString() };
              }
              await saveProject();
              await openFile(Object.keys(files)[0]);
              addChatMessage(`✅ ${result.message || 'Arquivos criados!'}`, 'ai');
              updateTabs();
              showPublishModal(() => publishProject(), null);
            } else if (result.action === 'editar' && result.targetFile && result.newContent) {
              let targetKey = null;
              for (const k in files) {
                if (files[k].name === result.targetFile || files[k].name.includes(result.targetFile)) {
                  targetKey = k; break;
                }
              }
              if (targetKey) {
                let content = result.newContent;
                if (files[targetKey].name.endsWith('.html')) content = injectActivityScript(content);
                await saveFileToStorage(targetKey, content);
                await saveProject();
                if (targetKey === currentFile) {
                  if (useSimpleEditor) simpleEditor.value = content;
                  else editor.setValue(content);
                }
                addChatMessage(`✅ ${result.message || 'Arquivo editado!'}`, 'ai');
                showPublishModal(() => updatePublishedSite(), null);
              } else {
                addChatMessage(`❌ Arquivo ${result.targetFile} não encontrado`, 'ai');
              }
            } else if (result.action === 'publicar') {
              await publishProject();
              addChatMessage(`✅ ${result.message || 'Publicado!'}`, 'ai');
            } else {
              addChatMessage(result.message || aiResponse, 'ai');
            }
          } catch(e) { addChatMessage(aiResponse, 'ai'); }
        } else {
          addChatMessage(aiResponse, 'ai');
        }
      } catch(e) {
        const msgs = document.querySelectorAll('.message.ai');
        if (msgs.length && msgs[msgs.length-1].innerText === '🤔 Processando...') msgs[msgs.length-1].remove();
        addChatMessage(`❌ Erro: ${e.message}`, 'ai');
      }
    }

    function showPublishModal(onConfirm, onCancel) {
      elements.publishModal.style.display = 'flex';
      const confirmHandler = () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        if (onConfirm) onConfirm();
      };
      const cancelHandler = () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        if (onCancel) onCancel();
      };
      elements.publishYesBtn.addEventListener('click', confirmHandler);
      elements.publishNoBtn.addEventListener('click', cancelHandler);
    }

    // ==================== PUTER ====================
    async function ensurePuterAuth() {
      try {
        const user = await puter.auth.getUser();
        if (user) { updatePuterStatus(true); return true; }
      } catch(e) {}
      try {
        await puter.auth.signIn();
        updatePuterStatus(true);
        return true;
      } catch(e) { return false; }
    }

    async function publishProject() {
      const auth = await ensurePuterAuth();
      if (!auth) return;
      const hasIndex = Object.values(files).some(f => f.name === 'index.html');
      if (!hasIndex) { addChatMessage('❌ Falta index.html', 'system'); return; }
      
      addChatMessage('🚀 Publicando...', 'system');
      try {
        const dirName = `codehub_${currentUser.uid}_${Date.now()}`;
        await puter.fs.mkdir(dirName);
        for (const file of Object.values(files)) {
          let content = file.content || '';
          if (file.name.endsWith('.html') && !content.includes('atividade.js')) content = injectActivityScript(content);
          await puter.fs.write(`${dirName}/${file.name}`, content);
        }
        const subdomain = `codehub-${Math.random().toString(36).substring(2, 8)}`;
        const site = await puter.hosting.create(subdomain, dirName);
        const url = `https://${site.subdomain}.puter.site`;
        currentHostingUrl = url;
        currentHostingSubdomain = site.subdomain;
        await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).set({ url, subdomain: site.subdomain, directory: dirName });
        elements.fileUrl.value = url;
        elements.urlPanel.style.display = 'flex';
        addChatMessage(`✅ Publicado! ${url}`, 'ai');
      } catch(e) { addChatMessage(`❌ Erro: ${e.message}`, 'system'); }
    }

    async function updatePublishedSite() {
      if (!currentHostingSubdomain) return publishProject();
      addChatMessage('🔄 Atualizando...', 'system');
      try {
        for (const file of Object.values(files)) {
          let content = file.content || '';
          if (file.name.endsWith('.html') && !content.includes('atividade.js')) content = injectActivityScript(content);
          await puter.fs.write(`${currentHostingDirectory}/${file.name}`, content);
        }
        await puter.hosting.update(currentHostingSubdomain, currentHostingDirectory);
        addChatMessage(`✅ Atualizado!`, 'ai');
      } catch(e) { addChatMessage(`❌ Erro: ${e.message}`, 'system'); }
    }

    function previewProject() {
      const index = Object.values(files).find(f => f.name === 'index.html');
      if (index?.content) {
        const blob = new Blob([index.content], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
      } else { showNotification('Crie index.html', 'warning'); }
    }

    // ==================== INICIALIZAÇÃO RÁPIDA ====================
    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'auth.html'; return; }
      currentUser = user;
      elements.userName.textContent = user.displayName || user.email.split('@')[0];
      
      const urlParams = new URLSearchParams(window.location.search);
      currentProjectId = urlParams.get('projectId');
      
      await loadProjects();
      
      if (currentProjectId && allProjects.some(p => p.id === currentProjectId)) {
        await loadProjectData();
      } else if (allProjects.length > 0) {
        await selectProject(allProjects[0].id);
      } else {
        await createNewProject();
      }
      
      // Carregar Monaco Editor em segundo plano (não bloqueia)
      setTimeout(() => {
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
          useSimpleEditor = false;
          elements.container.style.display = 'block';
          elements.simpleEditor.style.display = 'none';
          editor = monaco.editor.create(elements.container, {
            theme: 'vs-dark', automaticLayout: true, minimap: { enabled: false }, language: 'html', fontSize: 12
          });
          editor.onDidChangeModelContent(() => { if (currentFile) elements.saveFileBtn.disabled = false; });
          if (currentFile && files[currentFile]) editor.setValue(files[currentFile].content || '');
        });
      }, 100);
      
      elements.loadingScreen.style.opacity = '0';
      setTimeout(() => {
        elements.loadingScreen.style.display = 'none';
        elements.appContent.style.display = 'flex';
      }, 300);
      
      setupEventListeners();
    });

    function setupEventListeners() {
      elements.saveFileBtn.addEventListener('click', saveCurrentFile);
      elements.previewBtn.addEventListener('click', previewProject);
      elements.puterDashboardBtn.addEventListener('click', () => window.open('https://puter.com', '_blank'));
      elements.openUrlBtn?.addEventListener('click', () => { if (currentHostingUrl) window.open(currentHostingUrl, '_blank'); });
      elements.sendChatBtn.addEventListener('click', sendToAI);
      elements.chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); } });
      elements.logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));
      elements.projectName.addEventListener('blur', async () => {
        const newName = elements.projectName.value.trim();
        if (newName && currentProjectId) {
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(newName);
          await loadProjects();
        }
      });
      simpleEditor.addEventListener('input', () => { if (currentFile) elements.saveFileBtn.disabled = false; });
    }

    window.selectProject = selectProject;
    window.createNewProject = createNewProject;
    window.clearChat = clearChat;
    window.closeFile = closeFile;
    window.deleteActivity = deleteActivity;
  </script>
</body>
</html>
