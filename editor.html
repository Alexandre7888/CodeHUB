<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor com IA</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    .loader {
      width: 120px;
      animation: spin 1s linear infinite;
      border-radius: 50%;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    #top-bar {
      display: flex;
      padding: 8px 12px;
      background: #1e1e1e;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .back-btn {
      background: #6c757d;
      text-decoration: none;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
    
    #project-name {
      background: #252526;
      color: white;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      width: 200px;
    }
    
    #newFileForm {
      display: flex;
      gap: 5px;
    }
    
    #newFileName {
      background: #252526;
      color: white;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      width: 130px;
    }
    
    button {
      background: #4361ee;
      border: none;
      color: white;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }
    
    #saveFileBtn { background: #4cc9f0; }
    #previewBtn { background: #4895ef; }
    #puterDashboardBtn { background: #20b2aa; }
    #copyUrlBtn { background: #00bcd4; }
    .logout-btn { background: #f44336; }
    .delete-project-btn { background: #f44336; font-size: 11px; padding: 4px 8px; }
    
    #storage-info {
      background: #333;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 11px;
      margin-left: 10px;
    }
    
    #user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    #projects-sidebar {
      width: 260px;
      background: #252526;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .projects-header {
      padding: 12px;
      background: #2d2d2d;
      font-weight: bold;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .projects-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .project-item {
      padding: 10px;
      margin-bottom: 8px;
      background: #1e1e1e;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #333;
    }
    
    .project-item:hover {
      background: #2d2d2d;
      border-color: #4cc9f0;
    }
    
    .project-item.active {
      background: #4361ee;
      border-color: #4cc9f0;
    }
    
    .project-name {
      font-weight: bold;
      margin-bottom: 4px;
    }
    
    .project-date {
      font-size: 10px;
      color: #888;
    }
    
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    #editor-container {
      flex: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #tabs {
      display: flex;
      background: #252526;
      align-items: center;
      gap: 1px;
      overflow-x: auto;
      min-height: 36px;
    }
    
    .tab-btn {
      background: #2d2d2d;
      padding: 6px 12px;
      position: relative;
      padding-right: 25px;
      border-radius: 0;
      font-size: 12px;
    }
    
    .tab-btn.active {
      background: #1e1e1e;
      color: white;
    }
    
    .close-tab-btn {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 14px;
    }
    
    #container {
      flex: 1;
      overflow: hidden;
    }
    
    #ai-sidebar {
      width: 380px;
      background: #252526;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 12px;
      background: #2d2d2d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 13px;
    }
    
    .message.user {
      background: #4361ee;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    
    .message.ai {
      background: #3d3d3d;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    
    .message.system {
      background: #ff9800;
      align-self: center;
      font-size: 12px;
      border-radius: 20px;
    }
    
    .message pre {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 10px;
      font-size: 12px;
    }
    
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
    }
    
    .chat-input-area textarea {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 10px;
      border-radius: 8px;
      resize: none;
      font-family: inherit;
      font-size: 13px;
    }
    
    .chat-input-area button {
      background: #9c27b0;
      padding: 10px 20px;
      border-radius: 8px;
    }
    
    .url-panel {
      background: #252526;
      padding: 8px 12px;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    
    .url-panel input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }
    
    .ai-loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      flex-direction: column;
      gap: 20px;
    }
    
    .ai-loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #333;
      border-top-color: #9c27b0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .ai-loading-text {
      font-size: 18px;
      color: white;
      text-align: center;
    }
    
    .publish-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10001;
    }
    
    .publish-modal-content {
      background: #2d2d2d;
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .publish-modal-content h3 {
      margin-bottom: 15px;
      color: #4cc9f0;
    }
    
    .publish-modal-content p {
      margin-bottom: 25px;
      color: #ccc;
    }
    
    .publish-modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    
    .publish-modal-buttons button {
      padding: 10px 25px;
      font-size: 14px;
    }
    
    .btn-publish-yes { background: #4caf50; }
    .btn-publish-no { background: #f44336; }
    
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      font-size: 13px;
    }
    
    .notification.success { background: #4caf50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196f3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .monaco-editor { width: 100%; height: 100%; }
    
    .puter-status {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #333;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f44336;
    }
    
    .status-dot.connected { background: #4caf50; }
    
    .new-project-btn {
      background: #4caf50;
      font-size: 11px;
      padding: 4px 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="Loading">
    <h2>Carregando CodeHUB...</h2>
  </div>

  <div id="app-content" style="display: none; height: 100vh; display: flex; flex-direction: column;">
    <div id="top-bar">
      <button id="puterDashboardBtn">🚀 Puter Dashboard</button>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <form id="newFileForm">
        <input type="text" id="newFileName" placeholder="ex: style.css" required>
        <button type="submit">+ Arquivo</button>
      </form>
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="copyUrlBtn">🔗 Copiar URL</button>
      <div id="storage-info">📦 <span id="storage-used">0</span> / <span id="storage-limit">5</span> MB</div>
      <div id="user-info">
        <span id="user-name"></span>
        <div class="puter-status"><div class="status-dot" id="puterStatusDot"></div><span id="puterStatusText">Puter</span></div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="main-container">
      <div id="projects-sidebar">
        <div class="projects-header"><span>📁 Meus Projetos</span><button class="new-project-btn" onclick="createNewProject()">+ Novo</button></div>
        <div class="projects-list" id="projects-list"><div style="text-align:center; padding:20px; color:#888;">Carregando...</div></div>
      </div>

      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container"></div>
      </div>

      <div id="ai-sidebar">
        <div class="sidebar-header"><span>🤖 Assistente IA</span><button onclick="clearChat()" style="background:#555; padding:2px 8px;">Limpar</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <textarea id="chatInput" placeholder="Ex: Crie um arquivo style.css com fundo azul..." rows="2"></textarea>
          <button id="sendChatBtn">Enviar</button>
        </div>
      </div>
    </div>
    
    <div class="url-panel" id="urlPanel" style="display: none;">
      <span>🔗 Site hospedado:</span>
      <input type="text" id="fileUrl" readonly onclick="this.select()">
      <button id="openUrlBtn">Abrir</button>
      <button id="hostBtn" style="background:#20b2aa;">🌐 Hospedar</button>
    </div>
  </div>

  <div id="aiLoadingOverlay" class="ai-loading-overlay">
    <div class="ai-loading-spinner"></div>
    <div class="ai-loading-text" id="aiLoadingText">🤖 IA processando...</div>
  </div>

  <div id="publishModal" class="publish-modal">
    <div class="publish-modal-content">
      <h3>🚀 Publicar no Puter?</h3>
      <p>Deseja publicar as alterações no Puter agora?</p>
      <div class="publish-modal-buttons">
        <button class="btn-publish-yes" id="publishYesBtn">✅ Sim</button>
        <button class="btn-publish-no" id="publishNoBtn">❌ Não</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let models = {};
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 };
    let currentHostingUrl = null;
    let currentHostingSubdomain = null;
    let allProjects = [];

    const elements = {
      loadingScreen: document.getElementById('loading-screen'),
      appContent: document.getElementById('app-content'),
      projectName: document.getElementById('project-name'),
      newFileForm: document.getElementById('newFileForm'),
      newFileName: document.getElementById('newFileName'),
      saveFileBtn: document.getElementById('saveFileBtn'),
      previewBtn: document.getElementById('previewBtn'),
      copyUrlBtn: document.getElementById('copyUrlBtn'),
      puterDashboardBtn: document.getElementById('puterDashboardBtn'),
      hostBtn: document.getElementById('hostBtn'),
      storageUsed: document.getElementById('storage-used'),
      storageLimit: document.getElementById('storage-limit'),
      userName: document.getElementById('user-name'),
      logoutBtn: document.getElementById('logoutBtn'),
      tabsContainer: document.getElementById('tabs'),
      container: document.getElementById('container'),
      urlPanel: document.getElementById('urlPanel'),
      fileUrl: document.getElementById('fileUrl'),
      openUrlBtn: document.getElementById('openUrlBtn'),
      chatMessages: document.getElementById('chatMessages'),
      chatInput: document.getElementById('chatInput'),
      sendChatBtn: document.getElementById('sendChatBtn'),
      projectsList: document.getElementById('projects-list'),
      puterStatusDot: document.getElementById('puterStatusDot'),
      puterStatusText: document.getElementById('puterStatusText'),
      aiLoadingOverlay: document.getElementById('aiLoadingOverlay'),
      aiLoadingText: document.getElementById('aiLoadingText'),
      publishModal: document.getElementById('publishModal'),
      publishYesBtn: document.getElementById('publishYesBtn'),
      publishNoBtn: document.getElementById('publishNoBtn')
    };

    function showNotification(msg, type = 'info') {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }

    function updatePuterStatus(connected) {
      if (connected) {
        elements.puterStatusDot.classList.add('connected');
        elements.puterStatusText.textContent = 'Online';
      } else {
        elements.puterStatusDot.classList.remove('connected');
        elements.puterStatusText.textContent = 'Offline';
      }
    }

    function showAILoading(text) {
      elements.aiLoadingText.textContent = text || '🤖 IA processando...';
      elements.aiLoadingOverlay.style.display = 'flex';
    }

    function hideAILoading() {
      elements.aiLoadingOverlay.style.display = 'none';
    }

    function showPublishModal(onConfirm, onCancel) {
      elements.publishModal.style.display = 'flex';
      const confirmHandler = () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        if (onConfirm) onConfirm();
      };
      const cancelHandler = () => {
        elements.publishModal.style.display = 'none';
        elements.publishYesBtn.removeEventListener('click', confirmHandler);
        elements.publishNoBtn.removeEventListener('click', cancelHandler);
        if (onCancel) onCancel();
      };
      elements.publishYesBtn.addEventListener('click', confirmHandler);
      elements.publishNoBtn.addEventListener('click', cancelHandler);
    }

    function addChatMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      elements.chatMessages.appendChild(msgDiv);
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
      
      // Salvar mensagem no Firebase
      if (currentProjectId && currentUser) {
        const chatRef = db.ref(`chats/${currentUser.uid}/${currentProjectId}`).push();
        chatRef.set({ text: text, type: type, timestamp: Date.now() });
      }
    }

    async function loadChatHistory() {
      if (!currentProjectId || !currentUser) return;
      const chatsRef = db.ref(`chats/${currentUser.uid}/${currentProjectId}`);
      const snapshot = await chatsRef.orderByChild('timestamp').once('value');
      elements.chatMessages.innerHTML = '';
      snapshot.forEach(child => {
        const msg = child.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${msg.type}`;
        msgDiv.innerHTML = msg.text.replace(/\n/g, '<br>');
        elements.chatMessages.appendChild(msgDiv);
      });
      if (elements.chatMessages.children.length === 0) {
        addChatMessage('🤖 Olá! Sou seu assistente IA. Digite um comando como:<br><br>• "Crie um arquivo style.css com fundo azul"<br>• "Edite o index.html e mude o título"<br>• "Substitua todo o conteúdo do index.html"<br>• "Crie uma calculadora em JavaScript"', 'system');
      }
      elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
    }

    function clearChat() {
      if (confirm('Limpar todo o histórico do chat?')) {
        db.ref(`chats/${currentUser.uid}/${currentProjectId}`).remove();
        elements.chatMessages.innerHTML = '';
        addChatMessage('🤖 Chat limpo! Digite um novo comando.', 'system');
      }
    }

    // ==================== AÇÕES AUTOMÁTICAS DA IA ====================
    
    async function executeAIAction(action, fileName, content, fullResponse) {
      const lowerAction = action.toLowerCase();
      const fullResponseLower = fullResponse.toLowerCase();
      
      // CRIAR novo arquivo
      if (lowerAction.includes('criar') || lowerAction.includes('create') || 
          (fullResponseLower.includes('vou criar') && !lowerAction.includes('editar'))) {
        
        let finalFileName = fileName;
        if (!finalFileName) {
          if (content.includes('<!DOCTYPE') || content.includes('<html')) finalFileName = 'index.html';
          else if (content.includes('{') && content.includes('}')) finalFileName = 'style.css';
          else if (content.includes('function') || content.includes('const') || content.includes('let')) finalFileName = 'script.js';
          else finalFileName = 'arquivo.txt';
        }
        
        const fileKey = btoa(finalFileName).replace(/=/g, '');
        if (files[fileKey]) {
          addChatMessage(`⚠️ Arquivo "${finalFileName}" já existe. Deseja substituir? Diga "substitua" para confirmar.`, 'ai');
          return { action: 'confirm_replace', fileName: finalFileName, content: content };
        }
        
        files[fileKey] = {
          name: finalFileName,
          originalName: finalFileName,
          content: content,
          size: content.length,
          createdAt: new Date().toISOString()
        };
        await saveProject();
        await openFile(fileKey);
        addChatMessage(`✅ Arquivo "${finalFileName}" criado com sucesso!`, 'ai');
        
        // Perguntar se quer publicar
        showPublishModal(async () => {
          await hostProject();
        }, () => {});
        return { action: 'created', fileName: finalFileName };
      }
      
      // EDITAR arquivo existente
      else if (lowerAction.includes('editar') || lowerAction.includes('edit') || 
               (fullResponseLower.includes('vou editar') && !lowerAction.includes('substituir'))) {
        
        let targetFile = null;
        for (const key in files) {
          if (files[key].name.toLowerCase().includes(fileName.toLowerCase()) || 
              fileName.toLowerCase().includes(files[key].name.toLowerCase())) {
            targetFile = key;
            break;
          }
        }
        
        if (!targetFile && files[currentFile]) targetFile = currentFile;
        
        if (targetFile) {
          await saveFile(targetFile, content);
          await saveProject();
          if (targetFile === currentFile) {
            const model = editor.getModel();
            if (model) model.setValue(content);
          }
          addChatMessage(`✅ Arquivo "${files[targetFile].name}" editado com sucesso!`, 'ai');
          
          showPublishModal(async () => {
            await hostProject();
          }, () => {});
          return { action: 'edited', fileName: files[targetFile].name };
        } else {
          addChatMessage(`❌ Não encontrei o arquivo "${fileName}" para editar.`, 'ai');
          return { action: 'error' };
        }
      }
      
      // SUBSTITUIR arquivo inteiro
      else if (lowerAction.includes('substituir') || lowerAction.includes('replace')) {
        let targetFile = null;
        for (const key in files) {
          if (files[key].name.toLowerCase().includes(fileName.toLowerCase())) {
            targetFile = key;
            break;
          }
        }
        
        if (targetFile) {
          await saveFile(targetFile, content);
          await saveProject();
          if (targetFile === currentFile) {
            const model = editor.getModel();
            if (model) model.setValue(content);
          }
          addChatMessage(`✅ Arquivo "${files[targetFile].name}" substituído completamente!`, 'ai');
          
          showPublishModal(async () => {
            await hostProject();
          }, () => {});
          return { action: 'replaced', fileName: files[targetFile].name };
        } else {
          addChatMessage(`❌ Não encontrei o arquivo "${fileName}" para substituir.`, 'ai');
          return { action: 'error' };
        }
      }
      
      return { action: 'unknown' };
    }

    // ==================== IA PRINCIPAL ====================
    
    async function sendToAI() {
      const userMessage = elements.chatInput.value.trim();
      if (!userMessage) return;
      
      addChatMessage(userMessage, 'user');
      elements.chatInput.value = '';
      showAILoading('🤖 IA processando seu comando...');
      
      try {
        await ensurePuterAuth();
        
        const projectFiles = [];
        for (const [key, file] of Object.entries(files)) {
          projectFiles.push({ name: file.name, content: file.content || '' });
        }
        
        const prompt = `
          Você é um assistente que EDITA e CRIA códigos automaticamente.
          
          PROJETO: ${elements.projectName.value}
          ARQUIVOS: ${projectFiles.map(f => f.name).join(', ')}
          CONTEÚDO DOS ARQUIVOS:
          ${projectFiles.map(f => `--- ${f.name} ---\n${f.content.substring(0, 800)}`).join('\n\n')}
          
          COMANDO: "${userMessage}"
          
          REGRAS:
          1. Se o usuário pedir para CRIAR um arquivo, responda começando com "VOU CRIAR:" e o nome do arquivo
          2. Se pedir para EDITAR, responda "VOU EDITAR:" e o nome
          3. Se pedir para SUBSTITUIR, responda "VOU SUBSTITUIR:" e o nome
          4. Coloque o código completo dentro de \`\`\`
          5. Responda em português
        `;
        
        const response = await puter.ai.chat(prompt);
        let aiResponse = '';
        if (typeof response === 'string') aiResponse = response;
        else if (response.message?.content) aiResponse = response.message.content;
        else aiResponse = JSON.stringify(response);
        
        hideAILoading();
        
        // Extrair ação e código
        let action = '';
        let fileName = '';
        if (aiResponse.includes('VOU CRIAR:')) {
          action = 'criar';
          const match = aiResponse.match(/VOU CRIAR:\s*([^\n]+)/);
          if (match) fileName = match[1].trim();
        } else if (aiResponse.includes('VOU EDITAR:')) {
          action = 'editar';
          const match = aiResponse.match(/VOU EDITAR:\s*([^\n]+)/);
          if (match) fileName = match[1].trim();
        } else if (aiResponse.includes('VOU SUBSTITUIR:')) {
          action = 'substituir';
          const match = aiResponse.match(/VOU SUBSTITUIR:\s*([^\n]+)/);
          if (match) fileName = match[1].trim();
        }
        
        const codeMatch = aiResponse.match(/```(\w*)\n([\s\S]*?)```/);
        const code = codeMatch ? codeMatch[2].trim() : '';
        
        if (code && (action === 'criar' || action === 'editar' || action === 'substituir')) {
          await executeAIAction(action, fileName, code, aiResponse);
          addChatMessage(aiResponse.replace(/```[\s\S]*?```/, '').trim() || '✅ Comando executado!', 'ai');
        } else {
          addChatMessage(aiResponse, 'ai');
        }
        
      } catch (error) {
        hideAILoading();
        addChatMessage(`❌ Erro: ${error.message}`, 'ai');
      }
    }

    // ==================== PROJETOS ====================
    async function loadProjects() {
      const projectsRef = db.ref(`projects/${currentUser.uid}`);
      const snapshot = await projectsRef.once('value');
      allProjects = [];
      snapshot.forEach(child => {
        allProjects.push({
          id: child.key,
          name: child.val().name || 'Sem nome',
          updatedAt: child.val().updatedAt || new Date().toISOString()
        });
      });
      allProjects.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      renderProjectsList();
    }

    function renderProjectsList() {
      if (allProjects.length === 0) {
        elements.projectsList.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Nenhum projeto<br><button class="new-project-btn" onclick="createNewProject()" style="margin-top:10px;">+ Criar primeiro</button></div>';
        return;
      }
      elements.projectsList.innerHTML = allProjects.map(p => `
        <div class="project-item ${currentProjectId === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
          <div class="project-name">📄 ${escapeHtml(p.name)}</div>
          <div class="project-date">${new Date(p.updatedAt).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

    async function selectProject(projectId) {
      if (currentProjectId === projectId) return;
      currentProjectId = projectId;
      await loadProjectData();
      await loadChatHistory();
      updateTabs();
      window.history.pushState({}, '', `?projectId=${projectId}`);
    }

    async function createNewProject() {
      const name = prompt('Nome do novo projeto:', 'Meu Projeto');
      if (!name) return;
      
      const newProjectRef = db.ref(`projects/${currentUser.uid}`).push();
      const projectId = newProjectRef.key;
      
      const defaultFiles = {};
      const fileKey = btoa('index.html').replace(/=/g, '');
      defaultFiles[fileKey] = {
        name: 'index.html',
        originalName: 'index.html',
        content: `<!DOCTYPE html><html><head><title>${name}</title><meta charset="UTF-8"></head><body><h1>${name}</h1><p>Bem-vindo ao seu projeto!</p></body></html>`,
        size: 200,
        createdAt: new Date().toISOString()
      };
      
      await newProjectRef.set({ name: name, files: defaultFiles, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      await loadProjects();
      await selectProject(projectId);
      showNotification(`Projeto "${name}" criado!`, 'success');
    }

    async function loadProjectData() {
      const snapshot = await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).once('value');
      const data = snapshot.val();
      if (!data) return;
      
      elements.projectName.value = data.name || 'Projeto';
      files = data.files || {};
      
      const fileKeys = Object.keys(files);
      if (fileKeys.length > 0) await openFile(fileKeys[0]);
      else await createDefaultIndexHtml();
      
      if (data.hosting) {
        currentHostingUrl = data.hosting.url;
        currentHostingSubdomain = data.hosting.subdomain;
        if (currentHostingUrl) {
          elements.fileUrl.value = currentHostingUrl;
          elements.urlPanel.style.display = 'flex';
        }
      }
      updateTabs();
      renderProjectsList();
    }

    async function createDefaultIndexHtml() {
      const fileName = 'index.html';
      const fileKey = btoa(fileName).replace(/=/g, '');
      files[fileKey] = {
        name: fileName, originalName: fileName,
        content: `<!DOCTYPE html><html><head><title>${elements.projectName.value || 'Projeto'}</title></head><body><h1>Bem-vindo!</h1></body></html>`,
        size: 100, createdAt: new Date().toISOString()
      };
      await saveProject();
      await openFile(fileKey);
    }

    async function saveProject() {
      await db.ref(`projects/${currentUser.uid}/${currentProjectId}`).update({ files: files, updatedAt: new Date().toISOString() });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== EDITOR ====================
    function getContentSize(content) { return new Blob([content]).size; }

    async function saveFile(fileKey, content) {
      const fileData = files[fileKey];
      const size = getContentSize(content);
      const oldSize = fileData.size || 0;
      userStorage.used = userStorage.used - oldSize + size;
      files[fileKey] = { ...fileData, content: content, size: size, updatedAt: new Date().toISOString() };
      await db.ref(`users/${currentUser.uid}/storage`).set({ used: userStorage.used, limit: userStorage.limit });
      updateStorageDisplay();
      return true;
    }

    function updateStorageDisplay() {
      const usedMB = (userStorage.used / (1024 * 1024)).toFixed(2);
      const limitMB = (userStorage.limit / (1024 * 1024)).toFixed(0);
      elements.storageUsed.textContent = usedMB;
      elements.storageLimit.textContent = limitMB;
    }

    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });

    require(['vs/editor/editor.main'], function() {
      editor = monaco.editor.create(elements.container, {
        theme: 'vs-dark', automaticLayout: true, minimap: { enabled: false }, language: 'html', fontSize: 13
      });
      editor.onDidChangeModelContent(() => { if (currentFile) elements.saveFileBtn.disabled = false; });
      initializeApp();
    });

    async function initializeApp() {
      auth.onAuthStateChanged(async user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        currentUser = user;
        elements.userName.textContent = user.displayName || user.email.split('@')[0];
        
        const urlParams = new URLSearchParams(window.location.search);
        currentProjectId = urlParams.get('projectId');
        
        await loadUserStorage();
        await loadProjects();
        
        if (currentProjectId && allProjects.some(p => p.id === currentProjectId)) {
          await loadProjectData();
          await loadChatHistory();
        } else if (allProjects.length > 0) {
          await selectProject(allProjects[0].id);
        } else {
          await createNewProject();
        }
        
        elements.loadingScreen.style.opacity = '0';
        setTimeout(() => {
          elements.loadingScreen.style.display = 'none';
          elements.appContent.style.display = 'flex';
        }, 500);
        
        setupEventListeners();
        initPuter();
      });
    }

    async function loadUserStorage() {
      const snapshot = await db.ref(`users/${currentUser.uid}/storage`).once('value');
      const data = snapshot.val();
      if (data) { userStorage.used = data.used || 0; userStorage.limit = data.limit || 5 * 1024 * 1024; }
      updateStorageDisplay();
    }

    async function openFile(fileKey) {
      if (!files[fileKey] || !editor) return;
      currentFile = fileKey;
      const fileData = files[fileKey];
      let lang = 'plaintext';
      const ext = (fileData.name || '').split('.').pop().toLowerCase();
      if (ext === 'html') lang = 'html';
      else if (ext === 'css') lang = 'css';
      else if (ext === 'js') lang = 'javascript';
      
      const content = fileData.content || '';
      let model = models[fileKey];
      if (!model) {
        model = monaco.editor.createModel(content, lang, monaco.Uri.parse(`file:///${fileData.name}`));
        models[fileKey] = model;
      } else {
        model.setValue(content);
        monaco.editor.setModelLanguage(model, lang);
      }
      editor.setModel(model);
      updateTabs();
      elements.saveFileBtn.disabled = true;
    }

    async function saveCurrentFile() {
      if (!currentFile || !editor) return;
      const content = editor.getModel().getValue();
      const success = await saveFile(currentFile, content);
      if (success) {
        await saveProject();
        elements.saveFileBtn.disabled = true;
        elements.saveFileBtn.textContent = '✓';
        setTimeout(() => { elements.saveFileBtn.textContent = '💾 Salvar'; }, 1500);
        showNotification('Arquivo salvo!', 'success');
      }
    }

    async function createNewFile() {
      const fileName = elements.newFileName.value.trim();
      if (!fileName) return showNotification('Digite um nome', 'error');
      const fileKey = btoa(fileName).replace(/=/g, '');
      if (files[fileKey]) return showNotification('Arquivo já existe', 'error');
      
      let content = '';
      const ext = fileName.split('.').pop().toLowerCase();
      if (ext === 'html') content = `<!DOCTYPE html><html><head><title>${fileName}</title></head><body></body></html>`;
      else if (ext === 'css') content = `/* ${fileName} */\n`;
      else content = `// ${fileName}\n`;
      
      files[fileKey] = { name: fileName, originalName: fileName, content: content, size: content.length, createdAt: new Date().toISOString() };
      await saveProject();
      await openFile(fileKey);
      elements.newFileName.value = '';
      showNotification(`Arquivo ${fileName} criado!`, 'success');
    }

    function updateTabs() {
      elements.tabsContainer.innerHTML = '';
      Object.keys(files).forEach(key => {
        const tab = document.createElement('button');
        tab.className = `tab-btn ${key === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(key);
        tab.innerHTML = `${files[key].name} <button class="close-tab-btn" onclick="event.stopPropagation(); closeFile('${key}')">&times;</button>`;
        elements.tabsContainer.appendChild(tab);
      });
    }

    async function closeFile(fileKey) {
      if (Object.keys(files).length <= 1) { showNotification('Não pode fechar o último arquivo', 'warning'); return; }
      delete files[fileKey];
      await saveProject();
      if (fileKey === currentFile) await openFile(Object.keys(files)[0]);
      updateTabs();
    }

    // ==================== PUTER ====================
    async function initPuter() {
      try {
        const user = await puter.auth.getUser();
        if (user) updatePuterStatus(true);
        else updatePuterStatus(false);
      } catch(e) { updatePuterStatus(false); }
    }

    async function ensurePuterAuth() {
      try {
        const user = await puter.auth.getUser();
        if (user) { updatePuterStatus(true); return true; }
      } catch(e) {}
      try {
        await puter.auth.signIn();
        updatePuterStatus(true);
        return true;
      } catch(e) {
        showNotification('Erro ao conectar ao Puter', 'error');
        return false;
      }
    }

    async function hostProject() {
      const auth = await ensurePuterAuth();
      if (!auth) return;
      
      const hasIndex = Object.values(files).some(f => f.name === 'index.html');
      if (!hasIndex) { showNotification('Crie um arquivo index.html primeiro', 'warning'); return; }
      
      showNotification('Hospedando projeto...', 'info');
      try {
        const dirName = `codehub_${currentUser.uid}_${Date.now()}`;
        await puter.fs.mkdir(dirName);
        for (const file of Object.values(files)) {
          await puter.fs.write(`${dirName}/${file.name}`, file.content || '');
        }
        const subdomain = `codehub-${Math.random().toString(36).substring(2, 10)}`;
        const site = await puter.hosting.create(subdomain, dirName);
        const url = `https://${site.subdomain}.puter.site`;
        currentHostingUrl = url;
        currentHostingSubdomain = site.subdomain;
        await db.ref(`projects/${currentUser.uid}/${currentProjectId}/hosting`).set({ url: url, subdomain: site.subdomain, directory: dirName, publishedAt: new Date().toISOString() });
        elements.fileUrl.value = url;
        elements.urlPanel.style.display = 'flex';
        showNotification(`✅ Site hospedado em ${url}`, 'success');
      } catch(e) { showNotification(`Erro: ${e.message}`, 'error'); }
    }

    function openPuterDashboard() { window.open('https://puter.com', '_blank'); }
    function previewProject() {
      const index = Object.values(files).find(f => f.name === 'index.html');
      if (index?.content) {
        const blob = new Blob([index.content], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } else { showNotification('Crie um index.html primeiro', 'warning'); }
    }
    function copyUrl() {
      if (currentHostingUrl) {
        navigator.clipboard.writeText(currentHostingUrl);
        showNotification('URL copiada!', 'success');
      } else { showNotification('Hospede o projeto primeiro', 'warning'); }
    }

    function setupEventListeners() {
      elements.newFileForm.addEventListener('submit', e => { e.preventDefault(); createNewFile(); });
      elements.saveFileBtn.addEventListener('click', saveCurrentFile);
      elements.previewBtn.addEventListener('click', previewProject);
      elements.copyUrlBtn.addEventListener('click', copyUrl);
      elements.puterDashboardBtn.addEventListener('click', openPuterDashboard);
      elements.hostBtn?.addEventListener('click', hostProject);
      elements.openUrlBtn?.addEventListener('click', () => { if (currentHostingUrl) window.open(currentHostingUrl, '_blank'); });
      elements.sendChatBtn.addEventListener('click', sendToAI);
      elements.chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); } });
      elements.logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'auth.html'));
      elements.projectName.addEventListener('blur', async () => {
        const newName = elements.projectName.value.trim();
        if (newName && currentProjectId) {
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(newName);
          await loadProjects();
        }
      });
    }

    window.selectProject = selectProject;
    window.createNewProject = createNewProject;
    window.clearChat = clearChat;
    window.closeFile = closeFile;
  </script>
</body>
</html>
