<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CodeHUB Pro - Editor de Código Avançado</title>
  <link rel="icon" type="image/png" href="https://alexandre7888.github.io/CodeHUB/InShot_20250807_112151490.jpg">
  <link rel="stylesheet" href="editor.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-ring">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <h2>CodeHUB Pro</h2>
  </div>

  <!-- App Content -->
  <div id="app-content" style="display:none;flex:1;flex-direction:column;">
    <!-- Top Bar -->
    <div id="top-bar">
      <button id="backToProjects" onclick="window.location.href='index.html'">🏠</button>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <button id="saveFileBtn">💾 Salvar</button>
      <button id="previewBtn">👁️ Preview</button>
      <button id="sitePublishBtn">🚀 Publicar</button>
      <button id="siteDeleteBtn">🗑️ Deletar</button>
      <div id="auto-save-status">
        <span id="auto-save-indicator"></span>
        <span id="auto-save-text">Pronto</span>
        <span id="auto-save-time"></span>
      </div>
      <button onclick="showVersionHistory()" title="Ctrl+H">🕒</button>
      <button id="newFileBtn" onclick="newFile()" title="Ctrl+N">📄</button>
      <button id="closeFileBtn" onclick="closeCurrentFile()" title="Ctrl+W">✕</button>
      <div class="url-panel-top" id="urlPanelTop" style="display:none;">
        <input type="text" id="fileUrlTop" readonly onclick="this.select()">
        <button onclick="copyUrl()">📋</button>
      </div>
      <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">➖</button>
        <span id="zoomLevel">100%</span>
        <button onclick="changeZoom(0.1)">➕</button>
        <button onclick="resetZoom()">↺</button>
      </div>
      <div id="user-info">
        <span id="user-name"></span>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Workers Panel -->
      <div id="workers-panel">
        <div class="workers-resize-handle" id="workersResizeHandle"></div>
        <div class="workers-header">
          <span>⚡ Workers</span>
          <span class="workers-count" id="workersCount">0</span>
        </div>
        <div class="workers-list" id="workersList">
          <div style="color:var(--text-muted);font-size:11px;text-align:center;padding:30px;">📭 Nenhum worker</div>
        </div>
        <div class="workers-footer">
          <button onclick="createNewWorker()">➕ Novo Worker</button>
        </div>
      </div>

      <!-- Editor -->
      <div id="editor-container">
        <div id="tabs"></div>
        <div id="container">
          <textarea id="simple-editor" placeholder="// Comece a codar aqui..."></textarea>
        </div>
      </div>

      <!-- AI Sidebar -->
      <div id="ai-sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="sidebar-header">
          <span>🤖 IA Assistente</span>
          <span style="font-size:10px;display:flex;align-items:center;gap:4px;">
            <span class="ai-status-dot" id="aiStatusDot"></span>
            <span id="aiStatusText">Online</span>
          </span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="message system">✨ IA pronta! Ctrl+Enter para enviar.</div>
        </div>
        <div class="chat-controls">
          <div class="chat-input-wrapper">
            <textarea id="chatInput" placeholder="Descreva o que deseja..." rows="2"></textarea>
            <button onclick="sendToAI()">Enviar</button>
            <button id="stopStreamBtn" onclick="stopStream()">⏹ Parar</button>
          </div>
          <div class="quick-actions">
            <button onclick="quickAI('create_html')">📄 HTML</button>
            <button onclick="quickAI('create_css')">🎨 CSS</button>
            <button onclick="quickAI('create_js')">⚡ JS</button>
            <button onclick="quickAI('create_worker')">🔧 Worker</button>
            <button onclick="quickAI('analyze')">🔍 Analisar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <h3 id="modalTitle">Confirmar</h3>
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button onclick="modalConfirm()" style="background:#238636;">✅ Confirmar</button>
        <button onclick="modalCancel()" style="background:#da3633;">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;padding:8px;background:var(--bg-primary);border-radius:var(--radius-md);margin-bottom:6px;">
        <span style="color:var(--accent-cyan);font-weight:600;">👁️ Preview</span>
        <button onclick="closePreviewModal()" style="font-size:11px;background:#da3633;border-color:transparent;">✕</button>
      </div>
      <iframe id="previewIframe" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <!-- New File Modal -->
  <div class="modal-overlay" id="newFileModal">
    <div class="modal-box" style="text-align:left;">
      <h3>📄 Novo Arquivo</h3>
      <div style="display:flex;flex-direction:column;gap:10px;margin:12px 0;">
        <label style="font-size:11px;">Nome:</label>
        <input type="text" id="newFileName" placeholder="ex: style.css" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px;border-radius:var(--radius-md);">
        <label style="font-size:11px;">Tipo:</label>
        <select id="newFileType" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px;border-radius:var(--radius-md);">
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="js">JavaScript</option>
        </select>
      </div>
      <div class="modal-buttons">
        <button onclick="confirmNewFile()" style="background:#238636;">✅ Criar</button>
        <button onclick="closeNewFileModal()" style="background:#da3633;">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- New Worker Modal -->
  <div class="modal-overlay" id="newWorkerModal">
    <div class="modal-box" style="text-align:left;">
      <h3>➕ Novo Worker</h3>
      <div style="display:flex;flex-direction:column;gap:10px;margin:12px 0;">
        <label style="font-size:11px;">Nome:</label>
        <input type="text" id="newWorkerName" placeholder="meu-worker" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px;border-radius:var(--radius-md);">
        <label style="font-size:11px;">Rota:</label>
        <input type="text" id="newWorkerRoute" placeholder="/api/hello" style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:8px;border-radius:var(--radius-md);">
      </div>
      <div class="modal-buttons">
        <button onclick="confirmNewWorker()" style="background:#238636;">✅ Criar</button>
        <button onclick="closeNewWorkerModal()" style="background:#da3633;">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Version History Modal -->
  <div class="modal-overlay" id="versionHistoryModal">
    <div class="modal-box" style="max-width:600px;max-height:70vh;overflow-y:auto;text-align:left;">
      <h3>🕒 Histórico de Versões</h3>
      <p style="font-size:11px;">Arquivo: <span id="versionFileName"></span></p>
      <div id="versionList" style="max-height:45vh;overflow-y:auto;"></div>
      <div class="modal-buttons" style="margin-top:16px;">
        <button onclick="closeVersionHistoryModal()" style="background:#da3633;">Fechar</button>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
