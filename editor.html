<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Editor de Projetos</title>
  <link rel="stylesheet" href="editor.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
  <div id="loading-screen">
    <img id="codefox" src="https://alexandre7888.github.io/CodeHUB/CodeFOX/foto1.jpg" class="loader" alt="CodeFOX">
    <h1>Carregando...</h1>
  </div>

  <div id="app-content" style="display:none">
    <div id="top-bar">
      <a href="index.html" class="back-btn">← Voltar</a>
      <input type="text" id="project-name" placeholder="Nome do Projeto">
      <form id="newFileForm">
        <input type="text" id="newFileName" placeholder="ex: script.js" required>
        <button type="submit">Criar arquivo</button>
      </form>
      <button id="saveFileBtn" disabled>💾 Salvar</button>
      <button id="previewBtn">👁️ Visualizar</button>
      <button id="plansBtn" class="plans-btn">💰 Planos</button>
      <div id="storage-info">
        <span id="storage-used">0</span> / <span id="storage-limit">5</span> MB
      </div>
      <div id="user-info">
        <span id="user-name">Carregando...</span>
        <button id="logoutBtn" class="logout-btn">Sair</button>
      </div>
    </div>

    <div id="tabs"></div>
    <div id="container"></div>
  </div>

  <script>
    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:1ac651348e624f6be41b32"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // Configuração do ImageKit
    const IMAGEKIT_SCRIPT = "https://script.google.com/macros/s/AKfycbz6hOhlFCw4gSFfXId1h_XydpsA3tYTGHG8_DgoHMHf8ayDadWWE1Cywbm_kikmMhY_Lg/exec";
    
    let imagekitKeys = null;
    let editor = null;
    let currentProjectId = null;
    let currentUser = null;
    let currentFile = null;
    let files = {};
    let models = {};
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 }; // 5MB padrão

    // Elementos
    const elements = {
      loadingScreen: document.getElementById('loading-screen'),
      appContent: document.getElementById('app-content'),
      projectName: document.getElementById('project-name'),
      newFileForm: document.getElementById('newFileForm'),
      newFileName: document.getElementById('newFileName'),
      saveFileBtn: document.getElementById('saveFileBtn'),
      previewBtn: document.getElementById('previewBtn'),
      plansBtn: document.getElementById('plansBtn'),
      storageUsed: document.getElementById('storage-used'),
      storageLimit: document.getElementById('storage-limit'),
      userName: document.getElementById('user-name'),
      logoutBtn: document.getElementById('logoutBtn'),
      tabsContainer: document.getElementById('tabs'),
      container: document.getElementById('container')
    };

    // Obter chaves do ImageKit
    async function getImageKitKeys() {
      if (imagekitKeys) return imagekitKeys;
      
      try {
        const response = await fetch(IMAGEKIT_SCRIPT + "?ua=api-client");
        imagekitKeys = await response.json();
        return imagekitKeys;
      } catch (error) {
        console.error('Erro ao obter chaves ImageKit:', error);
        throw error;
      }
    }

    // Upload de arquivo para ImageKit
    async function uploadToImageKit(content, fileName, folder) {
      const keys = await getImageKitKeys();
      const base64Content = "data:text/plain;base64," + btoa(unescape(encodeURIComponent(content)));
      
      const response = await fetch("https://upload.imagekit.io/api/v1/files/upload", {
        method: "POST",
        headers: {
          Authorization: "Basic " + btoa(keys.privateKey + ":"),
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
          file: base64Content,
          fileName: fileName,
          folder: folder,
          useUniqueFileName: false,
          overwriteFile: true
        })
      });
      
      const data = await response.json();
      return data;
    }

    // Deletar arquivo do ImageKit
    async function deleteFromImageKit(fileId) {
      const keys = await getImageKitKeys();
      
      const response = await fetch(`https://api.imagekit.io/v1/files/${fileId}`, {
        method: "DELETE",
        headers: {
          Authorization: "Basic " + btoa(keys.privateKey + ":")
        }
      });
      
      return response.ok;
    }

    // Calcular tamanho do conteúdo em bytes
    function getContentSize(content) {
      return new Blob([content]).size;
    }

    // Verificar limite de armazenamento
    async function checkStorageLimit(newContentSize) {
      const totalAfterAdd = userStorage.used + newContentSize;
      return totalAfterAdd <= userStorage.limit;
    }

    // Carregar informações de armazenamento do usuário
    async function loadUserStorage() {
      const userRef = db.ref(`users/${currentUser.uid}/storage`);
      const snapshot = await userRef.once('value');
      const data = snapshot.val();
      
      if (data) {
        userStorage.used = data.used || 0;
        userStorage.limit = data.limit || 5 * 1024 * 1024;
      }
      
      updateStorageDisplay();
    }

    // Atualizar display de armazenamento
    function updateStorageDisplay() {
      const usedMB = (userStorage.used / (1024 * 1024)).toFixed(2);
      const limitMB = (userStorage.limit / (1024 * 1024)).toFixed(0);
      elements.storageUsed.textContent = usedMB;
      elements.storageLimit.textContent = limitMB;
      
      // Alertar se estiver próximo do limite
      if (userStorage.used / userStorage.limit > 0.9) {
        elements.storageUsed.style.color = '#ff9800';
      } else {
        elements.storageUsed.style.color = '#4caf50';
      }
    }

    // Salvar arquivo no ImageKit e Firebase
    async function saveFile(fileKey, content) {
      const fileData = files[fileKey];
      const folder = `users/${currentUser.uid}/projects/${currentProjectId}`;
      const fileName = fileData.originalName || fileData.name;
      
      const contentSize = getContentSize(content);
      
      // Verificar limite
      if (fileData.content) {
        const oldSize = getContentSize(fileData.content);
        if (!await checkStorageLimit(contentSize - oldSize)) {
          alert('Limite de armazenamento excedido! Faça upgrade do seu plano.');
          return false;
        }
      } else if (!await checkStorageLimit(contentSize)) {
        alert('Limite de armazenamento excedido! Faça upgrade do seu plano.');
        return false;
      }
      
      try {
        // Upload para ImageKit
        const result = await uploadToImageKit(content, fileName, folder);
        
        // Atualizar referência no Firebase
        files[fileKey] = {
          ...fileData,
          content: content,
          imageKitFileId: result.fileId,
          imageKitUrl: result.url,
          size: contentSize,
          updatedAt: new Date().toISOString()
        };
        
        // Atualizar uso de armazenamento
        const oldSize = fileData.size || 0;
        userStorage.used = userStorage.used - oldSize + contentSize;
        await db.ref(`users/${currentUser.uid}/storage`).set({
          used: userStorage.used,
          limit: userStorage.limit,
          updatedAt: new Date().toISOString()
        });
        
        updateStorageDisplay();
        return true;
      } catch (error) {
        console.error('Erro ao salvar no ImageKit:', error);
        alert('Erro ao salvar arquivo. Tente novamente.');
        return false;
      }
    }

    // Carregar arquivo do ImageKit
    async function loadFileContent(fileData) {
      if (fileData.content) return fileData.content;
      
      if (fileData.imageKitUrl) {
        try {
          const response = await fetch(fileData.imageKitUrl);
          const content = await response.text();
          return content;
        } catch (error) {
          console.error('Erro ao carregar do ImageKit:', error);
          return '';
        }
      }
      
      return '';
    }

    // Configurar Monaco Editor
    require.config({ 
      paths: { 
        'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' 
      } 
    });

    require(['vs/editor/editor.main'], function() {
      editor = monaco.editor.create(elements.container, {
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false },
        language: 'html'
      });
      
      editor.onDidChangeModelContent(() => {
        if (currentFile) {
          elements.saveFileBtn.disabled = false;
        }
      });
      
      initializeApp();
    });

    // Inicializar aplicação
    function initializeApp() {
      auth.onAuthStateChanged(async user => {
        if (!user) {
          window.location.href = 'auth.html';
          return;
        }
        
        currentUser = user;
        elements.userName.textContent = user.displayName || user.email.split('@')[0];
        
        await loadUserStorage();
        
        const urlParams = new URLSearchParams(window.location.search);
        currentProjectId = urlParams.get('projectId');
        
        if (!currentProjectId) {
          alert('ID do projeto não encontrado!');
          window.location.href = 'index.html';
          return;
        }
        
        await loadProject();
        
        elements.loadingScreen.style.opacity = '0';
        setTimeout(() => {
          elements.loadingScreen.style.display = 'none';
          elements.appContent.style.display = 'block';
        }, 500);
        
        setupEventListeners();
      });
    }

    // Carregar projeto
    async function loadProject() {
      const projectRef = db.ref(`projects/${currentUser.uid}/${currentProjectId}`);
      const snapshot = await projectRef.once('value');
      const projectData = snapshot.val();
      
      if (!projectData) {
        alert('Projeto não encontrado!');
        window.location.href = 'index.html';
        return;
      }
      
      elements.projectName.value = projectData.name || 'Projeto sem nome';
      files = projectData.files || {};
      
      const fileKeys = Object.keys(files);
      if (fileKeys.length > 0) {
        await openFile(fileKeys[0]);
      } else {
        await createDefaultIndexHtml();
      }
      
      updateTabs();
    }

    // Criar arquivo padrão
    async function createDefaultIndexHtml() {
      const fileName = 'index.html';
      const fileKey = btoa(encodeURIComponent(fileName)).replace(/=/g, '');
      
      const defaultContent = `<!DOCTYPE html>
<html>
<head>
  <title>Novo Projeto</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao seu projeto!</h1>
    <p>Comece a editar seu código aqui.</p>
  </div>
</body>
</html>`;
      
      files[fileKey] = {
        name: fileName,
        originalName: fileName,
        content: defaultContent,
        language: 'html',
        size: getContentSize(defaultContent),
        createdAt: new Date().toISOString()
      };
      
      await saveProject();
      await openFile(fileKey);
    }

    // Salvar projeto no Firebase
    async function saveProject() {
      const projectRef = db.ref(`projects/${currentUser.uid}/${currentProjectId}`);
      await projectRef.update({
        files: files,
        updatedAt: new Date().toISOString()
      });
    }

    // Abrir arquivo
    async function openFile(fileKey) {
      if (!files[fileKey] || !editor) return;
      
      currentFile = fileKey;
      const fileData = files[fileKey];
      
      let language = 'plaintext';
      const ext = (fileData.originalName || fileData.name).split('.').pop().toLowerCase();
      switch(ext) {
        case 'html': language = 'html'; break;
        case 'css': language = 'css'; break;
        case 'js': language = 'javascript'; break;
        case 'json': language = 'json'; break;
      }
      
      const content = await loadFileContent(fileData);
      
      let model = models[fileKey];
      if (!model) {
        model = monaco.editor.createModel(
          content,
          language,
          monaco.Uri.parse(`file:///${fileData.originalName || fileData.name}`)
        );
        models[fileKey] = model;
      } else {
        model.setValue(content);
        monaco.editor.setModelLanguage(model, language);
      }
      
      editor.setModel(model);
      updateTabs();
      elements.saveFileBtn.disabled = true;
    }

    // Salvar arquivo atual
    async function saveCurrentFile() {
      if (!currentFile || !editor) return;
      
      const model = editor.getModel();
      if (model) {
        const content = model.getValue();
        const success = await saveFile(currentFile, content);
        
        if (success) {
          await saveProject();
          elements.saveFileBtn.disabled = true;
          elements.saveFileBtn.textContent = 'Salvo!';
          setTimeout(() => {
            elements.saveFileBtn.textContent = '💾 Salvar';
          }, 1500);
        }
      }
    }

    // Criar novo arquivo
    async function createNewFile() {
      const fileName = elements.newFileName.value.trim();
      if (!fileName) {
        alert('Digite um nome de arquivo válido.');
        return;
      }
      
      const fileKey = btoa(encodeURIComponent(fileName)).replace(/=/g, '');
      
      if (files[fileKey]) {
        alert('Arquivo já existe!');
        return;
      }
      
      let content = '';
      const ext = fileName.split('.').pop().toLowerCase();
      switch(ext) {
        case 'html':
          content = `<!DOCTYPE html>\n<html>\n<head>\n  <title>${fileName}</title>\n</head>\n<body>\n  \n</body>\n</html>`;
          break;
        case 'css':
          content = `/* ${fileName} */\n\n`;
          break;
        case 'js':
          content = `// ${fileName}\n\n`;
          break;
        default:
          content = `// ${fileName}\n`;
      }
      
      files[fileKey] = {
        name: fileName,
        originalName: fileName,
        content: content,
        language: ext,
        size: getContentSize(content),
        createdAt: new Date().toISOString()
      };
      
      await saveProject();
      await openFile(fileKey);
      elements.newFileName.value = '';
    }

    // Atualizar abas
    function updateTabs() {
      elements.tabsContainer.innerHTML = '';
      
      Object.keys(files).forEach(fileKey => {
        const fileData = files[fileKey];
        const tab = document.createElement('button');
        tab.className = `tab-btn ${fileKey === currentFile ? 'active' : ''}`;
        tab.onclick = () => openFile(fileKey);
        
        const label = document.createElement('span');
        label.textContent = fileData.originalName || fileData.name;
        tab.appendChild(label);
        
        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-tab-btn';
        closeBtn.innerHTML = '&times;';
        closeBtn.onclick = async (e) => {
          e.stopPropagation();
          
          if (Object.keys(files).length <= 1) {
            alert('Não é possível fechar o último arquivo.');
            return;
          }
          
          // Deletar do ImageKit se tiver
          if (fileData.imageKitFileId) {
            await deleteFromImageKit(fileData.imageKitFileId);
          }
          
          delete files[fileKey];
          await saveProject();
          
          if (fileKey === currentFile) {
            const firstKey = Object.keys(files)[0];
            await openFile(firstKey);
          }
          
          updateTabs();
        };
        
        tab.appendChild(closeBtn);
        elements.tabsContainer.appendChild(tab);
      });
    }

    // Abrir página de planos
    function openPlansPage() {
      window.open(`plans.html?userId=${currentUser.uid}`, '_blank');
    }

    // Configurar event listeners
    function setupEventListeners() {
      elements.newFileForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        await createNewFile();
      });
      
      elements.saveFileBtn.addEventListener('click', saveCurrentFile);
      
      elements.previewBtn.addEventListener('click', () => {
        const url = `view.html?projectId=${currentProjectId}`;
        window.open(url, '_blank');
      });
      
      elements.plansBtn.addEventListener('click', openPlansPage);
      
      elements.logoutBtn.addEventListener('click', () => {
        auth.signOut().then(() => {
          window.location.href = 'auth.html';
        });
      });
      
      elements.projectName.addEventListener('blur', async () => {
        const newName = elements.projectName.value.trim();
        if (newName) {
          await db.ref(`projects/${currentUser.uid}/${currentProjectId}/name`).set(newName);
        }
      });
    }

    // Adicionar CSS
    const style = document.createElement('style');
    style.textContent = `
      .plans-btn { background: #ff9800; }
      .plans-btn:hover { background: #f57c00; }
      .logout-btn { background: #f44336; margin-left: 10px; }
      .logout-btn:hover { background: #d32f2f; }
      #storage-info { background: #333; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-left: 10px; }
      .tab-btn { position: relative; padding-right: 25px; }
      .close-tab-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #999; cursor: pointer; font-size: 16px; }
      .close-tab-btn:hover { color: #fff; }
      #top-bar { display: flex; gap: 10px; padding: 10px; background: #1e1e1e; align-items: center; flex-wrap: wrap; }
      #container { height: calc(100vh - 100px); }
      #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; transition: opacity 0.5s; }
      .loader { width: 150px; animation: spin 2s linear infinite; border-radius: 50%; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
