<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil Firebase</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f7fb;
      color: #1b1f2a;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid #dfe5f0;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    p {
      margin: 0 0 12px;
      color: #5d6678;
    }

    .status {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #dfe5f0;
      background: #fafcff;
      font-size: 0.92rem;
    }

    .profile {
      border: 1px solid #dfe5f0;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      font-size: 0.9rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dados do Usuario</h1>
    <p>Exibe apenas nome, email e dados basicos da sessao atual.</p>

    <div id="status" class="status">Verificando sessao...</div>
    <div id="profile" class="profile">Nenhum usuario encontrado.</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.firebasestorage.app",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:1ac651348e624f6be41b32",
      measurementId: "G-7E1VWN07GM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const statusEl = document.getElementById("status");
    const profileEl = document.getElementById("profile");

    function providerName(user) {
      if (user.isAnonymous) return "anonymous";
      if (!user.providerData || user.providerData.length === 0) return "desconhecido";
      return user.providerData.map((p) => p.providerId).join(", ");
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        statusEl.textContent = "Sem sessao ativa.";
        profileEl.textContent = "Nenhum usuario encontrado.";
        return;
      }

      statusEl.textContent = "Sessao ativa encontrada.";
      profileEl.innerHTML = [
        `Nome: ${user.displayName || "(sem nome)"}`,
        `Email: ${user.email || "(sem email)"}`,
        `UID: ${user.uid}`,
        `Provedor: ${providerName(user)}`,
        `Telefone: ${user.phoneNumber || "(sem telefone)"}`
      ].join("<br>");
    });
  </script>
</body>
</html>
