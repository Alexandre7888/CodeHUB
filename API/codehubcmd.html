<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CodeHUB Terminal Web</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
body { background:black; color:#00ff00; font-family:monospace; padding:20px; }
input { width:80%; background:black; color:#00ff00; border:1px solid #00ff00; padding:5px; }
button { background:black; color:#00ff00; border:1px solid #00ff00; padding:5px; }
#saida { margin-top:20px; white-space:pre-wrap; }
#terminal { display:none; margin-top:10px; }
#loginDiv { margin-bottom:20px; }
</style>
</head>
<body>

<h2>CodeHUB Terminal Web</h2>

<div id="loginDiv">
  <input id="token" placeholder="Digite a chave do terminal">
  <button onclick="autorizar()">Autorizar</button>
</div>

<div id="terminal">
  <input id="cmd" placeholder="Digite um comando">
  <button onclick="executar()">Executar</button>
  <pre id="saida"></pre>
</div>

<script>
// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
  authDomain: "html-15e80.firebaseapp.com",
  databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
  projectId: "html-15e80",
  storageBucket: "html-15e80.firebasestorage.app",
  messagingSenderId: "1068148640439",
  appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32",
  measurementId: "G-V57KRZ02HJ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUID = null;

// Autorizar chave temporária do terminal
function autorizar(){
  let chave = document.getElementById("token").value.trim();
  if(chave === "") return;

  // UID temporário para este usuário
  currentUID = "uid_" + Math.floor(Math.random()*1000000);

  // Salva no Firebase /autenticados/<token> = UID
  db.ref("autenticados/"+chave).set(currentUID);

  document.getElementById("loginDiv").style.display="none";
  document.getElementById("terminal").style.display="block";
}

// Executar comando
function executar(){
  let comando = document.getElementById("cmd").value.trim();
  if(comando === "" || !currentUID) return;
  db.ref("comando").set({uid:currentUID, comando:comando});
  document.getElementById("cmd").value="";
}

// Atualizar saída do terminal
async function atualizar(){
  try {
    let res = await db.ref("resposta").get();
    if(res.exists() && res.val()){
      let obj = res.val();
      if(obj.uid === currentUID){
        document.getElementById("saida").innerText = obj.texto;
      }
    }
  } catch(err){ console.log(err); }
}

// Atualiza a cada 2 segundos
setInterval(atualizar,2000);
</script>

</body>
</html>
