<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CodeHUB Terminal</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
body { background:black; color:#00ff00; font-family:monospace; padding:20px; }
#cmd { width:80%; background:black; color:#00ff00; border:none; padding:5px; }
#saida { margin-top:10px; white-space:pre-wrap; max-height:400px; overflow-y:auto; border-top:1px solid #00ff00; padding-top:5px; }
button { display:none; }
</style>
</head>
<body>

<h2>CodeHUB Terminal Web</h2>

<input id="cmd" placeholder="Digite um comando e pressione Enter">

<pre id="saida"></pre>

<script>
// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
  authDomain: "html-15e80.firebaseapp.com",
  databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
  projectId: "html-15e80",
  storageBucket: "html-15e80.firebasestorage.app",
  messagingSenderId: "1068148640439",
  appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32",
  measurementId: "G-V57KRZ02HJ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUID = null;

// Função para autenticar automaticamente via client_id na URL
function autoAuth() {
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('client_id');
  if(!token) return;

  // Checa se já está salvo localStorage
  let storedUID = localStorage.getItem('uid_'+token);
  if(storedUID){
    currentUID = storedUID;
  } else {
    currentUID = "uid_" + Math.floor(Math.random()*1000000);
    localStorage.setItem('uid_'+token,currentUID);
    db.ref("autenticados/"+token).set(currentUID);
  }

  echoTerminal("Usuário autenticado automaticamente! UID: "+currentUID+"\n");
}

// Função para enviar comandos
function enviarComando(cmd){
  if(!currentUID || cmd.trim()==="") return;
  db.ref("comando").set({uid:currentUID, comando:cmd});
  echoTerminal("> "+cmd);
}

// Função para escrever no terminal
function echoTerminal(text){
  const saida = document.getElementById("saida");
  saida.innerText += text+"\n";
  saida.scrollTop = saida.scrollHeight;
}

// Evento Enter para enviar comando
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    enviarComando(this.value);
    this.value="";
  }
});

// Atualiza a saída do terminal
async function atualizar(){
  if(!currentUID) return;
  try{
    let res = await db.ref("resposta").get();
    if(res.exists() && res.val()){
      let obj = res.val();
      if(obj.uid === currentUID){
        echoTerminal(obj.texto);
      }
    }
  }catch(err){ console.log(err); }
}

// Autentica automaticamente ao carregar
autoAuth();

// Atualiza a cada 1s
setInterval(atualizar,1000);
</script>

</body>
</html>
