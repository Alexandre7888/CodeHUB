<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajude a Plataforma</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121212;
}
#donationOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(18,18,18,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}
#donationOverlay .box {
    background-color: #1e1e1e;
    padding: 30px 25px;
    border-radius: 12px;
    max-width: 500px;
    box-shadow: 0 0 25px rgba(0,255,0,0.2);
    color: #e0e0e0;
    margin-bottom: 20px;
}
#donationOverlay h1 {
    color: #00e676;
    margin-bottom: 15px;
}
#donationOverlay p {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 20px;
}
#donationOverlay a.button {
    display: inline-block;
    padding: 12px 25px;
    background-color: #00e676;
    color: #000;
    font-weight: bold;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}
#donationOverlay a.button:hover {
    background-color: #00c853;
}
#alerts {
    max-height: 150px;
    overflow-y: auto;
    background-color: #000;
    color: #00ff00;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #444;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    width: 100%;
    margin-top: 15px;
    box-sizing: border-box;
}
</style>
</head>
<body>
<div id="donationOverlay">
    <div class="box">
        <h1>🚀 Nossa Plataforma</h1>
        <p>
            Nossa plataforma ainda é pequena e não temos recursos suficientes para manter
            todos os servidores e storages necessários. 😅
        </p>
        <p>
            Se você gosta do que fazemos, considere apoiar com uma doação. 💚
        </p>
        <a class="button" href="https://pixgg.com/Abacaxi" target="_blank">💸 Fazer Doação</a>
    </div>
    <div id="alerts">
        <strong>Últimas doações:</strong><br>
        Carregando...
    </div>
</div>

<script>
// Bloqueia interação com o fundo
document.body.addEventListener('click', e => e.stopPropagation(), true);
document.body.addEventListener('keydown', e => e.stopPropagation(), true);

// Função para buscar alertas de doações
async function loadAlerts() {
    const alertContainer = document.getElementById('alerts');
    try {
        const res = await fetch('https://api.pixgg.com/?apikey=91d54bcb-d311-440a-b482-e1d38f021b3c');
        const data = await res.json();

        // Limpa conteúdo
        alertContainer.innerHTML = "<strong>Últimas doações:</strong><br>";

        if(data.length === 0) {
            alertContainer.innerHTML += "Nenhuma doação ainda.";
            return;
        }

        data.forEach(d => {
            alertContainer.innerHTML += `• ${d.nome} doou R$${d.valor}<br>`;
        });
    } catch(err) {
        alertContainer.innerHTML = "Erro ao carregar alertas.";
        console.error(err);
    }
}

// Atualiza alertas a cada 15s
loadAlerts();
setInterval(loadAlerts, 15000);
</script>
</body>
</html>
