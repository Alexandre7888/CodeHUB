            username: user.email?.split('@')[0] || 'usuário',
            email: user.email || '',
            uid: user.uid,
            displayName: user.displayName || user.email?.split('@')[0] || 'usuário'
          };

          const usernameSpan = document.getElementById('username');
          if (usernameSpan) usernameSpan.textContent = userData.displayName;
          
          loadProjects(user.uid);
        } catch (error) {
          console.error("Erro ao carregar dados do usuário:", error);
          alert("Erro ao carregar dados. Por favor, recarregue a página.");
        }
      }
    });

    // Carregar projetos do usuário
    function loadProjects(userId) {
      try {
        const projectsRef = ref(database, `projects/${userId}`);

        onValue(projectsRef, (snapshot) => {
          try {
            const projectsContainer = document.getElementById('projects-container');
            if (!projectsContainer) return;

            projectsContainer.innerHTML = '';
            const projects = snapshot.val() || {};

            if (Object.keys(projects).length === 0) {
              projectsContainer.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:40px; background:white; border-radius:10px;">
                  <p style="color:#666;">Você ainda não tem projetos. Clique em "Novo Projeto" para começar!</p>
                </div>
              `;
            }

            for (const [projectId, project] of Object.entries(projects)) {
              if (!projectId || !project) continue;

              const projectCard = document.createElement('div');
              projectCard.className = 'project-card';
              projectCard.innerHTML = `
                <div class="project-name">📄 ${escapeHtml(project.name || 'Projeto sem nome')}</div>
                <div class="project-domain">👤 ${escapeHtml(project.owner || userData?.displayName || 'usuário')}/${escapeHtml(project.slug || 'sem-slug')}</div>
                <div class="project-actions">
                  <button class="action-btn edit-btn" onclick="window.location.href='editor.html?projectId=${projectId}'">
                    ✏️ Abrir
                  </button>
                  <button class="action-btn delete-btn" onclick="deleteProject('${projectId}')">
                    🗑️ Excluir
                  </button>
                </div>
              `;
              projectsContainer.appendChild(projectCard);
            }

            showAppContent();
          } catch (error) {
            console.error("Erro ao renderizar projetos:", error);
            alert("Erro ao carregar projetos. Por favor, recarregue a página.");
          }
        }, (error) => {
          console.error("Erro ao carregar projetos:", error);
          alert("Erro ao carregar projetos. Verifique sua conexão e tente novamente.");
        });
      } catch (error) {
        console.error("Erro no carregamento de projetos:", error);
        alert("Erro no sistema. Por favor, tente novamente mais tarde.");
      }
    }

    // Função para escapar HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Funções do modal
    window.openNewProjectModal = function() {
      const modal = document.getElementById('new-project-modal');
      if (modal) {
        modal.style.display = 'block';
        const input = document.getElementById('project-name');
        if (input) input.focus();
      }
    }

    window.closeNewProjectModal = function() {
      const modal = document.getElementById('new-project-modal');
      if (modal) {
        modal.style.display = 'none';
        const input = document.getElementById('project-name');
        if (input) input.value = '';
      }
    }

    // Criar novo projeto
    async function createProject() {
      const projectName = document.getElementById('project-name').value.trim();
      const user = auth.currentUser;

      if (!isValidProjectName(projectName)) {
        alert('Por favor, informe um nome válido para o projeto (1-50 caracteres)');
        return;
      }

      try {
        loadingScreen.style.display = 'flex';
        loadingScreen.style.opacity = '1';
        appContent.style.display = 'none';

        const slug = projectName.toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/[^\w\-]+/g, '')
          .replace(/\-\-+/g, '-')
          .replace(/^-+/, '')
          .replace(/-+$/, '');

        if (!slug) {
          throw new Error('Não foi possível criar um slug válido a partir do nome');
        }

        const newProjectRef = push(ref(database, `projects/${user.uid}`));
        const projectId = newProjectRef.key;

        if (!projectId) {
          throw new Error('Não foi possível gerar um ID para o projeto');
        }

        const mainFileName = sanitizeFilename('index.html');

        const projectData = {
          name: projectName,
          slug: slug,
          owner: userData.displayName || userData.username,
          ownerId: user.uid,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          files: {
            [mainFileName]: {
              content: `<!DOCTYPE html>
<html>
<head>
  <title>${projectName}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    h1 { color: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 ${escapeHtml(projectName)}</h1>
    <p>Comece a editar seu código aqui!</p>
  </div>
</body>
</html>`,
              language: 'html',
              createdAt: new Date().toISOString(),
              originalName: 'index.html'
            }
          }
        };

        await Promise.race([
          set(newProjectRef, projectData),
          new Promise((_, reject) => 
            setTimeout(() => reject(new Error('Tempo excedido ao criar projeto')), 5000)
          )
        ]);

        closeNewProjectModal();
        window.location.href = `editor.html?projectId=${projectId}`;

      } catch (error) {
        console.error("Erro detalhado ao criar projeto:", error);
        alert(`Ocorreu um erro ao criar o projeto. ${error.message}`);
        showAppContent();
      }
    }

    // Excluir projeto
    window.deleteProject = function(projectId) {
      if (confirm('Tem certeza que deseja excluir este projeto? Esta ação não pode ser desfeita.')) {
        try {
          const user = auth.currentUser;
          if (!user || !user.uid) {
            throw new Error('Usuário não autenticado');
          }

          remove(ref(database, `projects/${user.uid}/${projectId}`))
            .then(() => {
              alert('Projeto excluído com sucesso!');
            })
            .catch(error => {
              console.error("Erro ao excluir projeto:", error);
              alert('Erro ao excluir projeto. Por favor, tente novamente.');
            });
        } catch (error) {
          console.error("Erro ao excluir projeto:", error);
          alert('Erro ao excluir projeto. Por favor, tente novamente.');
        }
      }
    }

    // Logout
    window.logout = function() {
      signOut(auth).then(() => {
        window.location.href = 'auth.html';
      }).catch(error => {
        console.error("Erro ao fazer logout:", error);
        alert('Erro ao fazer logout. Por favor, tente novamente.');
      });
    }

    // Discord Widget Functions
    window.toggleDiscordWidget = function() {
      const widget = document.getElementById('discordWidget');
      if (widget) {
        if (widget.style.display === 'none' || widget.style.display === '') {
          widget.style.display = 'block';
        } else {
          widget.style.display = 'none';
        }
      }
    }

    // Cookie functions
    function checkCookies() {
      if (localStorage.getItem('cookiesAccepted') === null) {
        const banner = document.getElementById('cookie-banner');
        if (banner) banner.style.display = 'flex';
      }
    }

    window.acceptCookies = function() {
      localStorage.setItem('cookiesAccepted', 'true');
      const banner = document.getElementById('cookie-banner');
      if (banner) banner.style.display = 'none';
      if (typeof gtag !== 'undefined') {
        gtag('consent', 'update', {
          'analytics_storage': 'granted'
        });
      }
    }

    window.rejectCookies = function() {
      localStorage.setItem('cookiesAccepted', 'false');
      const banner = document.getElementById('cookie-banner');
      if (banner) banner.style.display = 'none';
      if (typeof gtag !== 'undefined') {
        gtag('consent', 'update', {
          'analytics_storage': 'denied'
        });
      }
    }
  </script>
</body>
</html>
