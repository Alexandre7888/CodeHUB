<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Painel Administrativo</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #fff;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      text-align: center;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: #2d2d2d;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #4cc9f0;
    }
    
    .stat-label {
      color: #aaa;
      margin-top: 10px;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
    }
    
    .tab-btn {
      background: transparent;
      border: none;
      color: #aaa;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .tab-btn.active {
      color: #4cc9f0;
      border-bottom: 2px solid #4cc9f0;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      background: #2d2d2d;
      border-radius: 10px;
      overflow: hidden;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    
    th {
      background: #3d3d3d;
      color: #4cc9f0;
    }
    
    tr:hover {
      background: #3d3d3d;
    }
    
    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .status-completed { background: #4caf50; }
    .status-pending { background: #ff9800; }
    .status-cancelled { background: #f44336; }
    
    .btn-approve {
      background: #4caf50;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 5px;
    }
    
    .btn-reject {
      background: #f44336;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .btn-refund {
      background: #ff9800;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .search-box {
      margin-bottom: 20px;
    }
    
    .search-box input {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #444;
      background: #2d2d2d;
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 50px;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background: #2d2d2d;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      width: 90%;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .refresh-btn {
      background: #4cc9f0;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    
    .refresh-btn:hover {
      background: #3a9fd0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>👑 Painel Administrativo - CodeHUB</h1>
    <p>Gerencie usuários, pagamentos e reembolsos</p>
  </div>
  
  <div class="container">
    <button class="refresh-btn" onclick="loadAllData()">🔄 Atualizar Dados</button>
    
    <div class="stats" id="stats"></div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users')">👥 Usuários</button>
      <button class="tab-btn" onclick="switchTab('purchases')">💰 Compras</button>
      <button class="tab-btn" onclick="switchTab('refunds')">🔄 Reembolsos</button>
    </div>
    
    <div id="users-tab" class="tab-content active">
      <div class="search-box">
        <input type="text" id="userSearch" placeholder="Buscar usuário por email ou nome..." onkeyup="filterUsers()">
      </div>
      <div id="users-table"></div>
    </div>
    
    <div id="purchases-tab" class="tab-content">
      <div id="purchases-table"></div>
    </div>
    
    <div id="refunds-tab" class="tab-content">
      <div id="refunds-table"></div>
    </div>
  </div>
  
  <div id="refundModal" class="modal">
    <div class="modal-content">
      <h3>🔄 Processar Reembolso</h3>
      <p id="refundInfo"></p>
      <p>Valor a reembolsar: <strong id="refundAmount"></strong></p>
      <div class="modal-buttons">
        <button onclick="processRefundConfirm()" class="btn-approve">Confirmar Reembolso</button>
        <button onclick="closeRefundModal()" class="btn-reject">Cancelar</button>
      </div>
    </div>
  </div>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:1ac651348e624f6be41b32"
    };
    
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    
    let allUsers = [];
    let allPurchases = [];
    let allRefunds = [];
    let currentRefund = null;
    
    // Verificar se é admin
    async function checkAdmin() {
      const user = auth.currentUser;
      if (!user) {
        window.location.href = 'auth.html';
        return false;
      }
      
      // Verificar se o email é admin (configurável)
      const adminEmails = ['admin@codehub.com', 'seu-email@exemplo.com'];
      if (!adminEmails.includes(user.email)) {
        document.body.innerHTML = '<div style="text-align:center;padding:50px"><h1>🚫 Acesso Negado</h1><p>Você não tem permissão para acessar esta área.</p></div>';
        return false;
      }
      
      return true;
    }
    
    // Carregar todos os dados
    async function loadAllData() {
      document.getElementById('stats').innerHTML = '<div class="loading">Carregando dados...</div>';
      
      await Promise.all([
        loadUsers(),
        loadPurchases(),
        loadRefunds()
      ]);
      
      updateStats();
      renderUsersTable();
      renderPurchasesTable();
      renderRefundsTable();
    }
    
    // Carregar usuários
    async function loadUsers() {
      const usersRef = db.ref('users');
      const snapshot = await usersRef.once('value');
      allUsers = [];
      
      snapshot.forEach(child => {
        const userData = child.val();
        allUsers.push({
          uid: child.key,
          email: userData.email,
          name: userData.name,
          plan: userData.plan?.name || 'Grátis',
          storageUsed: userData.storage?.used || 0,
          storageLimit: userData.storage?.limit || 5 * 1024 * 1024,
          createdAt: userData.createdAt || new Date().toISOString()
        });
      });
    }
    
    // Carregar compras
    async function loadPurchases() {
      const purchasesRef = db.ref('purchases');
      const snapshot = await purchasesRef.once('value');
      allPurchases = [];
      
      snapshot.forEach(userPurchases => {
        userPurchases.forEach(purchase => {
          const data = purchase.val();
          allPurchases.push({
            ...data,
            userId: userPurchases.key,
            id: purchase.key
          });
        });
      });
      
      allPurchases.sort((a, b) => new Date(b.date) - new Date(a.date));
    }
    
    // Carregar reembolsos
    async function loadRefunds() {
      const refundsRef = db.ref('refunds');
      const snapshot = await refundsRef.once('value');
      allRefunds = [];
      
      snapshot.forEach(userRefunds => {
        userRefunds.forEach(refund => {
          const data = refund.val();
          allRefunds.push({
            ...data,
            userId: userRefunds.key,
            id: refund.key
          });
        });
      });
      
      allRefunds.sort((a, b) => new Date(b.date) - new Date(a.date));
    }
    
    // Atualizar estatísticas
    function updateStats() {
      const totalUsers = allUsers.length;
      const totalRevenue = allPurchases
        .filter(p => p.status === 'completed')
        .reduce((sum, p) => sum + p.price, 0);
      const totalRefunds = allRefunds
        .filter(r => r.status === 'approved')
        .reduce((sum, r) => sum + r.price, 0);
      const pendingRefunds = allRefunds.filter(r => r.status === 'pending').length;
      
      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${totalUsers}</div>
          <div class="stat-label">Total de Usuários</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">R$ ${(totalRevenue / 100).toFixed(2)}</div>
          <div class="stat-label">Receita Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">R$ ${(totalRefunds / 100).toFixed(2)}</div>
          <div class="stat-label">Reembolsos</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${pendingRefunds}</div>
          <div class="stat-label">Reembolsos Pendentes</div>
        </div>
      `;
    }
    
    // Renderizar tabela de usuários
    function renderUsersTable() {
      const searchTerm = document.getElementById('userSearch')?.value.toLowerCase() || '';
      const filteredUsers = allUsers.filter(u => 
        (u.email?.toLowerCase().includes(searchTerm) || 
         u.name?.toLowerCase().includes(searchTerm))
      );
      
      const usedMB = (size) => (size / (1024 * 1024)).toFixed(2);
      const limitMB = (size) => (size / (1024 * 1024)).toFixed(0);
      
      document.getElementById('users-table').innerHTML = `
        <table>
          <thead>
            <tr><th>Usuário</th><th>Email</th><th>Plano</th><th>Armazenamento</th><th>Data de Cadastro</th></tr>
          </thead>
          <tbody>
            ${filteredUsers.map(u => `
              <tr>
                <td>${u.name || 'N/A'}</td>
                <td>${u.email || 'N/A'}</td>
                <td><span class="status-badge status-completed">${u.plan}</span></td>
                <td>${usedMB(u.storageUsed)}MB / ${limitMB(u.storageLimit)}GB</td>
                <td>${new Date(u.createdAt).toLocaleDateString('pt-BR')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    
    // Renderizar tabela de compras
    function renderPurchasesTable() {
      document.getElementById('purchases-table').innerHTML = `
        <table>
          <thead>
            <tr><th>Usuário</th><th>Plano</th><th>Valor</th><th>Data</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${allPurchases.map(p => {
              const user = allUsers.find(u => u.uid === p.userId);
              return `
                <tr>
                  <td>${user?.name || user?.email || p.userId}</td>
                  <td>${p.plan}</td>
                  <td>R$ ${p.price}</td>
                  <td>${new Date(p.date).toLocaleString('pt-BR')}</td>
                  <td><span class="status-badge status-${p.status}">${p.status}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
    
    // Renderizar tabela de reembolsos
    function renderRefundsTable() {
      document.getElementById('refunds-table').innerHTML = `
        <table>
          <thead>
            <tr><th>Usuário</th><th>Plano</th><th>Valor</th><th>Motivo</th><th>Data</th><th>Status</th><th>Ações</th></tr>
          </thead>
          <tbody>
            ${allRefunds.map(r => {
              const user = allUsers.find(u => u.uid === r.userId);
              return `
                <tr>
                  <td>${user?.name || user?.email || r.userId}</td>
                  <td>${r.plan}</td>
                  <td>R$ ${r.price}</td>
                  <td>${r.reason?.substring(0, 50) || 'N/A'}${r.reason?.length > 50 ? '...' : ''}</td>
                  <td>${new Date(r.date).toLocaleString('pt-BR')}</td>
                  <td><span class="status-badge status-${r.status === 'pending' ? 'pending' : (r.status === 'approved' ? 'completed' : 'cancelled')}">${r.status}</span></td>
                  <td>
                    ${r.status === 'pending' ? `
                      <button class="btn-approve" onclick="openRefundModal('${r.userId}', '${r.id}')">Aprovar</button>
                      <button class="btn-reject" onclick="rejectRefund('${r.userId}', '${r.id}')">Recusar</button>
                    ` : ''}
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
    
    // Abrir modal de reembolso
    function openRefundModal(userId, refundId) {
      const refund = allRefunds.find(r => r.userId === userId && r.id === refundId);
      if (!refund) return;
      
      currentRefund = refund;
      document.getElementById('refundInfo').textContent = `Reembolsar ${refund.plan} para usuário ${userId}`;
      document.getElementById('refundAmount').textContent = `R$ ${refund.price}`;
      document.getElementById('refundModal').style.display = 'flex';
    }
    
    // Processar reembolso
    async function processRefundConfirm() {
      if (!currentRefund) return;
      
      // Atualizar status do reembolso
      const refundRef = db.ref(`refunds/${currentRefund.userId}/${currentRefund.id}`);
      await refundRef.update({ status: 'approved', processedAt: new Date().toISOString() });
      
      // Reverter plano do usuário para grátis
      await db.ref(`users/${currentRefund.userId}/plan`).set({
        name: 'Grátis',
        storage: 5 * 1024 * 1024,
        updatedAt: new Date().toISOString()
      });
      
      // Reverter limite de armazenamento
      await db.ref(`users/${currentRefund.userId}/storage/limit`).set(5 * 1024 * 1024);
      
      showNotification('Reembolso processado com sucesso!', 'success');
      closeRefundModal();
      await loadAllData();
    }
    
    // Recusar reembolso
    async function rejectRefund(userId, refundId) {
      const confirm = window.confirm('Tem certeza que deseja recusar este reembolso?');
      if (!confirm) return;
      
      const refundRef = db.ref(`refunds/${userId}/${refundId}`);
      await refundRef.update({ status: 'rejected', processedAt: new Date().toISOString() });
      
      showNotification('Reembolso recusado!', 'info');
      await loadAllData();
    }
    
    // Fechar modal
    function closeRefundModal() {
      document.getElementById('refundModal').style.display = 'none';
      currentRefund = null;
    }
    
    // Mostrar notificação
    function showNotification(message, type) {
      const notification = document.createElement('div');
      notification.textContent = message;
      notification.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: ${type === 'success' ? '#4caf50' : '#f44336'};
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }
    
    // Filtrar usuários
    function filterUsers() {
      renderUsersTable();
    }
    
    // Trocar aba
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      if (tab === 'users') {
        document.querySelector('.tab-btn:first-child').classList.add('active');
        document.getElementById('users-tab').classList.add('active');
      } else if (tab === 'purchases') {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('purchases-tab').classList.add('active');
      } else if (tab === 'refunds') {
        document.querySelectorAll('.tab-btn')[2].classList.add('active');
        document.getElementById('refunds-tab').classList.add('active');
      }
    }
    
    // Inicializar
    async function initialize() {
      const isAdmin = await checkAdmin();
      if (!isAdmin) return;
      
      await loadAllData();
    }
    
    // Adicionar CSS da animação
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
    `;
    document.head.appendChild(style);
    
    // Expor funções globalmente
    window.switchTab = switchTab;
    window.filterUsers = filterUsers;
    window.loadAllData = loadAllData;
    window.openRefundModal = openRefundModal;
    window.processRefundConfirm = processRefundConfirm;
    window.rejectRefund = rejectRefund;
    window.closeRefundModal = closeRefundModal;
    
    initialize();
  </script>
</body>
</html>
