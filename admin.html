<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Admin</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #fff; }
    .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; text-align: center; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .login-container { max-width: 400px; margin: 100px auto; background: #2d2d2d; padding: 30px; border-radius: 10px; text-align: center; }
    .login-container input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; background: #1e1e1e; color: white; border: 1px solid #444; }
    .login-container button { background: #4caf50; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #2d2d2d; padding: 20px; border-radius: 10px; text-align: center; }
    .stat-value { font-size: 2.5em; font-weight: bold; color: #4cc9f0; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #444; flex-wrap: wrap; }
    .tab-btn { background: transparent; border: none; color: #aaa; padding: 10px 20px; cursor: pointer; }
    .tab-btn.active { color: #4cc9f0; border-bottom: 2px solid #4cc9f0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: #2d2d2d; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
    th { background: #3d3d3d; color: #4cc9f0; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .status-completed { background: #4caf50; }
    .status-pending { background: #ff9800; }
    .btn-approve { background: #4caf50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
    .btn-reject { background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .refresh-btn { background: #4cc9f0; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    .search-box { margin-bottom: 20px; }
    .search-box input { width: 100%; padding: 10px; border-radius: 5px; background: #2d2d2d; color: white; border: 1px solid #444; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: #2d2d2d; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    @media (max-width: 768px) { th, td { padding: 8px; font-size: 12px; } }
  </style>
</head>
<body>
  <div class="header"><h1>👑 Painel Administrativo - CodeHUB</h1></div>
  <div class="container" id="adminContainer">
    <div id="loginForm" class="login-container">
      <h2>🔐 Acesso Administrativo</h2>
      <input type="email" id="adminEmail" placeholder="Email do Admin">
      <input type="password" id="adminPassword" placeholder="Senha">
      <button onclick="loginAdmin()">Entrar</button>
    </div>
    <div id="adminContent" style="display: none;">
      <button class="refresh-btn" onclick="loadAllData()">🔄 Atualizar</button>
      <div class="stats" id="stats"></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('users')">👥 Usuários</button>
        <button class="tab-btn" onclick="switchTab('refunds')">🔄 Reembolsos</button>
      </div>
      <div id="users-tab" class="tab-content active">
        <div class="search-box"><input type="text" id="userSearch" placeholder="Buscar usuário..." onkeyup="filterUsers()"></div>
        <div id="users-table"></div>
      </div>
      <div id="refunds-tab" class="tab-content">
        <div id="refunds-table"></div>
      </div>
    </div>
  </div>
  <div id="refundModal" class="modal">
    <div class="modal-content">
      <h3>Processar Reembolso</h3>
      <p id="refundInfo"></p>
      <div class="modal-buttons">
        <button onclick="processRefund()" class="btn-approve">Confirmar</button>
        <button onclick="closeRefundModal()" class="btn-reject">Cancelar</button>
      </div>
    </div>
  </div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };
    
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let allUsers = [];
    let allRefunds = [];
    let currentRefund = null;
    const ADMIN_EMAIL = "admin@codehub.com"; // Altere para seu email
    
    async function loginAdmin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      
      try {
        await auth.signInWithEmailAndPassword(email, password);
        if (auth.currentUser.email !== ADMIN_EMAIL) {
          await auth.signOut();
          alert('Acesso negado!');
          return;
        }
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadAllData();
      } catch (error) {
        alert('Credenciais inválidas!');
      }
    }
    
    async function loadAllData() {
      await loadUsers();
      await loadRefunds();
      updateStats();
      renderUsersTable();
      renderRefundsTable();
    }
    
    async function loadUsers() {
      const usersRef = db.ref('users');
      const snapshot = await usersRef.once('value');
      allUsers = [];
      snapshot.forEach(child => {
        const data = child.val();
        allUsers.push({
          uid: child.key,
          plan: data.plan || 'Grátis',
          storageUsed: data.storage?.used || 0,
          storageLimit: data.storage?.limit || 5242880,
          createdAt: data.createdAt || new Date().toISOString()
        });
      });
    }
    
    async function loadRefunds() {
      const refundsRef = db.ref('refunds');
      const snapshot = await refundsRef.once('value');
      allRefunds = [];
      snapshot.forEach(userRefunds => {
        userRefunds.forEach(refund => {
          allRefunds.push({ ...refund.val(), userId: userRefunds.key });
        });
      });
      allRefunds.sort((a, b) => new Date(b.date) - new Date(a.date));
    }
    
    function updateStats() {
      const totalUsers = allUsers.length;
      const pendingRefunds = allRefunds.filter(r => r.status === 'pending').length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${totalUsers}</div><div>Usuários</div></div>
        <div class="stat-card"><div class="stat-value">${pendingRefunds}</div><div>Reembolsos Pendentes</div></div>
      `;
    }
    
    function renderUsersTable() {
      const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
      const filtered = allUsers.filter(u => u.uid.toLowerCase().includes(search));
      const usedMB = (s) => (s / (1024*1024)).toFixed(2);
      const limitMB = (s) => (s / (1024*1024)).toFixed(0);
      
      document.getElementById('users-table').innerHTML = `
        <table><thead><tr><th>ID</th><th>Plano</th><th>Armazenamento</th></tr></thead>
        <tbody>${filtered.map(u => `
          <tr><td style="font-family:monospace;font-size:12px;">${u.uid.substring(0,20)}...</td>
          <td><span class="status-badge status-completed">${u.plan}</span></td>
          <td>${usedMB(u.storageUsed)}MB / ${limitMB(u.storageLimit)}GB</td></tr>
        `).join('')}</tbody></table>
      `;
    }
    
    function renderRefundsTable() {
      document.getElementById('refunds-table').innerHTML = `
        <table><thead><tr><th>Usuário</th><th>Plano</th><th>Valor</th><th>Motivo</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${allRefunds.map(r => `
          <tr><td style="font-family:monospace;font-size:12px;">${r.userId?.substring(0,15)}...</td>
          <td>${r.plan}</td><td>R$ ${r.price}</td>
          <td>${r.reason?.substring(0,30) || 'N/A'}</td>
          <td>${new Date(r.date).toLocaleDateString()}</td>
          <td><span class="status-badge status-${r.status === 'pending' ? 'pending' : 'completed'}">${r.status}</span></td>
          <td>${r.status === 'pending' ? `<button class="btn-approve" onclick="openRefundModal('${r.userId}','${r.id}')">Aprovar</button>` : ''}</td>
        </tr>
        `).join('')}</tbody></table>
      `;
    }
    
    function openRefundModal(userId, refundId) {
      currentRefund = { userId, refundId };
      document.getElementById('refundInfo').innerHTML = `Confirmar reembolso para usuário ${userId.substring(0,15)}...?`;
      document.getElementById('refundModal').style.display = 'flex';
    }
    
    async function processRefund() {
      if (!currentRefund) return;
      await db.ref(`refunds/${currentRefund.userId}/${currentRefund.refundId}`).update({ status: 'approved', processedAt: new Date().toISOString() });
      await db.ref(`users/${currentRefund.userId}/plan`).set('free');
      await db.ref(`users/${currentRefund.userId}/storage/limit`).set(5 * 1024 * 1024);
      alert('Reembolso processado!');
      closeRefundModal();
      loadAllData();
    }
    
    function closeRefundModal() { document.getElementById('refundModal').style.display = 'none'; currentRefund = null; }
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'users') { document.querySelector('.tab-btn:first-child').classList.add('active'); document.getElementById('users-tab').classList.add('active'); }
      else { document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('refunds-tab').classList.add('active'); }
    }
    window.filterUsers = () => renderUsersTable();
    window.switchTab = switchTab;
    window.loadAllData = loadAllData;
    window.openRefundModal = openRefundModal;
    window.processRefund = processRefund;
    window.closeRefundModal = closeRefundModal;
  </script>
</body>
</html>
