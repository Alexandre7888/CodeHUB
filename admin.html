<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Admin</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #fff; }
    .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; text-align: center; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .login-container { max-width: 400px; margin: 100px auto; background: #2d2d2d; padding: 30px; border-radius: 10px; text-align: center; }
    .login-container input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; background: #1e1e1e; color: white; border: 1px solid #444; }
    .login-container button { background: #4caf50; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #2d2d2d; padding: 20px; border-radius: 10px; text-align: center; }
    .stat-value { font-size: 2.5em; font-weight: bold; color: #4cc9f0; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #444; flex-wrap: wrap; }
    .tab-btn { background: transparent; border: none; color: #aaa; padding: 10px 20px; cursor: pointer; }
    .tab-btn.active { color: #4cc9f0; border-bottom: 2px solid #4cc9f0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: #2d2d2d; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
    th { background: #3d3d3d; color: #4cc9f0; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .status-completed { background: #4caf50; }
    .status-pending { background: #ff9800; }
    .btn-approve { background: #4caf50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
    .btn-reject { background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .refresh-btn { background: #4cc9f0; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    .search-box { margin-bottom: 20px; }
    .search-box input { width: 100%; padding: 10px; border-radius: 5px; background: #2d2d2d; color: white; border: 1px solid #444; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: #2d2d2d; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    
    /* Video Call */
    .call-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff9800;
      padding: 15px 20px;
      border-radius: 10px;
      z-index: 1000;
      animation: pulse 0.5s infinite;
      cursor: pointer;
    }
    
    .video-container {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 350px;
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      z-index: 1001;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .video-container.active {
      display: block;
    }
    
    .video-header {
      background: #333;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .video-header button {
      background: #f44336;
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    #localVideo, #remoteVideo {
      width: 100%;
      background: #000;
    }
    
    .answer-call-btn {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); background: #ff5722; }
    }
    
    .online-toggle {
      background: #333;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .toggle-switch {
      width: 50px;
      height: 26px;
      background: #555;
      border-radius: 13px;
      cursor: pointer;
      position: relative;
      transition: 0.3s;
    }
    
    .toggle-switch.active {
      background: #4caf50;
    }
    
    .toggle-switch::after {
      content: '';
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      transition: 0.3s;
    }
    
    .toggle-switch.active::after {
      left: 25px;
    }
    
    @media (max-width: 768px) {
      th, td { padding: 8px; font-size: 12px; }
      .video-container { width: 280px; }
    }
  </style>
</head>
<body>
  <div class="header"><h1>👑 Painel Administrativo - CodeHUB</h1></div>
  <div class="container" id="adminContainer">
    <div id="loginForm" class="login-container">
      <h2>🔐 Acesso Administrativo</h2>
      <input type="email" id="adminEmail" placeholder="Email do Admin">
      <input type="password" id="adminPassword" placeholder="Senha">
      <button onclick="loginAdmin()">Entrar</button>
    </div>
    <div id="adminContent" style="display: none;">
      <div class="online-toggle">
        <span>📞 Status para ligações:</span>
        <div id="onlineToggle" class="toggle-switch" onclick="toggleOnlineStatus()"></div>
        <span id="statusText">Offline</span>
      </div>
      
      <button class="refresh-btn" onclick="loadAllData()">🔄 Atualizar</button>
      <div class="stats" id="stats"></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('users')">👥 Usuários</button>
        <button class="tab-btn" onclick="switchTab('refunds')">🔄 Reembolsos</button>
        <button class="tab-btn" onclick="switchTab('calls')">📞 Chamadas</button>
      </div>
      <div id="users-tab" class="tab-content active">
        <div class="search-box"><input type="text" id="userSearch" placeholder="Buscar usuário..." onkeyup="filterUsers()"></div>
        <div id="users-table"></div>
      </div>
      <div id="refunds-tab" class="tab-content">
        <div id="refunds-table"></div>
      </div>
      <div id="calls-tab" class="tab-content">
        <div id="calls-table"></div>
      </div>
    </div>
  </div>
  
  <!-- Video Container WebRTC -->
  <div id="videoContainer" class="video-container">
    <div class="video-header">
      <span>📞 Chamada com Usuário</span>
      <button onclick="hangUp()">✕ Desligar</button>
    </div>
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>
  
  <div id="refundModal" class="modal">
    <div class="modal-content">
      <h3>Processar Reembolso</h3>
      <p id="refundInfo"></p>
      <div class="modal-buttons">
        <button onclick="processRefund()" class="btn-approve">Confirmar</button>
        <button onclick="closeRefundModal()" class="btn-reject">Cancelar</button>
      </div>
    </div>
  </div>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };
    
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let allUsers = [];
    let allRefunds = [];
    let currentRefund = null;
    let isOnline = false;
    let localStream = null;
    let peerConnection = null;
    let currentCallUser = null;
    
    const ADMIN_EMAIL = "admin@codehub.com";
    
    // WebRTC
    async function toggleOnlineStatus() {
      isOnline = !isOnline;
      const toggle = document.getElementById('onlineToggle');
      const statusText = document.getElementById('statusText');
      
      if (isOnline) {
        toggle.classList.add('active');
        statusText.textContent = 'Online - Disponível para ligações';
        await db.ref('admin/status').set('online');
        
        // Escutar chamadas
        db.ref('calls').on('child_added', (snapshot) => {
          const call = snapshot.val();
          if (call.type === 'offer' && call.status === 'waiting') {
            showCallNotification(call, snapshot.key);
          }
        });
      } else {
        toggle.classList.remove('active');
        statusText.textContent = 'Offline';
        await db.ref('admin/status').set('offline');
        db.ref('calls').off();
      }
    }
    
    function showCallNotification(call, callId) {
      const notification = document.createElement('div');
      notification.className = 'call-notification';
      notification.innerHTML = `
        <strong>📞 Chamada recebida!</strong><br>
        Usuário ${call.userId.substring(0, 15)}... está ligando.<br>
        <button class="answer-call-btn" onclick="answerCall('${callId}', '${call.userId}')">Atender</button>
        <button onclick="rejectCall('${callId}')" style="background:#f44336; color:white; border:none; padding:4px 8px; border-radius:4px; margin-left:5px;">Recusar</button>
      `;
      document.body.appendChild(notification);
      
      // Tocar som
      const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
      audio.play();
      
      setTimeout(() => {
        if (notification.parentNode) notification.remove();
      }, 30000);
    }
    
    async function answerCall(callId, userId) {
      document.querySelectorAll('.call-notification').forEach(n => n.remove());
      currentCallUser = userId;
      
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('videoContainer').classList.add('active');
        
        // Responder chamada
        await db.ref(`calls/${userId}`).update({
          type: 'answer',
          status: 'connected',
          answeredAt: Date.now()
        });
        
        showNotification('Chamada conectada!', 'success');
      } catch (error) {
        console.error('Erro ao atender:', error);
      }
    }
    
    function rejectCall(callId) {
      db.ref(`calls/${callId}`).remove();
      document.querySelectorAll('.call-notification').forEach(n => n.remove());
      showNotification('Chamada recusada', 'info');
    }
    
    function hangUp() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      if (peerConnection) peerConnection.close();
      document.getElementById('videoContainer').classList.remove('active');
      
      if (currentCallUser) {
        db.ref(`calls/${currentCallUser}`).remove();
        currentCallUser = null;
      }
    }
    
    function showNotification(message, type) {
      const notif = document.createElement('div');
      notif.style.cssText = `position:fixed; bottom:20px; right:20px; background:${type === 'success' ? '#4caf50' : '#2196f3'}; color:white; padding:10px 20px; border-radius:5px; z-index:1000;`;
      notif.textContent = message;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }
    
    async function loginAdmin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      
      try {
        await auth.signInWithEmailAndPassword(email, password);
        if (auth.currentUser.email !== ADMIN_EMAIL) {
          await auth.signOut();
          alert('Acesso negado!');
          return;
        }
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadAllData();
      } catch (error) {
        alert('Credenciais inválidas!');
      }
    }
    
    async function loadAllData() {
      await loadUsers();
      await loadRefunds();
      updateStats();
      renderUsersTable();
      renderRefundsTable();
      renderCallsTable();
    }
    
    async function loadUsers() {
      const usersRef = db.ref('users');
      const snapshot = await usersRef.once('value');
      allUsers = [];
      snapshot.forEach(child => {
        const data = child.val();
        allUsers.push({
          uid: child.key,
          plan: data.plan || 'Grátis',
          storageUsed: data.storage?.used || 0,
          storageLimit: data.storage?.limit || 5242880,
          createdAt: data.createdAt || new Date().toISOString()
        });
      });
    }
    
    async function loadRefunds() {
      const refundsRef = db.ref('refunds');
      const snapshot = await refundsRef.once('value');
      allRefunds = [];
      snapshot.forEach(userRefunds => {
        userRefunds.forEach(refund => {
          allRefunds.push({ ...refund.val(), userId: userRefunds.key });
        });
      });
      allRefunds.sort((a, b) => new Date(b.date) - new Date(a.date));
    }
    
    async function renderCallsTable() {
      const callsRef = db.ref('calls');
      const snapshot = await callsRef.once('value');
      const calls = [];
      snapshot.forEach(child => {
        calls.push({ ...child.val(), id: child.key });
      });
      
      document.getElementById('calls-table').innerHTML = `
        <table><thead><tr><th>Usuário</th><th>Tipo</th><th>Status</th><th>Data</th><th>Ações</th></tr></thead>
        <tbody>${calls.map(c => `
          <tr>
            <td style="font-family:monospace">${c.userId?.substring(0,20)}...</td>
            <td>${c.type}</td>
            <td><span class="status-badge status-${c.status === 'waiting' ? 'pending' : 'completed'}">${c.status}</span></td>
            <td>${new Date(c.timestamp).toLocaleString()}</td>
            <td>${c.status === 'waiting' ? `<button class="btn-approve" onclick="answerCall('${c.id}','${c.userId}')">Atender</button>` : ''}</td>
          </tr>
        `).join('')}</tbody></table>
      `;
    }
    
    function updateStats() {
      const totalUsers = allUsers.length;
      const pendingRefunds = allRefunds.filter(r => r.status === 'pending').length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${totalUsers}</div><div>Usuários</div></div>
        <div class="stat-card"><div class="stat-value">${pendingRefunds}</div><div>Reembolsos Pendentes</div></div>
      `;
    }
    
    function renderUsersTable() {
      const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
      const filtered = allUsers.filter(u => u.uid.toLowerCase().includes(search));
      const usedMB = (s) => (s / (1024*1024)).toFixed(2);
      const limitMB = (s) => (s / (1024*1024)).toFixed(0);
      
      document.getElementById('users-table').innerHTML = `
        <table><thead><tr><th>ID</th><th>Plano</th><th>Armazenamento</th></tr></thead>
        <tbody>${filtered.map(u => `
          <tr><td style="font-family:monospace;font-size:12px;">${u.uid.substring(0,20)}...</td>
          <td><span class="status-badge status-completed">${u.plan}</span></td>
          <td>${usedMB(u.storageUsed)}MB / ${limitMB(u.storageLimit)}GB</td></tr>
        `).join('')}</tbody></table>
      `;
    }
    
    function renderRefundsTable() {
      document.getElementById('refunds-table').innerHTML = `
        <table><thead><tr><th>Usuário</th><th>Plano</th><th>Valor</th><th>Motivo</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${allRefunds.map(r => `
          <tr><td style="font-family:monospace">${r.userId?.substring(0,15)}...</td>
          <td>${r.plan}</td><td>R$ ${r.price}</td>
          <td>${r.reason?.substring(0,30) || 'N/A'}</td>
          <td>${new Date(r.date).toLocaleDateString()}</td>
          <td><span class="status-badge status-${r.status === 'pending' ? 'pending' : 'completed'}">${r.status}</span></td>
          <td>${r.status === 'pending' ? `<button class="btn-approve" onclick="openRefundModal('${r.userId}','${r.id}')">Aprovar</button>` : ''}</td></tr>
        `).join('')}</tbody></table>
      `;
    }
    
    function openRefundModal(userId, refundId) {
      currentRefund = { userId, refundId };
      document.getElementById('refundInfo').innerHTML = `Confirmar reembolso para usuário ${userId.substring(0,15)}...?`;
      document.getElementById('refundModal').style.display = 'flex';
    }
    
    async function processRefund() {
      if (!currentRefund) return;
      await db.ref(`refunds/${currentRefund.userId}/${currentRefund.refundId}`).update({ status: 'approved', processedAt: new Date().toISOString() });
      await db.ref(`users/${currentRefund.userId}/plan`).set('free');
      await db.ref(`users/${currentRefund.userId}/storage/limit`).set(5 * 1024 * 1024);
      alert('Reembolso processado!');
      closeRefundModal();
      loadAllData();
    }
    
    function closeRefundModal() { document.getElementById('refundModal').style.display = 'none'; currentRefund = null; }
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'users') { document.querySelector('.tab-btn:first-child').classList.add('active'); document.getElementById('users-tab').classList.add('active'); }
      else if (tab === 'refunds') { document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('refunds-tab').classList.add('active'); }
      else { document.querySelectorAll('.tab-btn')[2].classList.add('active'); document.getElementById('calls-tab').classList.add('active'); renderCallsTable(); }
    }
    
    window.filterUsers = () => renderUsersTable();
    window.switchTab = switchTab;
    window.loadAllData = loadAllData;
    window.openRefundModal = openRefundModal;
    window.processRefund = processRefund;
    window.closeRefundModal = closeRefundModal;
    window.toggleOnlineStatus = toggleOnlineStatus;
    window.answerCall = answerCall;
    window.rejectCall = rejectCall;
    window.hangUp = hangUp;
  </script>
</body>
</html>
