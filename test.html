<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Live View Web AR</title>
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: Arial; }
  #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .marker {
    position: absolute;
    width: 60px;
    height: 60px;
    background: rgba(255,0,0,0.7);
    border-radius: 50%;
    text-align: center;
    line-height: 60px;
    color: white;
    font-weight: bold;
    font-size: 16px;
    z-index: 1;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<!-- Marcadores de teste -->
<div class="marker" id="marker1">A</div>
<div class="marker" id="marker2">B</div>
<div class="marker" id="marker3">C</div>

<script>
// 1️⃣ Ativar câmera do celular
const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
  .then(stream => { video.srcObject = stream; })
  .catch(err => { alert('Erro ao acessar câmera: ' + err); });

// 2️⃣ Coordenadas simuladas para marcadores (lat, lng)
const testLocations = [
  { el: document.getElementById('marker1'), lat: -23.561, lng: -46.655 }, // Exemplo SP
  { el: document.getElementById('marker2'), lat: -23.562, lng: -46.656 },
  { el: document.getElementById('marker3'), lat: -23.563, lng: -46.657 }
];

// Função para calcular posição na tela baseada na posição do usuário
function latLngToScreen(lat, lng, userLat, userLng, heading) {
  // Diferença em graus
  const dLat = lat - userLat;
  const dLng = lng - userLng;

  // Convertendo diferença em pixels (simples simulação)
  const scale = 100000; // quanto maior, mais longe na tela
  let x = dLng * scale;
  let y = -dLat * scale;

  // Rotaciona baseado na orientação do celular
  const rad = heading * Math.PI / 180;
  const rotatedX = x * Math.cos(rad) - y * Math.sin(rad);
  const rotatedY = x * Math.sin(rad) + y * Math.cos(rad);

  return { x: window.innerWidth/2 + rotatedX, y: window.innerHeight/2 + rotatedY };
}

// 3️⃣ Obter GPS do usuário
let userPosition = { lat: -23.561, lng: -46.655 }; // posição inicial simulada
let userHeading = 0; // graus

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    userPosition.lat = pos.coords.latitude;
    userPosition.lng = pos.coords.longitude;
  });
}

// 4️⃣ Obter orientação do celular (bússola)
if (window.DeviceOrientationEvent) {
  window.addEventListener("deviceorientation", e => {
    if (e.absolute !== null) {
      userHeading = e.alpha; // rotação em torno do eixo Z
    }
  }, true);
}

// 5️⃣ Atualizar posição dos marcadores na tela
function updateMarkers() {
  testLocations.forEach(loc => {
    const screenPos = latLngToScreen(loc.lat, loc.lng, userPosition.lat, userPosition.lng, userHeading);
    loc.el.style.left = screenPos.x + 'px';
    loc.el.style.top = screenPos.y + 'px';
  });
  requestAnimationFrame(updateMarkers);
}
updateMarkers();
</script>

</body>
</html>
