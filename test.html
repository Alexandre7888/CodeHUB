<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live 360 AR Camera</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: #2196F3;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Experiência 360° Viva</h1>
        <p>Precisamos de acesso à câmera e aos sensores de movimento.</p>
        <button id="startBtn">INICIAR EXPERIÊNCIA</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';

        let scene, camera, renderer, controls, videoTexture;
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');

        startBtn.addEventListener('click', () => {
            initPermissions();
        });

        async function initPermissions() {
            try {
                // 1. Solicitar Câmera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                }).catch(() => {
                    // Fallback para qualquer câmera se a traseira falhar
                    return navigator.mediaDevices.getUserMedia({ video: true });
                });

                // 2. Solicitar Sensores (Necessário para iOS 13+)
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startScene(stream);
                    } else {
                        alert("Permissão de movimento negada.");
                    }
                } else {
                    // Android e navegadores que não exigem permissão explícita
                    startScene(stream);
                }
            } catch (err) {
                console.error("Erro ao acessar recursos:", err);
                alert("Erro: Certifique-se de usar HTTPS e dar as permissões.");
            }
        }

        function startScene(stream) {
            overlay.style.display = 'none';

            // Configuração da Cena
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // A câmera começa no centro da esfera
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Criar o elemento de vídeo
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            // Textura de Vídeo
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;

            // Criar a Esfera 360 Invertida
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            // Inverter a geometria para que a textura fique do lado de dentro
            geometry.scale(-1, 1, 1);

            const material = new THREE.MeshBasicMaterial({ map: videoTexture });
            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // Controles de Giroscópio
            controls = new DeviceOrientationControls(camera);

            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
