<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-ar-hit-test-component/dist/aframe-ar-hit-test-component.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
#info{
position:absolute;
top:20px;
left:20px;
background:black;
color:white;
padding:10px;
font-family:Arial;
}
</style>
</head>

<body>

<div id="info">
Toque na tela para colocar o botão no mundo
</div>

<a-scene
webxr="requiredFeatures: hit-test"
vr-mode-ui="enabled: false"
renderer="logarithmicDepthBuffer: true;"
ar-hit-test>

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="reticle"
geometry="primitive:ring;radiusInner:0.05;radiusOuter:0.06"
material="color:green"
visible="false">
</a-entity>

</a-scene>

<script>

const scene = document.querySelector("a-scene")
const reticle = document.querySelector("#reticle")

scene.addEventListener("ar-hit-test-select", e => {

const pos = reticle.object3D.position

const btn = document.createElement("a-cylinder")

btn.setAttribute("color","#0080ff")
btn.setAttribute("radius","0.1")
btn.setAttribute("height","0.05")

btn.object3D.position.copy(pos)

scene.appendChild(btn)

})

</script>

</body>
</html>
