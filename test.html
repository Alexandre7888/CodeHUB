<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360 Live AR</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #tap-to-start {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: white; z-index: 1000; cursor: pointer;
            background: rgba(0,0,0,0.1); /* Quase invisível */
        }
        .instruction { pointer-events: none; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="tap-to-start">
        <div class="instruction">Toque na tela para iniciar</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';

        let scene, camera, renderer, controls;
        const overlay = document.getElementById('tap-to-start');

        // O "automático" possível: iniciar no primeiro toque em qualquer lugar
        window.addEventListener('click', setup, { once: true });
        window.addEventListener('touchstart', setup, { once: true });

        async function setup() {
            overlay.style.display = 'none';
            
            try {
                // 1. Iniciar Câmera Traseira
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });

                // 2. Permissão de Sensores (Essencial para iOS)
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') initThree(stream);
                } else {
                    initThree(stream);
                }
            } catch (e) {
                console.error(e);
                alert("Acesse via HTTPS e autorize a câmera/giroscópio.");
            }
        }

        function initThree(stream) {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Vídeo Element
            const video = document.createElement('video');
            video.srcObject = stream;
            video.setAttribute('webkit-playsinline', 'true');
            video.setAttribute('playsinline', 'true');
            video.play();

            const texture = new THREE.VideoTexture(video);
            texture.colorSpace = THREE.SRGBColorSpace;

            // Esfera invertida para o 360
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1); 

            const material = new THREE.MeshBasicMaterial({ map: texture });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Giroscópio Real
            controls = new DeviceOrientationControls(camera);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
