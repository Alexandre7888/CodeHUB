<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Câmera 360 com Giroscópio</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#start{
position:absolute;
top:20px;
left:20px;
z-index:10;
padding:12px;
background:#0080ff;
color:white;
border:none;
font-size:16px;
}
</style>
</head>
<body>

<button id="start">Ativar câmera e giroscópio</button>

<video id="video" autoplay playsinline style="display:none"></video>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { DeviceOrientationControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/DeviceOrientationControls.js";

let scene,camera,renderer,controls,videoTexture;

const video = document.getElementById("video");

document.getElementById("start").onclick = async ()=>{

// pedir câmera
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

video.srcObject = stream;

// pedir permissão sensores (iOS)
if(typeof DeviceOrientationEvent.requestPermission==="function"){
await DeviceOrientationEvent.requestPermission();
}

init();

};

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// textura do vídeo
videoTexture = new THREE.VideoTexture(video);

// esfera gigante
const geometry = new THREE.SphereGeometry(500,60,40);
geometry.scale(-1,1,1);

const material = new THREE.MeshBasicMaterial({
map:videoTexture
});

const mesh = new THREE.Mesh(geometry,material);
scene.add(mesh);

// giroscópio
controls = new DeviceOrientationControls(camera);

animate();

}

function animate(){

requestAnimationFrame(animate);

if(controls) controls.update();

renderer.render(scene,camera);

}

</script>

</body>
</html>
