<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Blog - Posts</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  h1 {
    font-size: 2.5rem;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    margin-bottom: 10px;
  }

  .subtitle {
    color: rgba(255,255,255,0.9);
    font-size: 1.1rem;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: white;
    font-size: 1.2rem;
  }

  .loading-spinner {
    display: inline-block;
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
    animation: fadeInUp 0.5s ease forwards;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .post-title {
    font-size: 1.8rem;
    color: #333;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 3px solid #667eea;
    display: inline-block;
  }

  .post-meta {
    color: #888;
    font-size: 0.85rem;
    margin: 15px 0 20px 0;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .post-content {
    line-height: 1.8;
    color: #555;
    overflow-x: auto;
  }

  .post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    margin: 20px 0;
  }

  .post-content iframe {
    max-width: 100%;
    border-radius: 10px;
    margin: 20px 0;
  }

  .post-content video {
    max-width: 100%;
    border-radius: 10px;
    margin: 20px 0;
  }

  .post-content pre {
    background: #f4f4f4;
    padding: 15px;
    border-radius: 8px;
    overflow-x: auto;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    margin: 15px 0;
  }

  .post-content code {
    background: #f4f4f4;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
  }

  .post-content blockquote {
    border-left: 4px solid #667eea;
    padding-left: 20px;
    margin: 15px 0;
    color: #666;
    font-style: italic;
  }

  .post-content a {
    color: #667eea;
    text-decoration: none;
  }

  .post-content a:hover {
    text-decoration: underline;
  }

  .post-content h1, .post-content h2, .post-content h3 {
    margin: 20px 0 10px 0;
    color: #333;
  }

  .button-group {
    display: flex;
    gap: 15px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
  }

  .btn-secondary {
    background: #f0f0f0;
    color: #333;
    border: 1px solid #ddd;
  }

  .btn-secondary:hover {
    background: #e0e0e0;
    transform: scale(1.05);
  }

  .error-message {
    background: #ff6b6b;
    color: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
  }

  @media (max-width: 600px) {
    body {
      padding: 20px 15px;
    }

    h1 {
      font-size: 1.8rem;
    }

    .card {
      padding: 20px;
    }

    .post-title {
      font-size: 1.4rem;
    }

    .btn {
      padding: 10px 18px;
      font-size: 0.85rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📝 Meu Blog</h1>
    <p class="subtitle">Compartilhando ideias, conhecimentos e inspirações</p>
  </div>

  <div id="posts">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Carregando posts...</div>
    </div>
  </div>

  <div class="footer">
    <p>© 2026 CodeHUB Money - Todos os direitos reservados</p>
  </div>
</div>

<script>
// Callback que será chamado pelo JSONP
function carregarPosts(data) {
  const container = document.getElementById("posts");
  
  // Verificar se os dados são válidos
  if (!data || !data.feed || !data.feed.entry) {
    container.innerHTML = `
      <div class="error-message">
        ⚠️ Nenhum post encontrado no momento.
      </div>
    `;
    return;
  }
  
  const posts = data.feed.entry;
  container.innerHTML = '';
  
  // Processar cada post
  for (let i = 0; i < posts.length; i++) {
    const post = posts[i];
    
    // Título do post
    const titulo = post.title ? post.title.$t : "Sem título";
    
    // Conteúdo do post (HTML completo)
    let conteudo = "";
    if (post.content) {
      conteudo = post.content.$t;
    } else if (post.summary) {
      conteudo = post.summary.$t;
    }
    
    // Link do post
    let link = "";
    if (post.link) {
      for (let l of post.link) {
        if (l.rel === "alternate") {
          link = l.href;
          break;
        }
      }
    }
    
    // Data de publicação
    let dataPublicacao = "";
    if (post.published) {
      const dataObj = new Date(post.published.$t);
      dataPublicacao = dataObj.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
    }
    
    // Autor do post
    let autor = "Autor";
    if (post.author && post.author[0] && post.author[0].name) {
      autor = post.author[0].name.$t;
    }
    
    // Criar o card do post
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.1}s`;
    
    card.innerHTML = `
      <h2 class="post-title">${escapeHTML(titulo)}</h2>
      <div class="post-meta">
        <span>📅 ${dataPublicacao}</span>
        <span>✍️ ${escapeHTML(autor)}</span>
      </div>
      <div class="post-content">
        ${conteudo}
      </div>
      <div class="button-group">
        <button class="btn btn-primary" onclick="abrirModal('${link}')">
          💬 Abrir para comentar
        </button>
        <button class="btn btn-secondary" onclick="window.open('${link}', '_blank')">
          🔗 Abrir em nova aba
        </button>
      </div>
    `;
    
    container.appendChild(card);
  }
}

// Função para abrir modal com o post
function abrirModal(url) {
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
  `;
  
  const modalContent = document.createElement('div');
  modalContent.style.cssText = `
    background: white;
    width: 95%;
    height: 90%;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  `;
  
  const modalHeader = document.createElement('div');
  modalHeader.style.cssText = `
    padding: 15px 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  `;
  
  modalHeader.innerHTML = `
    <span style="font-weight: bold;">📖 Post completo - Comentários</span>
    <button style="
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    " onclick="this.closest('div').parentElement.parentElement.remove()">✕</button>
  `;
  
  const iframe = document.createElement('iframe');
  iframe.style.cssText = `
    flex: 1;
    width: 100%;
    border: none;
    background: white;
  `;
  iframe.src = url;
  
  modalContent.appendChild(modalHeader);
  modalContent.appendChild(iframe);
  modal.appendChild(modalContent);
  
  document.body.appendChild(modal);
  
  // Fechar ao clicar fora
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.remove();
    }
  });
}

// Função para escapar HTML (apenas para título e autor)
function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Adicionar animação fadeIn
const style = document.createElement('style');
style.textContent = `
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
`;
document.head.appendChild(style);

// Carregar o feed do Blogger usando JSONP
const script = document.createElement('script');
script.src = "https://codehub-blogm.blogspot.com/feeds/posts/default?alt=json-in-script&callback=carregarPosts&max-results=20";
document.head.appendChild(script);
</script>

</body>
</html>
