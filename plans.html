<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHUB - Planos e Assinaturas</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    
    .header h1 { font-size: 2.5em; margin-bottom: 10px; }
    
    .plans {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    
    .plan-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    
    .plan-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    .plan-card.popular { border: 2px solid #ff9800; }
    
    .popular-badge {
      position: absolute;
      top: 20px;
      right: -30px;
      background: #ff9800;
      color: white;
      padding: 5px 30px;
      transform: rotate(45deg);
      font-size: 12px;
    }
    
    .plan-name { font-size: 1.8em; color: #333; margin-bottom: 10px; }
    .plan-price { font-size: 3em; color: #667eea; margin: 20px 0; }
    .plan-price span { font-size: 0.5em; color: #999; }
    .plan-storage { font-size: 1.2em; color: #4caf50; margin: 10px 0; }
    
    .plan-features {
      list-style: none;
      margin: 20px 0;
      text-align: left;
    }
    
    .plan-features li {
      padding: 8px 0;
      color: #666;
    }
    
    .plan-features li:before {
      content: "✓";
      color: #4caf50;
      margin-right: 10px;
      font-weight: bold;
    }
    
    .buy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
    }
    
    .buy-btn:hover { background: #5a67d8; }
    .buy-btn:disabled { background: #ccc; cursor: not-allowed; }
    
    .current-plan {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      padding: 20px;
      margin-top: 30px;
    }
    
    .refund-section {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-top: 30px;
    }
    
    .refund-section h3 { color: #f44336; margin-bottom: 15px; }
    
    .refund-btn {
      background: #f44336;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }
    
    .modal-content select, .modal-content textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .confirm-btn { background: #4caf50; color: white; }
    .cancel-btn { background: #f44336; color: white; }
    
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      color: white;
      display: none;
      z-index: 1100;
      animation: slideIn 0.3s ease;
    }
    
    .notification.success { background: #4caf50; }
    .notification.error { background: #f44336; }
    .notification.info { background: #2196f3; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .loading {
      text-align: center;
      padding: 50px;
      color: white;
    }
    
    .payment-qr { text-align: center; padding: 20px; }
    .payment-qr img { max-width: 200px; margin: 10px auto; }
    .copy-pix-btn {
      background: #00bcd4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    @media (max-width: 768px) {
      .plans { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Escolha seu Plano</h1>
      <p>Mais armazenamento, mais projetos, mais liberdade!</p>
    </div>
    
    <div id="loading" class="loading"><h2>Carregando...</h2></div>
    <div id="plans-container" style="display: none;"></div>
    <div id="current-plan-container" style="display: none;"></div>
    <div id="refund-section" style="display: none;" class="refund-section">
      <h3>🔄 Solicitar Reembolso</h3>
      <p>Reembolso disponível apenas para compras realizadas nos últimos 7 dias.</p>
      <button class="refund-btn" onclick="requestRefund()">Solicitar Reembolso</button>
    </div>
  </div>
  
  <!-- Modal de Pagamento -->
  <div id="paymentModal" class="modal">
    <div class="modal-content">
      <h3>💳 Pagamento via PIX</h3>
      <div id="paymentContent"><p>Gerando código PIX...</p></div>
      <div class="modal-buttons">
        <button onclick="closePaymentModal()" class="cancel-btn">Fechar</button>
      </div>
    </div>
  </div>
  
  <!-- Modal de Reembolso -->
  <div id="refundModal" class="modal">
    <div class="modal-content">
      <h3>🔄 Solicitar Reembolso</h3>
      <select id="purchaseSelect"></select>
      <textarea id="refundReason" rows="3" placeholder="Motivo do reembolso..."></textarea>
      <div class="modal-buttons">
        <button onclick="confirmRefund()" class="confirm-btn">Confirmar</button>
        <button onclick="closeRefundModal()" class="cancel-btn">Cancelar</button>
      </div>
    </div>
  </div>
  
  <div id="notification" class="notification"></div>
  
  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.appspot.com",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32"
    };
    
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    const PAYMENT_API = "https://code-hub-eta.vercel.app/api/payment.js";
    
    const PLANS = {
      basic: { name: "Básico", price: 9, priceCents: 900, storage: 8, storageBytes: 8 * 1024 * 1024,
        features: ["8GB de armazenamento", "Projetos ilimitados", "Suporte prioritário", "Exportar projetos"] },
      pro: { name: "Profissional", price: 89, priceCents: 8900, storage: 20, storageBytes: 20 * 1024 * 1024,
        features: ["20GB de armazenamento", "Projetos ilimitados", "Suporte 24/7", "Colaboração em tempo real", "Backup automático"] }
    };
    
    let currentUser = null;
    let userPlan = 'free';
    let userPurchases = [];
    let userStorage = { used: 0, limit: 5 * 1024 * 1024 };
    
    function showNotification(message, type = 'info') {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.className = `notification ${type}`;
      notification.style.display = 'block';
      setTimeout(() => notification.style.display = 'none', 5000);
    }
    
    // Carregar dados do Firebase
    async function loadUserData() {
      if (!currentUser) return;
      
      const userRef = db.ref(`users/${currentUser.uid}`);
      const snapshot = await userRef.once('value');
      const data = snapshot.val();
      
      if (data) {
        userPlan = data.plan || 'free';
        userStorage = data.storage || { used: 0, limit: 5 * 1024 * 1024 };
        userPurchases = data.purchases || [];
      }
      
      updateCurrentPlanDisplay();
    }
    
    // Salvar dados no Firebase
    async function saveUserData() {
      if (!currentUser) return;
      
      await db.ref(`users/${currentUser.uid}`).update({
        plan: userPlan,
        storage: userStorage,
        purchases: userPurchases,
        updatedAt: new Date().toISOString()
      });
    }
    
    // Processar pagamento
    async function processPayment(planKey, plan) {
      showNotification('Gerando pagamento...', 'info');
      
      const paymentModal = document.getElementById('paymentModal');
      const paymentContent = document.getElementById('paymentContent');
      paymentContent.innerHTML = '<p>🔄 Gerando código de pagamento...</p>';
      paymentModal.style.display = 'flex';
      
      try {
        const orderId = `ORDER_${currentUser.uid}_${Date.now()}`;
        
        const response = await fetch(PAYMENT_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            order_nsu: orderId,
            items: [{
              quantity: 1,
              price: plan.priceCents,
              description: `Assinatura ${plan.name} - CodeHUB - ${plan.storage}GB`
            }],
            redirect_success: window.location.href + `?payment_success=true&plan=${planKey}&order=${orderId}`,
            redirect_fail: window.location.href + "?payment_fail=true"
          })
        });
        
        const data = await response.json();
        
        if (data.url) {
          const pendingPurchase = {
            id: orderId,
            plan: plan.name,
            planKey: planKey,
            price: plan.price,
            storage: plan.storageBytes,
            date: new Date().toISOString(),
            status: 'pending'
          };
          sessionStorage.setItem('pending_purchase', JSON.stringify(pendingPurchase));
          window.location.href = data.url;
        } else if (data.qr_code) {
          paymentContent.innerHTML = `
            <div class="payment-qr">
              <p>📱 Escaneie o QR Code para pagar via PIX</p>
              <img src="${data.qr_code}" alt="QR Code PIX">
              <p style="font-size: 12px;">Código PIX:</p>
              <input type="text" value="${data.pix_code}" readonly style="width:100%; font-size:10px;">
              <button class="copy-pix-btn" onclick="copyPixCode('${data.pix_code}')">Copiar código</button>
              <button onclick="checkPaymentStatus('${orderId}', '${planKey}')" class="confirm-btn" style="margin-top:10px;">✅ Já paguei</button>
            </div>
          `;
        } else {
          paymentContent.innerHTML = '<p>❌ Erro ao gerar pagamento. Tente novamente.</p>';
        }
      } catch (error) {
        paymentContent.innerHTML = '<p>❌ Erro de conexão. Tente novamente.</p>';
        showNotification('Erro de conexão', 'error');
      }
    }
    
    // Confirmar compra no Firebase
    async function confirmPurchase(orderId, planKey) {
      const plan = PLANS[planKey];
      if (!plan) return false;
      
      const purchase = {
        id: orderId,
        plan: plan.name,
        planKey: planKey,
        price: plan.price,
        storage: plan.storageBytes,
        date: new Date().toISOString(),
        status: 'completed'
      };
      
      userPurchases.push(purchase);
      userPlan = planKey;
      userStorage.limit = plan.storageBytes;
      
      await saveUserData();
      showNotification(`✅ Plano ${plan.name} ativado com sucesso!`, 'success');
      return true;
    }
    
    // Verificar retorno de pagamento
    async function checkPaymentReturn() {
      const urlParams = new URLSearchParams(window.location.search);
      
      if (urlParams.get('payment_success') === 'true') {
        const planKey = urlParams.get('plan');
        const orderId = urlParams.get('order');
        const pending = sessionStorage.getItem('pending_purchase');
        
        if (pending) {
          const pendingData = JSON.parse(pending);
          if (pendingData.id === orderId) {
            await confirmPurchase(orderId, planKey);
            sessionStorage.removeItem('pending_purchase');
            window.history.replaceState({}, '', window.location.pathname);
            setTimeout(() => location.reload(), 1500);
          }
        }
      }
    }
    
    // Verificar localização para reembolso
    async function getUserCountry() {
      try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        return data.country_code;
      } catch { return null; }
    }
    
    async function requestRefund() {
      const country = await getUserCountry();
      if (country !== 'BR') {
        showNotification('Reembolso disponível apenas para Brasil', 'error');
        return;
      }
      
      const eligiblePurchases = userPurchases.filter(p => {
        const diffDays = (new Date() - new Date(p.date)) / (1000 * 60 * 60 * 24);
        return diffDays <= 7 && p.status === 'completed';
      });
      
      if (eligiblePurchases.length === 0) {
        showNotification('Nenhuma compra elegível nos últimos 7 dias', 'info');
        return;
      }
      
      const select = document.getElementById('purchaseSelect');
      select.innerHTML = eligiblePurchases.map(p => 
        `<option value="${p.id}">${p.plan} - R$ ${p.price} - ${new Date(p.date).toLocaleDateString()}</option>`
      ).join('');
      
      document.getElementById('refundModal').style.display = 'flex';
    }
    
    async function confirmRefund() {
      const purchaseId = document.getElementById('purchaseSelect').value;
      const reason = document.getElementById('refundReason').value;
      const purchase = userPurchases.find(p => p.id === purchaseId);
      
      if (!purchase) return;
      
      const refund = {
        id: `refund_${Date.now()}`,
        userId: currentUser.uid,
        purchaseId: purchaseId,
        plan: purchase.plan,
        price: purchase.price,
        reason: reason,
        date: new Date().toISOString(),
        status: 'pending'
      };
      
      await db.ref(`refunds/${currentUser.uid}/${refund.id}`).set(refund);
      showNotification('Solicitação enviada! Aguarde aprovação.', 'success');
      closeRefundModal();
    }
    
    function renderPlans() {
      const container = document.getElementById('plans-container');
      container.innerHTML = Object.entries(PLANS).map(([key, plan]) => `
        <div class="plan-card ${key === 'pro' ? 'popular' : ''}">
          ${key === 'pro' ? '<div class="popular-badge">MAIS POPULAR</div>' : ''}
          <div class="plan-name">${plan.name}</div>
          <div class="plan-price">R$ ${plan.price}<span>/mês</span></div>
          <div class="plan-storage">📦 ${plan.storage}GB de armazenamento</div>
          <ul class="plan-features">${plan.features.map(f => `<li>${f}</li>`).join('')}</ul>
          <button class="buy-btn" onclick="selectPlan('${key}')">
            ${userPlan === key ? '✅ Plano Atual' : 'Assinar Agora'}
          </button>
        </div>
      `).join('');
      container.style.display = 'grid';
    }
    
    function updateCurrentPlanDisplay() {
      const container = document.getElementById('current-plan-container');
      const currentPlan = PLANS[userPlan] || { name: 'Grátis', storage: 5 };
      const usedMB = (userStorage.used / (1024 * 1024)).toFixed(2);
      const limitMB = userStorage.limit / (1024 * 1024);
      
      container.innerHTML = `
        <div class="current-plan">
          <h3>📋 Plano Atual: ${currentPlan.name}</h3>
          <p>💾 Armazenamento: ${usedMB}MB / ${limitMB}GB usado</p>
          <div style="background:#e0e0e0; border-radius:10px; margin-top:10px; overflow:hidden;">
            <div style="background:#4caf50; width:${(userStorage.used / userStorage.limit) * 100}%; height:20px;"></div>
          </div>
        </div>
      `;
      container.style.display = 'block';
      
      if (userPlan !== 'free') {
        document.getElementById('refund-section').style.display = 'block';
      }
    }
    
    async function selectPlan(planKey) {
      if (userPlan === planKey) {
        showNotification('Este já é seu plano atual!', 'info');
        return;
      }
      if (confirm(`Confirmar assinatura do plano ${PLANS[planKey].name} por R$ ${PLANS[planKey].price}/mês?`)) {
        await processPayment(planKey, PLANS[planKey]);
      }
    }
    
    // Funções globais
    window.selectPlan = selectPlan;
    window.requestRefund = requestRefund;
    window.confirmRefund = confirmRefund;
    window.closeRefundModal = () => document.getElementById('refundModal').style.display = 'none';
    window.closePaymentModal = () => document.getElementById('paymentModal').style.display = 'none';
    window.copyPixCode = (code) => { navigator.clipboard.writeText(code); showNotification('Código copiado!', 'success'); };
    window.checkPaymentStatus = async (orderId, planKey) => {
      showNotification('Verificando pagamento...', 'info');
      setTimeout(async () => {
        await confirmPurchase(orderId, planKey);
        closePaymentModal();
        location.reload();
      }, 3000);
    };
    
    // Autenticação
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'auth.html';
        return;
      }
      currentUser = user;
      await loadUserData();
      renderPlans();
      checkPaymentReturn();
      document.getElementById('loading').style.display = 'none';
    });
  </script>
</body>
</html>
