<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHub - Autenticação 2</title>
  <style>
    :root {
      --primary-color: #4361ee;
      --secondary-color: #3f37c9;
      --accent-color: #4895ef;
      --danger-color: #f72585;
      --success-color: #4cc9f0;
      --light-color: #f8f9fa;
      --dark-color: #212529;
      --gray-color: #6c757d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      background-color: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-header {
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 25px;
      text-align: center;
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .auth-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      background-color: #f1f3f5;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 15px;
      cursor: pointer;
      font-weight: 600;
      color: var(--gray-color);
      transition: all 0.3s ease;
      position: relative;
    }

    .tab.active {
      color: var(--primary-color);
      background-color: white;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: var(--primary-color);
    }

    .tab-content {
      padding: 30px;
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--dark-color);
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: var(--accent-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--secondary-color);
      transform: translateY(-2px);
    }

    .btn-google {
      background-color: white;
      color: var(--dark-color);
      border: 1px solid #dee2e6;
    }

    .btn-google:hover {
      background-color: #f8f9fa;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--gray-color);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: #e9ecef;
      margin: 0 10px;
    }

    .error-message {
      color: var(--danger-color);
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: var(--success-color);
      font-size: 14px;
      margin-top: 15px;
      text-align: center;
      font-weight: 600;
    }

    .info-message {
      background-color: #e7f3ff;
      border-left: 4px solid var(--accent-color);
      padding: 12px 15px;
      margin: 15px 0;
      border-radius: 6px;
      font-size: 14px;
      color: var(--dark-color);
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--gray-color);
    }

    .footer-text a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }

    .icon {
      width: 18px;
      height: 18px;
    }

    .header-actions {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .home-btn {
      background-color: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .home-btn:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }

    .token-info {
      background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
      border-radius: 8px;
      padding: 12px;
      margin: 15px 0;
      font-size: 12px;
      word-break: break-all;
      border: 1px solid var(--primary-color);
    }

    .token-info strong {
      color: var(--primary-color);
    }

    @media (max-width: 480px) {
      .auth-container {
        border-radius: 12px;
      }

      .auth-header {
        padding: 20px;
      }

      .tab-content {
        padding: 20px;
      }

      .header-actions {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="header-actions">
    <button class="home-btn" onclick="goToIndex()">
      <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
      </svg>
      Voltar ao Início
    </button>
  </div>

  <div class="auth-container">
    <div class="auth-header">
      <h1>Bem-vindo ao CodeHub</h1>
      <p>Seu editor de código online favorito</p>
    </div>

    <div id="token-display" class="token-info" style="display: none;">
      <strong>🔐 Token de Autenticação:</strong><br>
      <span id="token-value"></span>
    </div>

    <div id="no-token-info" class="info-message" style="display: none;">
      <strong>Modo Direto:</strong> Você acessou diretamente a página de login. 
      Após o login, um token único será gerado e salvo permanentemente.
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Entrar</div>
      <div class="tab" onclick="switchTab('register')">Criar Conta</div>
    </div>

    <div id="login-tab" class="tab-content active">
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="digite seu email" required>
          <div id="login-email-error" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" class="form-control" placeholder="digite sua senha" required>
          <div id="login-password-error" class="error-message"></div>
        </div>

        <button type="button" class="btn btn-primary" onclick="login()">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
          </svg>
          Entrar
        </button>

        <div class="divider">ou</div>

        <button type="button" class="btn btn-google" onclick="loginWithGoogle()">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar com Google
        </button>

        <div class="footer-text">
          Não tem uma conta? <a href="#" onclick="switchTab('register'); return false;">Cadastre-se</a>
        </div>
        <div id="login-success" class="success-message"></div>
      </form>
    </div>

    <div id="register-tab" class="tab-content">
      <form id="register-form">
        <div class="form-group">
          <label for="register-username">Nome de Usuário</label>
          <input type="text" id="register-username" class="form-control" placeholder="ex: dev123" required>
          <div id="register-username-error" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" class="form-control" placeholder="digite seu email" required>
          <div id="register-email-error" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="register-password">Senha</label>
          <input type="password" id="register-password" class="form-control" placeholder="crie uma senha (mín. 6 caracteres)" required>
          <div id="register-password-error" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="register-confirm-password">Confirmar Senha</label>
          <input type="password" id="register-confirm-password" class="form-control" placeholder="confirme sua senha" required>
          <div id="register-confirm-error" class="error-message"></div>
        </div>

        <button type="button" class="btn btn-primary" onclick="register()">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
          </svg>
          Criar Conta
        </button>

        <div class="footer-text">
          Já tem uma conta? <a href="#" onclick="switchTab('login'); return false;">Faça login</a>
        </div>
        <div id="register-success" class="success-message"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      GoogleAuthProvider, 
      signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-auth.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDon4WbCbe4kCkUq-OdLBRhzhMaUObbAfo",
      authDomain: "html-15e80.firebaseapp.com",
      databaseURL: "https://html-15e80-default-rtdb.firebaseio.com",
      projectId: "html-15e80",
      storageBucket: "html-15e80.firebasestorage.app",
      messagingSenderId: "1068148640439",
      appId: "1:1068148640439:web:7cc5bde34f4c5a5ce41b32",
      measurementId: "G-V57KRZ02HJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Pega token da URL
    const urlParams = new URLSearchParams(window.location.search);
    const appToken = urlParams.get('token');

    // ==================== SISTEMA DE TOKEN ====================
    // Função para gerar token único e permanente (Base64 com JSON)
    function generateAuthToken(userId, userEmail, username) {
      // Cria um objeto com informações do usuário
      const tokenData = {
        uid: userId,
        email: userEmail,
        username: username,
        createdAt: Date.now(),
        expiresAt: null, // permanente
        version: "1.0",
        isPermanent: true
      };
      
      // Converte para JSON e depois para Base64
      const jsonString = JSON.stringify(tokenData);
      const base64Token = btoa(unescape(encodeURIComponent(jsonString)));
      
      return base64Token;
    }

    // Função para decodificar token e obter informações
    function decodeToken(token) {
      try {
        const jsonString = decodeURIComponent(escape(atob(token)));
        return JSON.parse(jsonString);
      } catch (error) {
        console.error("Erro ao decodificar token:", error);
        return null;
      }
    }

    // Função para salvar token no Firebase e localStorage
    async function saveTokenToFirebase(userId, token, userInfo) {
      try {
        // Salva no Realtime Database em tokens/{userId}
        await set(ref(database, `tokens/${userId}`), {
          token: token,
          userInfo: userInfo,
          createdAt: Date.now(),
          isPermanent: true,
          lastUsed: Date.now()
        });
        
        // Salva também no localStorage para persistência local
        localStorage.setItem('auth_token', token);
        localStorage.setItem('token_user_id', userId);
        localStorage.setItem('token_data', JSON.stringify(userInfo));
        
        console.log("✅ Token salvo com sucesso no Firebase e localStorage");
        return true;
      } catch (error) {
        console.error("❌ Erro ao salvar token:", error);
        return false;
      }
    }

    // Função para verificar se o usuário já tem token no Firebase
    async function getUserExistingToken(userId) {
      try {
        const tokenRef = ref(database, `tokens/${userId}`);
        const snapshot = await get(tokenRef);
        
        if (snapshot.exists()) {
          const tokenData = snapshot.val();
          // Verifica se o token ainda é válido (permanente)
          if (tokenData.isPermanent === true) {
            return tokenData.token;
          }
        }
        return null;
      } catch (error) {
        console.error("Erro ao buscar token existente:", error);
        return null;
      }
    }

    // Função principal: gerenciar token do usuário
    async function manageUserToken(user, username) {
      const userId = user.uid;
      const userEmail = user.email;
      const displayName = username || user.displayName || userEmail.split('@')[0];
      
      // Verifica se já existe um token para este usuário no Firebase
      let existingToken = await getUserExistingToken(userId);
      
      if (existingToken) {
        // Token já existe, é permanente - apenas recupera
        console.log("🔑 Token existente encontrado (permanente)");
        
        // Atualiza localStorage com o token existente
        localStorage.setItem('auth_token', existingToken);
        localStorage.setItem('token_user_id', userId);
        
        // Mostra token na tela
        displayTokenInfo(existingToken);
        
        return existingToken;
      } else {
        // Primeiro acesso - gera token único e permanente
        console.log("✨ Gerando novo token permanente para o usuário");
        
        const newToken = generateAuthToken(userId, userEmail, displayName);
        const tokenInfo = decodeToken(newToken);
        
        // Salva token no Firebase e localStorage
        await saveTokenToFirebase(userId, newToken, tokenInfo);
        
        // Mostra token na tela
        displayTokenInfo(newToken);
        
        return newToken;
      }
    }

    // Função para exibir o token na interface
    function displayTokenInfo(token) {
      const tokenDisplay = document.getElementById('token-display');
      const tokenValueSpan = document.getElementById('token-value');
      
      if (token && tokenDisplay) {
        const decoded = decodeToken(token);
        if (decoded) {
          tokenValueSpan.innerHTML = `
            <span style="font-family: monospace; font-size: 11px;">${token.substring(0, 80)}...</span><br>
            <small style="opacity: 0.8;">👤 Usuário: ${decoded.username} | 📧 ${decoded.email}</small><br>
            <small style="opacity: 0.8;">🔒 Token Permanente | Criado em: ${new Date(decoded.createdAt).toLocaleString()}</small>
          `;
          tokenDisplay.style.display = 'block';
        }
      }
    }

    // Verifica se há token no localStorage ao carregar a página
    function checkLocalToken() {
      const localToken = localStorage.getItem('auth_token');
      if (localToken) {
        displayTokenInfo(localToken);
      }
    }
    // ==================== FIM SISTEMA DE TOKEN ====================

    // Função para ir para index.html
    window.goToIndex = function() {
      window.location.href = 'index.html';
    };

    // Verifica se há token na URL
    if (!appToken) {
      const infoElement = document.getElementById('no-token-info');
      infoElement.style.display = 'block';
    }

    // Função para redirecionar após login/registro
    function redirectAfterAuth() {
      if (appToken) {
        setTimeout(() => {
          window.location.href = `API/continuar-conta.html?token=${appToken}`;
        }, 1500);
      } else {
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      }
    }

    window.switchTab = (tabId) => {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      document.querySelector(`.tab[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(`${tabId}-tab`).classList.add('active');

      document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('.success-message').forEach(el => el.textContent = '');
    };

    function showError(fieldId, message) {
      const errorElement = document.getElementById(`${fieldId}-error`);
      errorElement.textContent = message;
      errorElement.classList.add('show');
    }

    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
      });
    }

    function showSuccess(formType, message) {
      const successElement = document.getElementById(`${formType}-success`);
      successElement.textContent = message;
    }

    // Função de registro com geração de token
    window.register = async () => {
      clearErrors();

      const username = document.getElementById('register-username').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirmPassword = document.getElementById('register-confirm-password').value;

      if (!username) {
        showError('register-username', 'Nome de usuário é obrigatório');
        return;
      }

      if (!email) {
        showError('register-email', 'Email é obrigatório');
        return;
      }

      if (!password) {
        showError('register-password', 'Senha é obrigatória');
        return;
      }

      if (password.length < 6) {
        showError('register-password', 'A senha deve ter pelo menos 6 caracteres');
        return;
      }

      if (password !== confirmPassword) {
        showError('register-confirm', 'As senhas não coincidem');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Salvar dados adicionais no Realtime Database
        await set(ref(database, 'users/' + user.uid), {
          username: username,
          email: email,
          createdAt: Date.now(),
          lastLogin: Date.now(),
          hasToken: true
        });

        // GERAR TOKEN PERMANENTE PARA O NOVO USUÁRIO
        const authToken = await manageUserToken(user, username);
        
        showSuccess('register', `✅ Conta criada com sucesso! Token gerado e salvo permanentemente. Redirecionando...`);
        redirectAfterAuth();

      } catch (error) {
        console.error('Erro no registro:', error);

        switch(error.code) {
          case 'auth/email-already-in-use':
            showError('register-email', 'Este email já está em uso');
            break;
          case 'auth/invalid-email':
            showError('register-email', 'Email inválido');
            break;
          case 'auth/weak-password':
            showError('register-password', 'Senha muito fraca');
            break;
          default:
            showError('register-email', 'Erro ao criar conta. Tente novamente.');
        }
      }
    };

    // Função de login com gerenciamento de token
    window.login = async () => {
      clearErrors();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email) {
        showError('login-email', 'Email é obrigatório');
        return;
      }

      if (!password) {
        showError('login-password', 'Senha é obrigatória');
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Buscar username do usuário
        let username = email.split('@')[0];
        const userRef = ref(database, 'users/' + user.uid);
        const userSnapshot = await get(userRef);
        if (userSnapshot.exists()) {
          username = userSnapshot.val().username || username;
        }

        // Atualizar último login
        await set(ref(database, 'users/' + user.uid + '/lastLogin'), Date.now());

        // GERAR OU RECUPERAR TOKEN DO USUÁRIO
        const authToken = await manageUserToken(user, username);

        showSuccess('login', `✅ Login realizado! Token ${authToken ? 'recuperado' : 'gerado'} com sucesso. Redirecionando...`);
        redirectAfterAuth();

      } catch (error) {
        console.error('Erro no login:', error);

        switch(error.code) {
          case 'auth/user-not-found':
            showError('login-email', 'Usuário não encontrado');
            break;
          case 'auth/wrong-password':
            showError('login-password', 'Senha incorreta');
            break;
          case 'auth/invalid-email':
            showError('login-email', 'Email inválido');
            break;
          default:
            showError('login-email', 'Erro ao fazer login. Verifique suas credenciais.');
        }
      }
    };

    // Login com Google com token
    window.loginWithGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const username = user.displayName || user.email.split('@')[0];

        // Salvar/atualizar dados do usuário
        await set(ref(database, 'users/' + user.uid), {
          username: username,
          email: user.email,
          createdAt: Date.now(),
          lastLogin: Date.now(),
          provider: 'google',
          hasToken: true
        });

        // GERAR OU RECUPERAR TOKEN
        const authToken = await manageUserToken(user, username);

        showSuccess('login', `✅ Login com Google realizado! Token ${authToken ? 'recuperado' : 'gerado'} com sucesso. Redirecionando...`);
        redirectAfterAuth();

      } catch (error) {
        console.error('Erro no login com Google:', error);
        showError('login-email', 'Erro ao fazer login com Google');
      }
    };

    // Verificar se o usuário já está logado e gerenciar token
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        // Buscar username
        let username = user.displayName || user.email.split('@')[0];
        const userRef = ref(database, 'users/' + user.uid);
        const userSnapshot = await get(userRef);
        if (userSnapshot.exists() && userSnapshot.val().username) {
          username = userSnapshot.val().username;
        }
        
        // Gerenciar token para usuário já logado
        await manageUserToken(user, username);
        
        if (appToken) {
          showSuccess('login', '✅ Você já está logado! Token verificado. Redirecionando...');
          setTimeout(() => {
            window.location.href = `API/v2/continuar-conta.html?token=${appToken}`;
          }, 1000);
        } else {
          showSuccess('login', '✅ Você já está logado! Token ativo. Redirecionando...');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        }
      }
    });

    // Verificar token local ao iniciar
    checkLocalToken();
  </script>
</body>
</html>
